const ATT_STATUS={present:{lbl:'Present',ic:'ti-check',col:'var(--green)'},half_day:{lbl:'Half day',ic:'ti-circle-half-2',col:'#B45309'},absent:{lbl:'Absent',ic:'ti-x',col:'var(--red)'},leave:{lbl:'On leave',ic:'ti-plane',col:'var(--blue)'}};
const todayDateISO=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;};
const isoDay=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const fmtMonthY=(y,m)=>new Date(y,m,1).toLocaleString('default',{month:'long',year:'numeric'});

// Weekly-off days (0=Sun … 6=Sat) that are NOT auto-marked absent. Mon–Sat work
// week by default; add 6 here for a 5-day week.
const ATT_OFF_DOW=new Set([0]);
// A past day (strictly before today) that is a working day → eligible for auto-absent.
const isAutoAbsentDay=(dStr,today)=>dStr<today&&!ATT_OFF_DOW.has(new Date(dStr+'T00:00:00').getDay());
// Resolve a member's effective status for a date: the real row if any, else a
// synthetic auto-absent for past working days with no record (null otherwise).
const effAtt=(rows,dStr,today)=>{const r=rows.find(a=>a.date===dStr);if(r)return r;if(isAutoAbsentDay(dStr,today))return{date:dStr,status:'absent',auto:true};return null;};
// Monthly tally for a member, counting auto-absent past working days as absent.
function monthAttStats(rows,y,m,today){
  const dim=new Date(y,m+1,0).getDate();
  let present=0,half=0,absent=0,leave=0,autoAbsent=0;
  for(let d=1;d<=dim;d++){
    const r=effAtt(rows,isoDay(y,m,d),today);
    if(!r)continue;
    if(r.status==='present')present++;
    else if(r.status==='half_day')half++;
    else if(r.status==='leave')leave++;
    else if(r.status==='absent'){absent++;if(r.auto)autoAbsent++;}
  }
  return{present,half,absent,leave,autoAbsent};
}

// `initialSubtab` may be either a plain string ('dashboard'|'attendance'|'leaves')
// or a fresh object {sub, k} per click — using a new identity each time lets the
// parent re-target the sub-tab even when the value hasn't changed.
function EmployeeView({currentUser,team,showToast,initialSubtab,embedded}){
  const _initSub=(typeof initialSubtab==='string'?initialSubtab:initialSubtab?.sub)||'dashboard';
  const[sub,setSub]=useState(_initSub);
  // Allow parent (notification click) to re-target the sub-tab after mount.
  useEffect(()=>{const next=typeof initialSubtab==='string'?initialSubtab:initialSubtab?.sub;if(next)setSub(next);},[initialSubtab]);
  const[att,setAtt]=useState([]);const[leaves,setLeaves]=useState([]);const[loading,setLoading]=useState(true);
  const now=new Date();const[mo,setMo]=useState({y:now.getFullYear(),m:now.getMonth()});
  const[selMember,setSelMember]=useState(currentUser.name);
  const isPriv=isPrivilegedRole(currentUser.role_level);
  const isAdmin=currentUser.role_level==='admin';
  // Non-privileged users (editor/designer/seo) only see their own attendance row,
  // not every teammate's heatmap. Privileged users (admin/manager) see the full team.
  const attTeam=isPriv
    ?sortTeam(team.filter(m=>m.role_level!=='admin'&&m.role_level!=='client'))
    :sortTeam(team.filter(m=>m.name===currentUser.name));
  const today=todayDateISO();

  useEffect(()=>{
    setLoading(true);
    const start=isoDay(mo.y,mo.m,1);
    const end=isoDay(mo.y,mo.m+1,1);
    Promise.all([
      db('attendance',`&date=gte.${start}&date=lt.${end}&order=date.desc`),
      db('leave_requests','&order=created_at.desc&limit=200')
    ]).then(([a,l])=>{setAtt(a);setLeaves(l);}).catch(e=>console.warn('[emp] load',e)).finally(()=>setLoading(false));
    const ch=supabase.channel('emp-'+currentUser.id+'-'+mo.y+'-'+mo.m)
      .on('postgres_changes',{event:'*',schema:'public',table:'attendance'},()=>{
        db('attendance',`&date=gte.${start}&date=lt.${end}&order=date.desc`).then(setAtt).catch(_loadFail('attendance'));
      })
      .on('postgres_changes',{event:'*',schema:'public',table:'leave_requests'},()=>{
        db('leave_requests','&order=created_at.desc&limit=200').then(setLeaves).catch(_loadFail('leave_requests'));
      }).subscribe();
    return()=>{supabase.removeChannel(ch);};
  },[mo.y,mo.m,currentUser.id]);

  const myToday=att.find(a=>a.member_name===currentUser.name&&a.date===today);
  const markSelf=async(status)=>{
    if(isAdmin){showToast("Admin doesn't mark attendance");return;}
    if(myToday){showToast('Already marked — ask a manager to edit');return;}
    try{
      const rows=await dbInsert('attendance',[{member_name:currentUser.name,date:today,status,marked_by:currentUser.name}]);
      setAtt(a=>[...rows,...a]);
      showToast('Marked '+ATT_STATUS[status].lbl+' ✓');
    }catch(e){showToast('Failed: '+e.message);}
  };
  const editCell=async(memberName,dateStr,status)=>{
    if(!isPriv)return;
    const existing=att.find(a=>a.member_name===memberName&&a.date===dateStr);
    try{
      if(existing){
        if(status==null){await dbDelete('attendance',existing.id);setAtt(a=>a.filter(x=>x.id!==existing.id));}
        else{await dbPatch('attendance',existing.id,{status,edited_by:currentUser.name,edited_at:new Date().toISOString()});setAtt(a=>a.map(x=>x.id===existing.id?{...x,status,edited_by:currentUser.name}:x));}
      }else if(status){
        const rows=await dbInsert('attendance',[{member_name:memberName,date:dateStr,status,marked_by:currentUser.name,edited_by:currentUser.name,edited_at:new Date().toISOString()}]);
        setAtt(a=>[...rows,...a]);
      }
      showToast('Updated ✓');
    }catch(e){showToast('Failed');}
  };

  const submitLeave=async(form)=>{
    try{
      const rows=await dbInsert('leave_requests',[{member_name:currentUser.name,role_level:currentUser.role_level,from_date:form.from,to_date:form.to,leave_type:form.type,reason:form.reason||null,status:'pending'}]);
      setLeaves(l=>[...rows,...l]);
      // Manager applies → notify admin only; otherwise notify admin+manager
      const recipient=currentUser.role_level==='manager'?'role:admin':'role:admin,manager';
      insertNotif(recipient,'New leave request',`${currentUser.name} requested ${form.type==='half'?'half-day':'leave'} from ${fmtS(form.from)} to ${fmtS(form.to)}`,'info',null,null,'leave',rows?.[0]?.id||null);
      showToast('Leave request submitted ✓');
      return true;
    }catch(e){showToast('Failed: '+e.message);return false;}
  };
  const reviewLeave=async(lv,decision)=>{
    if(!isPriv)return;
    try{
      await dbPatch('leave_requests',lv.id,{status:decision,reviewed_by:currentUser.name,reviewed_at:new Date().toISOString()});
      setLeaves(ls=>ls.map(x=>x.id===lv.id?{...x,status:decision,reviewed_by:currentUser.name}:x));
      // If approved → also mark each day in range as 'leave'
      if(decision==='approved'){
        const from=new Date(lv.from_date);const to=new Date(lv.to_date);
        const days=[];for(let d=new Date(from);d<=to;d.setDate(d.getDate()+1)){days.push(isoDay(d.getFullYear(),d.getMonth(),d.getDate()));}
        const status=lv.leave_type==='half'?'half_day':'leave';
        for(const dStr of days){
          try{await dbInsert('attendance',[{member_name:lv.member_name,date:dStr,status,marked_by:currentUser.name,notes:'Approved leave #'+lv.id}]);}catch(e){}
        }
      }
      insertNotif(lv.member_name,'Leave '+decision,`${currentUser.name} ${decision} your leave request (${fmtS(lv.from_date)} → ${fmtS(lv.to_date)})`,'info',null,null,'leave',lv.id);
      showToast('Leave '+decision);
    }catch(e){showToast('Failed');}
  };

  // Sub-tab availability: leaves visible to everyone (own requests) but content differs by role
  const TABS=[['dashboard','Dashboard','ti-layout-dashboard'],['attendance','Attendance','ti-calendar-event'],['leaves','Leave Requests','ti-plane-departure']];
  return h`<div>
    ${!embedded&&h`<div class="greeting" style=${{fontSize:26,marginBottom:6}}>Employee Attendance</div>
    <div class="gsub">Track daily attendance, monthly stats & leave requests · ${attTeam.length} team member${attTeam.length===1?'':'s'}</div>`}
    ${embedded&&h`<div style=${{fontSize:13,color:'var(--t3)',marginBottom:14,display:'flex',alignItems:'center',gap:8}}><i class="ti ti-calendar-event" style=${{color:'var(--brand)'}}></i>Attendance & leave · ${attTeam.length} member${attTeam.length===1?'':'s'}</div>`}
    <div class="subtabs" style=${{marginTop:embedded?0:18}}>${TABS.map(([id,lb,ic])=>h`<button key=${id} class=${'subtab'+(sub===id?' on':'')} onClick=${()=>setSub(id)}><i class=${'ti '+ic}></i>${lb}</button>`)}</div>
    ${loading?h`<${Skel} h=${280}/>`
    :sub==='dashboard'?h`<${EmpDashboard} att=${att} leaves=${leaves} team=${attTeam} mo=${mo} setMo=${setMo} currentUser=${currentUser} today=${today}/>`
    :sub==='attendance'?h`<${AttendanceView} att=${att} team=${attTeam} mo=${mo} setMo=${setMo} currentUser=${currentUser} isPriv=${isPriv} isAdmin=${isAdmin} myToday=${myToday} markSelf=${markSelf} editCell=${editCell} selMember=${selMember} setSelMember=${setSelMember} today=${today}/>`
    :h`<${LeavesView} leaves=${leaves} currentUser=${currentUser} isPriv=${isPriv} isAdmin=${isAdmin} submitLeave=${submitLeave} reviewLeave=${reviewLeave}/>`}
  </div>`;
}

      <div class="emp-stat"><div class="emp-stat-lbl"><i class="ti ti-plane" style=${{color:'var(--blue)'}}></i>On leave today</div><div class="emp-stat-v" style=${{color:'var(--blue)'}}>${leaveToday}</div><div class="emp-stat-sub">${pendingLeaves} request${pendingLeaves===1?'':'s'} pending</div></div>
      <div class="emp-stat"><div class="emp-stat-lbl"><i class="ti ti-circle-x" style=${{color:'var(--red)'}}></i>Absent today</div><div class="emp-stat-v" style=${{color:absentToday>0?'var(--red)':'var(--t1)'}}>${Math.max(0,absentToday)}</div><div class="emp-stat-sub">not yet marked</div></div>
    </div>
    <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
      <div class="sec-title">Monthly overview · ${fmtMonthY(mo.y,mo.m)}</div>

        <button onClick=${()=>setMo({y:mo.m===0?mo.y-1:mo.y,m:mo.m===0?11:mo.m-1})}><i class="ti ti-chevron-left"></i></button>
        <button onClick=${()=>{const t=new Date();setMo({y:t.getFullYear(),m:t.getMonth()});}} style=${{width:'auto',padding:'0 12px',fontSize:12}}>Today</button>

    <div class="att-cal">
      <div class="att-row att-row-h"><div>Member</div><div>Daily heatmap · ${daysInMonth} days</div><div style=${{textAlign:'center'}}>Present</div><div style=${{textAlign:'center'}}>Half</div><div style=${{textAlign:'center'}}>Absent</div></div>
      ${memberStats.length===0?h`<div class="empty" style=${{padding:30}}><div class="empty-t">No team members</div></div>`
      :memberStats.map(m=>h`<div key=${m.name} class="att-row">

// 10:30 AM daily attendance reminder for non-admin users
function useAttendanceReminder(currentUser){
  useEffect(()=>{
    if(!currentUser||currentUser.role_level==='admin')return;
    const check=()=>{
      const n=new Date();
      if(n.getHours()!==10||n.getMinutes()<30||n.getMinutes()>45)return;
      const today=todayDateISO();
      const key='ams_att_reminded_'+today;
      if(localStorage.getItem(key))return;
      db('attendance',`&member_name=eq.${encodeURIComponent(currentUser.name)}&date=eq.${today}`).then(rows=>{
        if(rows.length>0){localStorage.setItem(key,'1');return;}
        localStorage.setItem(key,'1');
        insertNotif(currentUser.name,'🕒 Mark your attendance','Please mark your attendance for today.','alert',null,null,'attendance',today);
        showLocalNotification('Mark your attendance',{body:'Open the Employee tab and tap Present, Half day or Absent.',tag:'ams-att-'+today});
      }).catch(()=>{});
    };
    check();
    const iv=setInterval(check,60000);
    return()=>clearInterval(iv);
  },[currentUser]);
}

const TITLES={home:'Home',clients:'Clients',chat:'Chat',seo:'SEO',ads:'Ad Campaigns',team:'Team',billing:'Finance',settings:'Settings',subscription:'Subscription',tenants:'Tenants'};

const DASH_TABS=['home','clients','chat','seo','ads','team','billing','settings','subscription','tenants'];
function DashboardApp({currentUser,theme,setTheme,onSignOut,billing,appName}){
  const isSEO=isSEORole(currentUser?.role_level);
  const[tab,setTab]=useState(()=>{const r=parseHash();return DASH_TABS.includes(r.tab)?r.tab:'home';});
  const[clients,setClients]=useState([]);const[team,setTeam]=useState([]);const[loading,setLoading]=useState(true);const[err,setErr]=useState(null);const[sel,setSel]=useState(null);const[showAddClient,setShowAddClient]=useState(false);const[toast,setToast]=useState(null);const tk=useRef(0);
  const route=useHashRoute();
  // Hash → state: react to back/forward, paste-in-URL, and resolve client id once clients load
  useEffect(()=>{
    const desiredTab=DASH_TABS.includes(route.tab)?route.tab:'home';
    if(desiredTab!==tab)setTab(desiredTab);
    if(loading)return; // wait for clients to load before resolving id → object
    if(route.tab==='clients'&&route.clientId){
      const c=clients.find(x=>String(x.id)===String(route.clientId));
      if(c){if(!sel||sel.id!==c.id)setSel(c);}
      else if(sel){setSel(null);} // stale id, fall back to list
    }else if(sel){
      setSel(null);
    }
  },[route.tab,route.clientId,loading,clients.length]);
  // State → hash. ClientDetail owns the sub-tab segment; preserve it if we're still on the same client.
  const wasLoadingRef=useRef(loading);
  useEffect(()=>{
    const wasLoading=wasLoadingRef.current;wasLoadingRef.current=loading;
    if(sel){
      const r=parseHash();
      const sub=(r.tab==='clients'&&String(r.clientId)===String(sel.id))?r.clientTab:null;
      writeHash({tab:'clients',clientId:sel.id,clientTab:sub});

    }
    // sel is null below.
    if(loading&&tab==='clients'){
      // Initial mount with a deep-link like #/clients/42 — don't clobber the id before resolution.
      return;
    }
    if(wasLoading&&!loading){
      // The render where clients just finished loading. If the URL still points at a client
      // we can resolve, the hash→state effect (runs earlier this commit) is selecting it — so
      // `sel` is null here only because setSel hasn't committed yet. Don't clobber the deep-link
      // (incl. its sub-tab) to the bare list before `sel` catches up next render.
      const r=parseHash();
      if(r.tab==='clients'&&r.clientId&&clients.some(x=>String(x.id)===String(r.clientId)))return;
    }
    writeHash({tab});
  },[tab,sel?.id,loading]);
  // Home tab data
  const[allTasks,setAllTasks]=useState([]);const[tasksLoading,setTasksLoading]=useState(true);const[tasksErr,setTasksErr]=useState(null);
  const[selPost,setSelPost]=useState(null);const[postPanelOpen,setPostPanelOpen]=useState(false);

  const[dtInboxOpen,setDTInboxOpen]=useState(false);
  const[showQC,setShowQC]=useState(false);const[showDigest,setShowDigest]=useState(false);
  // Notifications
  const[notifs,setNotifs]=useState([]);const[showNotifs,setShowNotifs]=useState(false);const[showDesktopBanner,setShowDesktopBanner]=useState(false);
  const[drawerOpen,setDrawerOpen]=useState(false);
  const[empSubtab,setEmpSubtab]=useState(null);
  const unreadCount=notifs.filter(n=>!n.read).length;
  const {total:chatUnread,dmUnread}=useTeamChat?useTeamChat(currentUser):{total:0,dmUnread:{}};
  const[tcCollapsed,setTcCollapsed]=useState(()=>localStorage.getItem('ams_teamrail')==='1');
  const toggleTeamRail=()=>{setTcCollapsed(v=>{const nv=!v;try{localStorage.setItem('ams_teamrail',nv?'1':'0');}catch(_){}return nv;});};
  const openTeamChat=(m)=>{setSel(null);setTab('chat');setDrawerOpen(false);window.__amsPendingDm=m.id;try{window.dispatchEvent(new CustomEvent('ams-open-dm',{detail:m.id}));}catch(_){}};
  const clientMap={};clients.forEach(c=>{clientMap[c.id]=c;});

  useEffect(()=>{Promise.all([db('clients','&order=name.asc'),db('team_members','&status=neq.revoked&role_level=neq.client&order=name.asc')]).then(([c,t])=>{setClients(c);setTeam(t);}).catch(e=>setErr(e.message)).finally(()=>setLoading(false));},[]);

  // Fetch today + recent (overdue) tasks across all members for HomeTab
  useEffect(()=>{
    const today=todayISO();
    const cutoff=new Date();cutoff.setDate(cutoff.getDate()-45);
    const cutoffStr=`${cutoff.getFullYear()}-${String(cutoff.getMonth()+1).padStart(2,'0')}-${String(cutoff.getDate()).padStart(2,'0')}`;
    const inRange=(p)=>p&&p.post_date&&p.post_date.slice(0,10)>=cutoffStr&&p.post_date.slice(0,10)<=today;
    const load=()=>{db('content',`&post_date=gte.${cutoffStr}&post_date=lte.${today}&order=post_date.asc`).then(r=>{setAllTasks(r);setTasksErr(null);}).catch(_loadFail('home-tasks',e=>setTasksErr(e?.message||'network'))).finally(()=>setTasksLoading(false));};
    load();
    const ch=supabase.channel('content-home').on('postgres_changes',{event:'*',schema:'public',table:'content'},payload=>{
      const ev=payload.eventType;const n=payload.new;const o=payload.old;
      const live=(p)=>p&&!p.deleted_at;
      if(ev==='INSERT'){if(inRange(n)&&live(n))setAllTasks(ts=>ts.find(t=>t.id===n.id)?ts:[...ts,n]);}
      else if(ev==='UPDATE'){setAllTasks(ts=>{const present=ts.find(t=>t.id===n.id);if(inRange(n)&&live(n))return present?ts.map(t=>t.id===n.id?n:t):[...ts,n];return ts.filter(t=>t.id!==n.id);});}
      else if(ev==='DELETE'){const id=(o&&o.id)||(n&&n.id);if(id)setAllTasks(ts=>ts.filter(t=>t.id!==id));}
    }).subscribe();
    const poll=setInterval(load,60000);
    return()=>{supabase.removeChannel(ch);clearInterval(poll);};
  },[]);

  // Fire overdue alert once per day per logged-in admin/manager browser
  useEffect(()=>{
    if(!currentUser||!isPrivilegedRole(currentUser.role_level)||tasksLoading)return;
    const today=todayISO();
    const key='ams_overdue_alerted_'+today;
    if(localStorage.getItem(key))return;

    if(overdue.length===0)return;

  },[allTasks,tasksLoading,currentUser]);

  // Load notifications + poll. NOTE: realtime postgres_changes on `notifications`
  // went permanently quiet with migration 075 (anon SELECT revoked + FORCE RLS —
  // realtime delivers no row images), so the poll IS the delivery path. It diffs
  // against already-seen ids and pops the OS-level notification for new arrivals;
  // the tag matches the Web Push path ('ams-notif-<id>'), so a device that also
  // receives the background push shows ONE notification, not two.
  useEffect(()=>{
    if(!currentUser)return;
    const relevant=(n)=>isNotifForUser(n,currentUser);
    let seenIds=null; // null until first load — never pop the backlog on login
    const popNew=(list)=>{
      const fresh=seenIds?list.filter(n=>!seenIds.has(n.id)):[];
      seenIds=seenIds||new Set();list.forEach(n=>seenIds.add(n.id));
      const cutoff=Date.now()-10*60*1000; // only pop recent arrivals, not stale rows after a long sleep
      fresh.filter(n=>(Date.parse(n.created_at)||0)>=cutoff).slice(0,5)
        .forEach(n=>showLocalNotification(n.title,{body:n.message,tag:'ams-notif-'+n.id}));
    };
    const refresh=()=>{
      // 075+: server-filtered, per-recipient read state. Falls back to the legacy
      // anon read for DBs where the migration isn't applied yet.
      rpcCall('notif_list',{p_limit:30},{silentAuth:true}).then(rows=>{
        const list=(Array.isArray(rows)?rows:(rows?.rows||[])).filter(n=>!n.read);
        popNew(list);setNotifs(list);
      }).catch(()=>{
        db('notifications','&read=eq.false&order=created_at.desc&limit=30').then(rows=>{const list=rows.filter(relevant);popNew(list);setNotifs(list);}).catch(e=>console.warn('[notif] poll failed',e));
      });
    };
    refresh();
    const poll=setInterval(refresh,30000);
    // Catch up immediately when the tab / installed PWA returns to the foreground
    // (mobile PWAs freeze timers while backgrounded — without this the bell lags).
    const onVis=()=>{if(document.visibilityState==='visible')refresh();};
    document.addEventListener('visibilitychange',onVis);

    if(typeof Notification!=='undefined'&&Notification.permission==='default'&&!localStorage.getItem('ams_notif_dismissed')){

    return()=>{clearInterval(poll);document.removeEventListener('visibilitychange',onVis);};
  },[currentUser]);

  useAttendanceReminder(currentUser);
  usePushSubscription(currentUser);

  // Direct tasks: Cmd+K / Ctrl+K opens quick capture (admin only).
  useEffect(()=>{
    if(currentUser?.role_level!=='admin')return;
    const onKey=(e)=>{if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'&&!e.shiftKey){e.preventDefault();setShowQC(true);}};

  useEffect(()=>{

  const enableDesktopNotifs=()=>{if(typeof Notification==='undefined'){setShowDesktopBanner(false);showToastFn('Notifications need a desktop browser or the installed PWA');return;}Notification.requestPermission().then(p=>{setShowDesktopBanner(false);if(p==='granted'){showToastFn('Notifications enabled ✓');subscribeToPush(currentUser);}});};

  // Pending link from a cold open (?lt=…&li=…) — applied after data loads.

  // additional navigation only fires when the notification carries a link_type.
  const openNotifTarget=async(link_type,link_id)=>{
    if(!link_type)return;

  const notifFallbackNav=(n)=>{
    switch(n?.type){

      case 'approval':case 'revision':case 'production_done':

/* ── PRE-FLIGHT HEALTH CHECK ── */
// Note: activity_log is intentionally excluded — after migration 018 it's no
// longer SELECTable by anon; the health check now relies on the RPC layer for
// audit-log access. Same for invoices / invoice_payments / agency_settings /
// recurring_invoice_templates (locked behind RPCs in migration 017).
const EXPECTED_TABLES=['clients','content','team_members','monthly_reports','seo_reports','client_keywords','notifications','daily_notes','client_scope_templates','monthly_scope_instances','direct_tasks','direct_task_comments'];
const EXPECTED_COLUMNS={
  clients:['deleted_at','updated_by','updated_at','seo_report_cadence'],
  content:['deleted_at','updated_by','updated_at','is_out_of_scope','scope_line_item_id'],
  team_members:['deleted_at','password_salt','password_algo','last_login_at'],
  monthly_reports:['deleted_at','updated_by','updated_at'],
  seo_reports:['period_type','period_key','keyword_rankings','deleted_at'],
  client_keywords:['is_active','sort_order'],
};
async function runHealthCheck(){
  const issues=[];
  for(const t of EXPECTED_TABLES){
    try{
      const r=await fetch(`${SB_URL}/rest/v1/${t}?select=*&limit=1`,{headers:_sbHeaders()});
      // 401/403 = table EXISTS but anon reads are revoked (expected — see
      // docs/table-access-policy.md; e.g. notifications post-075). Only 404
      // (relation not found) means the migration is actually missing.
      if(r.status===401||r.status===403)continue;
      if(!r.ok){issues.push(`Table "${t}" missing (HTTP ${r.status}) — run migrations/001_data_safety.sql`);continue;}
      const rows=await r.json();
      const cols=EXPECTED_COLUMNS[t]||[];
      if(rows[0]){
        const missing=cols.filter(c=>!Object.prototype.hasOwnProperty.call(rows[0],c));
        if(missing.length)issues.push(`Table "${t}" missing columns: ${missing.join(', ')} — run migrations/001_data_safety.sql`);
      }
    }catch(e){issues.push(`Table "${t}" check failed: ${e.message}`);}
  }
  return issues;
}

/* ── ERROR BOUNDARY ──
   Wraps the app so a render-time exception (e.g. malformed data from a partial
   import) shows a friendly fallback instead of a white screen. */
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(err){return{err};}
  componentDidCatch(err,info){console.error('[ams] render error',err,info);}
  reset=()=>{this.setState({err:null});};
  render(){
    if(this.state.err){
      const e=this.state.err;
      return h`<div style=${{position:'fixed',inset:0,padding:'48px 32px',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',color:'var(--t1)'}}>
        <div style=${{maxWidth:520,textAlign:'center'}}>
          <i class="ti ti-alert-triangle" style=${{fontSize:42,color:'var(--red)',marginBottom:14,display:'block'}}></i>
          <div style=${{fontFamily:"'Fraunces','Inter',serif",fontSize:24,fontWeight:500,marginBottom:10,color:'var(--t1)'}}>Something went wrong</div>
          <div style=${{fontSize:13,color:'var(--t2)',lineHeight:1.6,marginBottom:18}}>The dashboard hit an unexpected error. Reload the page to recover — your data is safe.</div>
          <pre style=${{fontSize:11,color:'var(--t3)',background:'var(--bg2)',padding:'10px 14px',borderRadius:8,maxHeight:140,overflow:'auto',textAlign:'left',whiteSpace:'pre-wrap',marginBottom:18}}>${(e?.message||String(e)).slice(0,400)}</pre>
          <div style=${{display:'flex',gap:8,justifyContent:'center'}}>
            <button class="btn-sec" onClick=${this.reset}>Try again</button>
            <button class="btn-pri" onClick=${()=>window.location.reload()}>Reload page</button>
          </div>
        </div>
      </div>`;
    }
    return this.props.children;
  }
}

// ── White-label branding: recolor the whole app from the tenant's agency_settings.
//    --brand* CSS vars drive every brand-colored surface, so overriding them here
//    re-themes the app per tenant with no other code changes. Falls back silently.
function _hexA(hex,a){const m=/^#?([0-9a-fA-F]{6})$/.exec(hex||'');if(!m)return hex;const n=parseInt(m[1],16);return`rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;}
function applyOrgBranding(s){
  try{
    const root=document.documentElement;const p=s&&s.brand_primary,q=s&&s.brand_secondary;
    if(p){
      root.style.setProperty('--brand',p);
      root.style.setProperty('--brand-light',q||p);
      root.style.setProperty('--brand-dark',q||p);
      root.style.setProperty('--brand-fog',_hexA(p,.12));
      root.style.setProperty('--brand-glow',_hexA(p,.22));
      root.style.setProperty('--brand-glass',_hexA(p,.06));
      root.style.setProperty('--brand-bd',_hexA(p,.28));
    }
  }catch(_){}
}

      // Every gated RPC would 401 in a loop. Clear the stale user so the
      // login screen shows and a fresh token is issued.
      const tok=localStorage.getItem(SESSION_TOKEN_KEY)||'';
      if(!tok){localStorage.removeItem('ams_user');return null;}
      return JSON.parse(u);
    }catch(e){return null;}
  });
  const[theme,setTheme]=useState(()=>localStorage.getItem('ams_theme')||'light');
  const[healthIssues,setHealthIssues]=useState([]);
  const[idleWarning,setIdleWarning]=useState(false);
  const[showWhatsNew,setShowWhatsNew]=useState(false);
  // SaaS: org billing context (undefined=loading, null=unknown/fail-open, obj=known),
  // per-tenant app name, signup/verify hash route, and post-verify email prefill.
  const[billing,setBilling]=useState(null);
  const[appName,setAppName]=useState('My Digital Sevak');
  const[hash,setHashState]=useState(()=>{try{return location.hash||'';}catch(_){return '';}});
  const[pendingEmail,setPendingEmail]=useState('');
  useEffect(()=>{const f=()=>{try{setHashState(location.hash||'');}catch(_){}};window.addEventListener('hashchange',f);return()=>window.removeEventListener('hashchange',f);},[]);

  // Fetch billing + branding after login. Fail-OPEN: if the RPCs error (e.g. before
  // migration 057 is applied), the app behaves exactly as before — no gate, no banner.
  const reloadBilling=useCallback(async()=>{
    try{const b=await rpcCall('org_billing_get');setBilling(b||null);}
    catch(_){setBilling(null);}
  },[]);
  useEffect(()=>{
    if(!currentUser){setBilling(null);return;}
    setBilling(undefined);
    reloadBilling();
    (async()=>{
      try{
        const s=await rpcCall('agency_settings_get');
        applyOrgBranding(s);
        setAppName((s&&(s.app_name||s.trade_name||s.legal_name))||'My Digital Sevak');
      }catch(_){/* keep defaults */}
    })();
  },[currentUser?.id]);

  // Show "What's new" once per user per version. Skip on the very first install
  // (no prior version stored means a brand-new tab — they don't need a changelog).
  useEffect(()=>{
    if(!currentUser)return;
    try{
      const seen=localStorage.getItem(WHATS_NEW_KEY);
      if(seen && seen!==APP_VERSION && WHATS_NEW.length){
        setShowWhatsNew(true);
      }
      localStorage.setItem(WHATS_NEW_KEY,APP_VERSION);
    }catch(e){console.warn('[whats-new] storage unavailable',e);}
  },[currentUser?.id]);

  // Keep the global actor in sync with logged-in user (used by audit log / last-edited stamps)
  useEffect(()=>{setCurrentActor(currentUser);},[currentUser]);

  useEffect(()=>{
    document.documentElement.classList.toggle('dark',theme==='dark');
    localStorage.setItem('ams_theme',theme);
  },[theme]);

  // Pre-flight health check (admins only see the banner)
  useEffect(()=>{
    if(currentUser?.role_level==='admin'){
      runHealthCheck().then(setHealthIssues);
    } else {
      setHealthIssues([]);
    }
  },[currentUser?.id,currentUser?.role_level]);

  // Session timeout: hard 12h + idle 2h with 1-min warning
  useEffect(()=>{
    if(!currentUser)return;
    if(!sessionStartedAt())sessionMarkStart();
    const onActivity=()=>{sessionTouch();if(idleWarning)setIdleWarning(false);};
    ['mousedown','keydown','touchstart','scroll'].forEach(ev=>window.addEventListener(ev,onActivity,{passive:true}));
    const tick=setInterval(()=>{
      const now=Date.now();
      const started=sessionStartedAt();
      const last=parseInt(localStorage.getItem('ams_last_activity')||String(started),10);
      const hardOut=started && now-started>SESSION_HARD_HOURS*3600*1000;
      const idleMs=now-last;
      const idleOut=idleMs>SESSION_IDLE_MIN*60*1000;
      if(hardOut||idleOut){doLogout(hardOut?'Session expired — please sign in again.':'Logged out due to inactivity.');return;}
      const shouldWarn=idleMs>SESSION_IDLE_MIN*60*1000-SESSION_WARN_MS;
      if(shouldWarn!==idleWarning)setIdleWarning(shouldWarn);
    },15000);
    return()=>{clearInterval(tick);['mousedown','keydown','touchstart','scroll'].forEach(ev=>window.removeEventListener(ev,onActivity));};
  },[currentUser?.id,idleWarning]);

  const login=(user)=>{
    localStorage.setItem('ams_user',JSON.stringify(user));
    setCurrentUser(user);
    setCurrentActor(user);
    sessionMarkStart();
  };
  const doLogout=(reason)=>{
    if(currentUser){
      logActivity({action:'logout',table_name:'team_members',record_id:String(currentUser.id),record_label:currentUser.name,changes:reason?{reason}:null});
    }
    // Revoke the session server-side so the token can't be reused if it leaks
    // from localStorage later. Fire-and-forget; not gated on completion.
    const tok=getSessionToken();
    if(tok){try{supabase.rpc('revoke_session',{p_token:tok}).catch(()=>{});}catch(_){}}
    clearSessionToken();
    localStorage.removeItem('ams_user');
    sessionClear();
    setCurrentUser(null);
    setCurrentActor(null);
    if(reason){try{alert(reason);}catch(e){}}
  };
  const logout=()=>doLogout(null);
  // Hook rpcCall's auth-error path into doLogout — any RPC that detects an
  // expired/invalid session triggers a clean re-login flow.
  useEffect(()=>{
    setAuthErrorHandler((msg)=>{if(currentUser)doLogout(msg||'Session expired — please sign in again.');});
    return()=>setAuthErrorHandler(null);
  },[currentUser?.id]);

  const banner=h`<${HealthBanner} issues=${healthIssues} idleWarning=${idleWarning}/>`;
  const whatsNew=showWhatsNew?h`<${WhatsNewModal} onClose=${()=>setShowWhatsNew(false)}/>`:null;

  // ── Logged-out routes: email-verify landing + self-serve signup ──
  if(!currentUser){
    const vm=/[#&]verify=([^&]+)/.exec(hash||'');
    if(vm && VerifyPage){
      return h`<div>${banner}<${VerifyPage} token=${decodeURIComponent(vm[1])}
        onVerified=${(em)=>{setPendingEmail(em||'');try{location.hash='';}catch(_){}setHashState('');}}
        onBackToLogin=${()=>{try{location.hash='';}catch(_){}setHashState('');}}/></div>`;
    }
    if(/(^|[#&])signup\b/.test(hash||'') && SignupPage){
      return h`<div>${banner}<${SignupPage} onBackToLogin=${()=>{try{location.hash='';}catch(_){}setHashState('');}} onGoogleLogin=${login}/></div>`;
    }
    return h`<div>${banner}<${LoginPage} onLogin=${login} initialEmail=${pendingEmail}/></div>`;
  }

  // ── Subscription gate (fail-open while billing is unknown / pre-migration) ──
  if(billing===undefined)return h`<div>${banner}<${BootLoader}/></div>`;
  if(needsPaywall&&needsPaywall(billing)){
    if(currentUser.role_level==='admin'&&PaywallScreen)
      return h`<${PaywallScreen} user=${currentUser} billing=${billing} onActivated=${()=>{setBilling(undefined);reloadBilling();}} onSignOut=${logout}/>`;
    return h`<${WorkspaceLocked} onSignOut=${logout}/>`;
  }

  if(currentUser.role_level==='client'){
    if(ClientPortal)return h`<${ClientPortal} user=${currentUser} onSignOut=${logout}/>`;
    return h`<div style=${{padding:40,textAlign:'center',color:'var(--t2)',fontSize:14}}>Client portal failed to load. Refresh the page or contact AMS.</div>`;
  }
  if(isEditorRole(currentUser.role_level))return h`<div>${banner}<${TasksApp} user=${currentUser} theme=${theme} setTheme=${setTheme} onSignOut=${logout}/>${whatsNew}<${InstallAppBanner}/></div>`;
  return h`<div>${banner}<${DashboardApp} currentUser=${currentUser} theme=${theme} setTheme=${setTheme} onSignOut=${logout} billing=${billing} appName=${appName}/>${whatsNew}<${InstallAppBanner}/></div>`;
}

function HealthBanner({issues,idleWarning}){
  if(idleWarning){
    return h`<div style=${{position:'fixed',top:0,left:0,right:0,zIndex:9999,background:'#B45309',color:'#fff',padding:'8px 16px',fontSize:13,textAlign:'center',fontWeight:500}}>
      <i class="ti ti-clock" style=${{marginRight:6}}></i>You will be signed out in under a minute due to inactivity. Move your mouse to stay signed in.
    </div>`;
  }
  if(!issues||!issues.length)return null;
  return h`<div style=${{position:'fixed',top:0,left:0,right:0,zIndex:9999,background:'#DC2626',color:'#fff',padding:'8px 16px',fontSize:12,fontFamily:'monospace',maxHeight:120,overflowY:'auto'}}>

    ${issues.map((i,k)=>h`<div key=${k}>· ${i}</div>`)}
  </div>`;
}

// ── Install-app banner (mobile, staff shells) ──────────────────────────────
// Shown after login on touch devices at the mobile breakpoint when the app
// isn't already installed. Android/Chrome: native prompt via the stashed
// beforeinstallprompt event (captured in <head> — it fires before login).
// iOS Safari never fires that event, so show Add-to-Home-Screen steps instead.
// Dismissal is remembered for 14 days. The client portal has its own install
// card (Account tab) — this only renders for staff (Dashboard/Tasks) shells.
const INSTALL_DISMISS_KEY='ams_install_dismissed_at';
function InstallAppBanner(){
  const[evt,setEvt]=useState(()=>window._amsInstallEvt||null);
  const[hidden,setHidden]=useState(()=>{
    try{
      const ts=parseInt(localStorage.getItem(INSTALL_DISMISS_KEY)||'0',10);
      return !!ts&&Date.now()-ts<14*24*3600*1000;
    }catch(_){return false;}
  });
  const[standalone,setStandalone]=useState(()=>{
    try{return window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true;}catch(_){return false;}
  });
  const isMobile=useMemo(()=>{
    try{return window.matchMedia('(max-width: 960px)').matches&&window.matchMedia('(pointer: coarse)').matches;}catch(_){return false;}
  },[]);
  const isIos=useMemo(()=>/iPad|iPhone|iPod/.test(navigator.userAgent||'')&&!window.MSStream,[]);
  useEffect(()=>{
    const onCan=()=>setEvt(window._amsInstallEvt||null);
    const onInstalled=()=>{window._amsInstallEvt=null;setEvt(null);setStandalone(true);};
    window.addEventListener('ams-can-install',onCan);
    window.addEventListener('appinstalled',onInstalled);
    return()=>{window.removeEventListener('ams-can-install',onCan);window.removeEventListener('appinstalled',onInstalled);};
  },[]);
  if(hidden||standalone||!isMobile)return null;
  if(!evt&&!isIos)return null; // browser can't install (or prompt already used) — stay quiet
  const dismiss=()=>{try{localStorage.setItem(INSTALL_DISMISS_KEY,String(Date.now()));}catch(_){}setHidden(true);};
  const install=async()=>{
    if(!evt)return;
    try{
      evt.prompt();
      const c=await evt.userChoice;
      if(c&&c.outcome==='accepted'){window._amsInstallEvt=null;setEvt(null);}
    }catch(e){console.warn('[install] prompt failed',e);}
  };
  return h`<div style=${{position:'fixed',left:12,right:12,bottom:'calc(env(safe-area-inset-bottom, 0px) + 70px)',zIndex:60,background:'var(--surface)',backdropFilter:'blur(14px)',WebkitBackdropFilter:'blur(14px)',border:'1px solid var(--bd2)',borderRadius:14,boxShadow:'0 10px 32px rgba(20,20,18,.18)',padding:'12px 14px',display:'flex',alignItems:'center',gap:12}}>
    <img src="icon-192.png" alt="" style=${{width:38,height:38,borderRadius:9,flexShrink:0}}/>
    <div style=${{flex:1,minWidth:0}}>
      <div style=${{fontSize:13.5,fontWeight:600,color:'var(--t1)'}}>Install the app</div>
      <div style=${{fontSize:12,color:'var(--t2)',marginTop:2,lineHeight:1.35}}>
        ${evt?'Add to your home screen for faster access and push alerts.':h`Tap <b>Share</b> → <b>Add to Home Screen</b> to install.`}
      </div>
    </div>
    ${evt?h`<button onClick=${install} style=${{background:'#ff00ee',color:'#fff',border:'none',borderRadius:9,padding:'8px 14px',fontSize:12.5,fontWeight:600,flexShrink:0,whiteSpace:'nowrap'}}><i class="ti ti-download" style=${{marginRight:5}}></i>Install</button>`:null}
    <button onClick=${dismiss} aria-label="Dismiss install banner" style=${{background:'transparent',border:'none',color:'var(--t3)',fontSize:16,padding:4,flexShrink:0}}><i class="ti ti-x"></i></button>
  </div>`;
}

<script>
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(reg => {
      // When a new SW takes control after a deploy, show a non-blocking toast
      // prompting the user to reload onto the new version.
      if (reg.waiting) showUpdateToast();
      reg.addEventListener('updatefound', () => {
        const sw = reg.installing;
        if (!sw) return;
        sw.addEventListener('statechange', () => {
          if (sw.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateToast();
          }
        });
      });
      // Check for updates every 5 min while the tab is open
      setInterval(() => reg.update().catch(()=>{}), 5 * 60 * 1000);
    }).catch(() => {});
  });

  let reloading = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (reloading) return; reloading = true; location.reload();
  });

  function showUpdateToast() {
    if (document.getElementById('ams-upd-toast')) return;
    const d = document.createElement('div');
    d.id = 'ams-upd-toast';
    d.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;padding:12px 16px;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.2);font:500 13px/1.4 -apple-system,sans-serif;display:flex;gap:12px;align-items:center;z-index:99999;';
    d.innerHTML = '<span>A new version is available.</span><button style="background:#fff;color:#1A1A1A;border:none;padding:6px 12px;border-radius:6px;font:500 12px sans-serif;cursor:pointer;">Reload</button>';
    d.querySelector('button').onclick = () => location.reload();
    document.body.appendChild(d);
  }
}
</script>
