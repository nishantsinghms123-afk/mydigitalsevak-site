// Current user accessor for stamping last-edited / audit log. App sets this on login/boot.
let _currentActor=null;
function setCurrentActor(u){_currentActor=u?{name:u.name,email:u.email,role:u.role_level}:null;}
function getCurrentActor(){return _currentActor;}

// PostgREST request headers. Reads/writes still authenticate with the anon key,
// but we also attach the current session token as `x-ams-session` so the DB
// pre-request hook (ams_pre_request) can resolve the caller's org and set the
// per-request `app.current_org` GUC that tenant RLS policies filter on. No token
// (login/public flows) → no header → GUC stays unset → tenant tables fail closed.
function _sbHeaders(extra){
  const h={apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`};
  try{const t=localStorage.getItem('ams_session_token');if(t)h['x-ams-session']=t;}catch(_){}
  return extra?{...h,...extra}:h;
}

// Read helper. Automatically filters soft-deleted rows for known tables UNLESS
// caller passes includeDeleted:true or the querystring already mentions deleted_at.
async function db(t,qs='',{includeDeleted=false}={}){
  let q=qs||'';
  if(!includeDeleted && SOFT_DELETE_TABLES.has(t) && !q.includes('deleted_at')){
    q+='&deleted_at=is.null';
  }
  const r=await fetch(`${SB_URL}/rest/v1/${t}?select=*${q}`,{headers:_sbHeaders()});
  if(!r.ok)throw new Error(`Error ${r.status}`);
  return r.json();
}

async function dbPatch(t,id,data,opts={}){
  const stamped={...data};
  if(LAST_EDITED_TABLES.has(t) && _currentActor && !opts.skipStamp){
    stamped.updated_by=_currentActor.name;
    stamped.updated_at=new Date().toISOString();
  }
  // Capture "before" for audit diff (best-effort, single row).
  let before=null;
  if(!opts.skipAudit && !AUDIT_SKIP_TABLES.has(t)){
    try{const r=await fetch(`${SB_URL}/rest/v1/${t}?id=eq.${id}&select=*`,{headers:_sbHeaders()});if(r.ok){const rows=await r.json();before=rows[0]||null;}}catch(e){}
  }
  const res=await fetch(`${SB_URL}/rest/v1/${t}?id=eq.${id}`,{method:'PATCH',headers:_sbHeaders({'Content-Type':'application/json','Prefer':'return=representation'}),body:JSON.stringify(stamped)});
  if(!opts.skipAudit && !AUDIT_SKIP_TABLES.has(t)){
    // Soft-deletes are logged as 'delete' not 'update', restores as 'restore'.
    const isDelete=Object.prototype.hasOwnProperty.call(data,'deleted_at') && data.deleted_at!=null;
    const isRestore=Object.prototype.hasOwnProperty.call(data,'deleted_at') && data.deleted_at===null && before && before.deleted_at;
    const action=isDelete?'delete':isRestore?'restore':'update';
    logActivity({action,table_name:t,record_id:String(id),record_label:_labelFor(t,before||data),changes:_diffChanges(before,data,action)});
  }
  return res;
}

async function dbInsert(t,data,opts={}){
  let payload=data;
  if(LAST_EDITED_TABLES.has(t) && _currentActor && !opts.skipStamp){
    const stamp={updated_by:_currentActor.name,updated_at:new Date().toISOString()};
    payload=Array.isArray(data)?data.map(r=>({...stamp,...r})):{...stamp,...data};
  }
  const r=await fetch(`${SB_URL}/rest/v1/${t}`,{method:'POST',headers:_sbHeaders({'Content-Type':'application/json','Prefer':'return=representation'}),body:JSON.stringify(payload)});
  if(!r.ok){
    let body='';try{body=await r.text();}catch(_){}
    console.error(`[dbInsert ${t}] ${r.status}`,body,payload);
    throw new Error(`Insert failed (${r.status}): ${body||r.statusText}`);
  }
  const rows=await r.json();
  if(!opts.skipAudit && !AUDIT_SKIP_TABLES.has(t)){
    (Array.isArray(rows)?rows:[rows]).forEach(row=>{
      logActivity({action:'insert',table_name:t,record_id:String(row.id||''),record_label:_labelFor(t,row),changes:null});
    });
  }
  return rows;
}

// Soft delete by default. Pass {hard:true} to permanently purge (Trash → "Delete forever").
async function dbDelete(t,id,opts={}){
  if(opts.hard || !SOFT_DELETE_TABLES.has(t)){
    // Capture label before hard delete
    let label=null;
    if(!opts.skipAudit && !AUDIT_SKIP_TABLES.has(t)){
      try{const r=await fetch(`${SB_URL}/rest/v1/${t}?id=eq.${id}&select=*`,{headers:_sbHeaders()});if(r.ok){const rs=await r.json();label=_labelFor(t,rs[0]||{});}}catch(e){}
    }
    await fetch(`${SB_URL}/rest/v1/${t}?id=eq.${id}`,{method:'DELETE',headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`}});
    if(!opts.skipAudit && !AUDIT_SKIP_TABLES.has(t)){
      logActivity({action:'purge',table_name:t,record_id:String(id),record_label:label,changes:null});
    }
    return;
  }
  // Soft delete = PATCH deleted_at. dbPatch will log it as 'delete'.
  await dbPatch(t,id,{deleted_at:new Date().toISOString()});
}

async function dbRestore(t,id){
  if(!SOFT_DELETE_TABLES.has(t))throw new Error('Table does not support restore');
  await dbPatch(t,id,{deleted_at:null});
}

// Ensure a portal login row exists for this client. Called silently by the
// Send Onboarding flow and by the contact_email edit handler — admin never
// touches team_members directly for client logins. Idempotent: if a row
// already exists, syncs its email to clients.contact_email and returns it.
// If no row exists, inserts a fresh one with password=NULL (client sets it
// on first sign-in via complete_first_login). Returns the row, or null if
// contact_email is missing (caller should surface a user-facing message).
async function ensureClientLogin(client){
  if(!client?.id)return null;
  const email=(client.contact_email||'').trim().toLowerCase();
  // After migration 034 a brand can have N portal logins. We want the PRIMARY
  // (the one tied to clients.contact_email and the one mailed by send-client-welcome).
  // Prefer is_primary_for_brand=true; fall back to the oldest row for legacy brands
  // that haven't been touched since the migration.
  const existing=await db('team_members',`&client_id=eq.${client.id}&role_level=eq.client&order=is_primary_for_brand.desc.nullslast,created_at.asc&limit=1`);
  if(existing?.[0]){
    const row=existing[0];
    if(email&&row.email!==email){
      try{await rpcCall('tm_update_client_login',{p_member_id:row.id,p_data:{email}});row.email=email;}
      catch(e){console.warn('[ensureClientLogin] email sync failed',e?.message);}
    }
    return row;
  }
  if(!email)return null;
  const ini=client.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const row=await rpcCall('tm_create_client_login',{p_data:{
    name:client.name, // stays = brand name for push routing — see migration 034 header
    email,
    client_id:client.id,
    initials:ini,
    color:client.brand_color_primary||'#FF00EE',
    is_primary_for_brand:true, // first member of a brand is always primary
    client_member_name:client.contact_name||null,
  }});
  return row||null;
}

// Add a secondary portal login (multi-user per brand, migration 034). Differs from
// ensureClientLogin in two ways: it never reuses an existing row (we want a brand
// new login per member), and it ALWAYS sets is_primary_for_brand=false so the
// existing primary stays the principal contact for invoices/reports.
//
// memberName: the human's actual name (e.g. "Priya Sharma")
// designation: their title at the brand (e.g. "Co-founder")
async function addBrandMember(client, memberEmail, memberName, designation){
  if(!client?.id||!memberEmail)return{ok:false,error:'missing_args'};
  const email=memberEmail.trim().toLowerCase();
  if(!email.includes('@'))return{ok:false,error:'bad_email'};
  // Duplicate check: block only an ACTIVE login with this email. Revoked/deleted
  // rows free their email for reuse (matches tm_create_client_login, migration 049).
  const dup=await db('team_members',`&email=eq.${encodeURIComponent(email)}&status=neq.revoked&limit=1`);
  if(dup?.[0])return{ok:false,error:'email_already_in_use',existingRow:dup[0]};
  const ini=(memberName||client.name).split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  try{
    const row=await rpcCall('tm_create_client_login',{p_data:{
      name:client.name,                  // stays = brand name (push routing)
      email,
      client_id:client.id,
      initials:ini,
      color:client.brand_color_primary||'#FF00EE',
      is_primary_for_brand:false,
      client_member_name:memberName||null,
      client_designation:designation||null,
    }});
    return{ok:true,row:row||null};
  }catch(e){
    console.warn('[addBrandMember] insert failed',e?.message);
    return{ok:false,error:e?.message||'insert_failed'};
  }
}

// Sync the client portal login's email when admin edits clients.contact_email.
// Pure no-op if no login row exists yet (Send Onboarding will create one with
// the right email later). Non-fatal — sync failure is logged, not surfaced.
async function syncClientLoginEmail(clientId,newEmail){
  if(!clientId||!newEmail)return;
  const emailLc=String(newEmail).trim().toLowerCase();
  if(!emailLc)return;
  try{
    const existing=await db('team_members',`&client_id=eq.${clientId}&role_level=eq.client&select=id,email&limit=1`);
    const row=existing?.[0];
    if(row&&(row.email||'').toLowerCase()!==emailLc){
      await rpcCall('tm_update_client_login',{p_member_id:row.id,p_data:{email:emailLc}});
    }
  }catch(e){console.warn('[syncClientLoginEmail] failed',e?.message);}
}

// ── Session token + RPC gateway ──
// Phase-1 security (migrations 016/017/018): sensitive tables are no longer
// readable/writable via the anon REST endpoint. They live behind SECURITY
// DEFINER RPCs that require a session token issued by verify_login_hash.
// rpcCall is the only legitimate path to those RPCs from the client.
const SESSION_TOKEN_KEY='ams_session_token';
function getSessionToken(){try{return localStorage.getItem(SESSION_TOKEN_KEY)||'';}catch(_){return '';}}
function setSessionToken(t){try{if(t)localStorage.setItem(SESSION_TOKEN_KEY,t);else localStorage.removeItem(SESSION_TOKEN_KEY);}catch(_){}}
function clearSessionToken(){try{localStorage.removeItem(SESSION_TOKEN_KEY);}catch(_){}}

let _onAuthError=null;
function setAuthErrorHandler(fn){_onAuthError=fn;}

// rpcCall(name, args, opts)
//   args: payload object — token auto-injected as p_session
//   opts.allowUnauth: skip the "must have token" precheck (login bootstrap only)
//   opts.silentAuth: don't fire the global auth-error handler on session-expired
//                    errors. Used by best-effort calls (audit log, push subs)
//                    so a stale token doesn't surprise-logout the user.
async function rpcCall(name,args={},opts={}){
  const token=getSessionToken();
  if(!token && !opts.allowUnauth){
    if(!opts.silentAuth)_onAuthError?.('Session expired — please sign in again.');
    throw new Error('auth.no_session');
  }
  const params=token?{p_session:token,...args}:{...args};
  const{data,error}=await supabase.rpc(name,params);
  if(error){
    const msg=String(error.message||'').toLowerCase();
    if(msg.includes('auth.invalid_session')||msg.includes('auth.expired_session')||msg.includes('auth.member_revoked')){
      if(!opts.silentAuth)_onAuthError?.('Your session has expired. Please sign in again.');
      const e=new Error('auth.expired');e.code='auth.expired';throw e;
    }
    if(msg.includes('auth.forbidden')){
      const e=new Error('forbidden');e.code='forbidden';throw e;
    }
    throw error;
  }
  return data;
}

// ── Activity log helpers ──
function _labelFor(t,row){
  if(!row)return null;
  return row.title||row.name||row.note_date||row.month||row.email||(row.id?'#'+row.id:null);
}
function _diffChanges(before,after,action){
  if(action==='insert'||action==='purge'||!before)return null;
  const out={};const keys=Object.keys(after||{});
  keys.forEach(k=>{
    if(k==='updated_at'||k==='updated_by')return;
    const a=before[k];const b=after[k];
    if(JSON.stringify(a)!==JSON.stringify(b))out[k]={old:a,new:b};
  });
  return Object.keys(out).length?out:null;
}
async function logActivity({action,table_name,record_id,record_label,changes}){
  // Post-migration 018, activity_log is no longer directly writable by anon.
  // Actor fields are now stamped server-side from the session token, so the
  // _currentActor read here is just a debug aid — the RPC ignores it.
  try{
    await rpcCall('log_activity_rpc',{
      p_action:action,p_table_name:table_name||null,
      p_record_id:record_id||null,p_record_label:record_label||null,
      p_changes:changes||null,
    },{silentAuth:true});
  }catch(e){/* never let logging break the app */}
}
const safeUrl=u=>{const t=u.trim();return t.startsWith('http')?t:'https://'+t;};
const notifRecipient=(role)=>'role:'+role; // Use role-based recipients for notifications
// Detect platform/source for a reference URL → returns {icon, label, color, display}
function refMeta(raw){
  const url=(raw||'').trim();
  let host='',path='';
  try{const u=new URL(url.startsWith('http')?url:'https://'+url);host=u.hostname.replace(/^www\./,'');path=(u.pathname+u.search).replace(/\/$/,'');}
  catch(_){return{icon:'ti-link',label:'Link',color:'var(--t2)',display:url};}
  const m=(rx)=>rx.test(host);
  let icon='ti-world',label=host,color='var(--t2)';
  if(m(/instagram\.com/)){icon='ti-brand-instagram';label='Instagram';color='#E4405F';}
  else if(m(/pinterest\./)){icon='ti-brand-pinterest';label='Pinterest';color='#E60023';}
  else if(m(/youtube\.com|youtu\.be/)){icon='ti-brand-youtube';label='YouTube';color='#FF0000';}
  else if(m(/tiktok\.com/)){icon='ti-brand-tiktok';label='TikTok';color='var(--t1)';}
  else if(m(/facebook\.com|fb\.com|fb\.watch/)){icon='ti-brand-facebook';label='Facebook';color='#1877F2';}
  else if(m(/(?:^|\.)x\.com|twitter\.com/)){icon='ti-brand-x';label='X';color='var(--t1)';}
  else if(m(/linkedin\.com/)){icon='ti-brand-linkedin';label='LinkedIn';color='#0A66C2';}
  else if(m(/dribbble\.com/)){icon='ti-brand-dribbble';label='Dribbble';color='#EA4C89';}
  else if(m(/behance\.net/)){icon='ti-brand-behance';label='Behance';color='#1769FF';}
  else if(m(/vimeo\.com/)){icon='ti-brand-vimeo';label='Vimeo';color='#1AB7EA';}
  else if(m(/threads\.(net|com)/)){icon='ti-brand-threads';label='Threads';color='var(--t1)';}

// PushSubscription with the browser's push service and persist it in
// push_subscriptions; the send-push Edge Function then signs Web Push
// messages and POSTs to each endpoint.
function urlBase64ToUint8Array(b64){
  const pad='='.repeat((4-b64.length%4)%4);
  const s=(b64+pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(s);const out=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++)out[i]=raw.charCodeAt(i);

// Persist {user_name, role, token} in IndexedDB for sw.js's pushsubscriptionchange
// handler — a Service Worker can't read localStorage, and without this context it
// couldn't re-save a rotated subscription (the x-ams-session token is what lets the
// FORCE-RLS insert on push_subscriptions pass).
function _pushCtxSave(ctx){
  return new Promise((resolve)=>{
    try{
      const open=indexedDB.open('ams-push',1);
      open.onupgradeneeded=()=>{try{open.result.createObjectStore('ctx');}catch(_){}};
      open.onerror=()=>resolve(false);
      open.onsuccess=()=>{

          const idb=open.result;const tx=idb.transaction('ctx','readwrite');
          tx.objectStore('ctx').put(ctx,'me');
          tx.oncomplete=()=>{idb.close();resolve(true);};
          tx.onerror=()=>{idb.close();resolve(false);};
        }catch(_){resolve(false);}

    }catch(_){resolve(false);}

}
async function subscribeToPush(user){
  if(!user||!user.name)return null;
  if(typeof Notification==='undefined'||Notification.permission!=='granted')return null;
  if(!('serviceWorker' in navigator)||!('PushManager' in window))return null;
  try{
    const reg=await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(sub){
      // If the server's VAPID key ever rotates, the old subscription signs against
      // the wrong key and every push 403s — drop it and re-subscribe fresh.
      try{
        const k=sub.options&&sub.options.applicationServerKey;
        if(k&&_bufToB64url(k)!==VAPID_PUBLIC_KEY){await sub.unsubscribe();sub=null;}
      }catch(_){}
    }
    if(!sub){
      sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlBase64ToUint8Array(VAPID_PUBLIC_KEY)});
    }
    const json=sub.toJSON();
    const row={
      endpoint:json.endpoint,
      p256dh:json.keys&&json.keys.p256dh,
      auth:json.keys&&json.keys.auth,
      user_name:user.name,
      role:user.role_level||null,
      user_agent:(typeof navigator!=='undefined'?String(navigator.userAgent||'').slice(0,300):null),
      last_used_at:new Date().toISOString(),
      failed_count:0,
    };
    // installTenantFetch attaches x-ams-session here, which sets the org GUC the
    // FORCE-RLS policy on push_subscriptions checks — without a live session this
    // write fails closed, so surface the status instead of ignoring it.
    const res=await fetch(`${SB_URL}/rest/v1/push_subscriptions?on_conflict=endpoint`,{
      method:'POST',
      headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify([row]),
    });
    if(!res.ok){
      const detail=await res.text().catch(()=>'');
      console.warn('[push] subscription save failed',res.status,detail.slice(0,200));
      return null;
    }
    _pushCtxSave({user_name:user.name,role:user.role_level||null,token:localStorage.getItem('ams_session_token')||null,saved_at:new Date().toISOString()});
    console.info('[push] subscribed',{user:user.name,endpoint:json.endpoint.slice(0,60)+'…'});
    return sub;
  }catch(e){console.warn('[push] subscribe failed',e?.message||e);return null;}
}

// Recipient grammar:
//   'all'                     → broadcast
//   '<Name>'                  → direct to that user
//   'role:r1[,r2,...]'        → any of those roles
//   'role:r1[,r2,...]!Actor'  → those roles, EXCLUDING the actor (self-skip)
function isNotifForUser(n,user){
  if(!n||!user)return false;
  const r=n.recipient||'';
  if(r==='all')return true;
  if(r===user.name)return true;
  if(r.startsWith('role:')){
    const[rolesPart,excl]=r.slice(5).split('!');
    const roles=rolesPart.split(',').map(s=>s.trim()).filter(Boolean);
    if(!roles.includes(user.role_level))return false;
    if(excl&&excl===user.name)return false;
    return true;
  }
  return false;
}

// Request a fresh Sheets-write access token via GIS popup. Returns the token or throws.
function signInGoogleForSheets(){
  return new Promise((resolve,reject)=>{
    const clientId=getGoogleOAuthClientId();
    if(!clientId)return reject(new Error('No Google OAuth Client ID configured. Set one in Settings → Integrations.'));
    if(!window.google?.accounts?.oauth2)return reject(new Error('Google Identity Services not loaded yet. Refresh the page.'));
    try{
      const client=window.google.accounts.oauth2.initTokenClient({
        client_id:clientId,
        scope:'https://www.googleapis.com/auth/spreadsheets',
        callback:(resp)=>{
          if(resp.error)return reject(new Error(resp.error_description||resp.error));
          if(!resp.access_token)return reject(new Error('No access token returned'));
          _setGoogleAccessToken(resp.access_token,resp.expires_in||3600);
          resolve(resp.access_token);
        },
      });
      client.requestAccessToken({prompt:''});
    }catch(e){reject(e);}
  });
}

// Bump a recurring task forward when prior instance is done. Called on app load.
async function dtSpawnRecurring(){
  try{
    const rows=await db('direct_tasks',`&recurring=neq.none&status=eq.done&order=completed_at.desc&limit=80`);
    const now=new Date();
    for(const r of rows){
      // Only the most recent in each series spawns the next, so dedupe by parent series id.
      if(!r.completed_at)continue;
      const seriesId=r.recurring_parent_id||r.id;
      // Has any task in this series been created after this one's completion?
      const newer=await db('direct_tasks',`&or=(id.eq.${seriesId},recurring_parent_id.eq.${seriesId})&created_at=gt.${encodeURIComponent(r.completed_at)}&limit=1`);
      if(newer.length)continue;
      const completedAt=new Date(r.completed_at);
      let nextDue=new Date(completedAt);
      if(r.recurring==='daily')nextDue.setDate(nextDue.getDate()+1);
      else if(r.recurring==='weekly')nextDue.setDate(nextDue.getDate()+7);
      else if(r.recurring==='monthly')nextDue.setMonth(nextDue.getMonth()+1);
      else continue;
      if(nextDue>now)continue; // not time yet
      const payload={
        title:r.title,description:r.description,assignee:r.assignee,assigned_by:r.assigned_by,
        priority:r.priority,status:'new',expected_completion:dtExpectedDefault(r.priority),
        linked_client_id:r.linked_client_id,recurring:r.recurring,recurring_parent_id:seriesId,
      };
      try{const newRows=await dbInsert('direct_tasks',[payload],{skipAudit:true,skipStamp:true});

// Fetch the current-month instance, lazily cloning from template on first read.
// Returns the instance row, or null if no template exists yet.
async function ensureScopeInstance(clientId,monthOverride,yearOverride){
  if(!clientId)return null;
  const{month,year}=monthOverride&&yearOverride?{month:monthOverride,year:yearOverride}:currentScopePeriod();
  try{
    const existing=await db('monthly_scope_instances',`&client_id=eq.${clientId}&month=eq.${month}&year=eq.${year}`);
    if(existing&&existing[0])return existing[0];
    const tpl=await db('client_scope_templates',`&client_id=eq.${clientId}`);
    const items=Array.isArray(tpl?.[0]?.line_items)?tpl[0].line_items:[];
    if(items.length===0)return null;
    const rows=await dbInsert('monthly_scope_instances',[{client_id:clientId,month,year,line_items:items}]);
    return rows?.[0]||null;
  }catch(e){console.warn('[scope] ensure failed',e);return null;}
}
// Counts completed posts per line item id. "completed" = post is in-scope, linked, and production_done.
function computeScopeUsage(instance,posts){
  if(!instance||!Array.isArray(instance.line_items))return{items:[],counts:{}};
  const counts={};
  (posts||[]).forEach(p=>{
    if(p.is_out_of_scope)return;
    if(!p.scope_line_item_id)return;
    if(!p.production_done)return;
    counts[p.scope_line_item_id]=(counts[p.scope_line_item_id]||0)+1;
  });
  const items=instance.line_items.map(li=>{
    const completed=counts[li.id]||0;
    const qty=parseInt(li.quantity)||0;
    const pct=qty>0?Math.min(Math.round(completed/qty*100),999):0;
    const tone=qty===0?'ok':completed>qty?'over':completed/qty>=0.8?'warn':'ok';
    return{...li,completed,remaining:Math.max(qty-completed,0),pct,tone};
  });
  return{items,counts};
}
// Best-effort auto-link of a post to a scope deliverable by its type, so marking
// a post production-done actually moves the scope counter (which only counts posts
// that are linked to a line item). Returns a line_item id or null. Matching is
// confident for reels (unit 'reels'/'videos') and name keywords; otherwise falls
// back to the primary Social Media deliverable. Ambiguous cases stay unlinked.
function autoScopeLineItem(lineItems,type){
  const items=Array.isArray(lineItems)?lineItems:[];
  if(!items.length)return null;
  const nm=it=>String(it.name||'').toLowerCase();
  const un=it=>String(it.unit||'').toLowerCase();
  const find=fn=>items.find(fn);
  let hit=null;
  if(type==='reel')          hit=find(it=>un(it)==='reels'||un(it)==='videos')||find(it=>/reel|video/.test(nm(it)));
  else if(type==='carousel') hit=find(it=>/carousel/.test(nm(it)));
  else if(type==='creative') hit=find(it=>/creative|static|design|post/.test(nm(it)));
  else if(type==='extra')    hit=find(it=>/extra|misc|story|stories/.test(nm(it)))||find(it=>String(it.category||'')==='Content');
  if(!hit)hit=find(it=>String(it.category||'')==='Social Media');
  return hit?hit.id:null;
}

// Side effects when a task is marked out-of-scope:
// 1) notify manager immediately
// 2) if crossing 3 OOS in the current month for this client, alert admin (dedup via instance.threshold_alert_sent)
async function handleOosMarked(post,currentUser,clientName){
  const actor=currentUser?.name||'Someone';
  const title=post.title||'a task';
  insertNotif('role:manager!'+actor,'⚠️ Out-of-scope task flagged',`${actor} marked "${title}" as out of scope${clientName?' for '+clientName:''}`,'alert',clientName||null,title,'content',post.id);
  if(!post.client_id)return;
  const{month,year}=currentScopePeriod();
  const start=`${year}-${String(month).padStart(2,'0')}-01`;
  const last=new Date(year,month,0);
  const end=`${year}-${String(month).padStart(2,'0')}-${String(last.getDate()).padStart(2,'0')}`;
  try{
    const oos=await db('content',`&client_id=eq.${post.client_id}&is_out_of_scope=eq.true&post_date=gte.${start}&post_date=lte.${end}`).catch(()=>[]);
    if(oos.length>=3){
      const inst=await ensureScopeInstance(post.client_id,month,year);
      if(inst&&!inst.threshold_alert_sent){
        insertNotif('role:admin',`⚠️ ${clientName||'A client'} has ${oos.length} out-of-scope tasks this month`,`${clientName||'This client'} has ${oos.length} out-of-scope tasks in ${scopePeriodLabel(month,year)}. Consider a billing conversation.`,'alert',clientName||null,null,'client',post.client_id);
        try{await dbPatch('monthly_scope_instances',inst.id,{threshold_alert_sent:true});}catch(_){}
      }
    }
  }catch(e){console.warn('[scope] threshold check failed',e);}
}

function EText({value,onSave,placeholder='Click to edit',multiline,url}){
  const[editing,setEditing]=useState(false);const[val,setVal]=useState(value||'');const ref=useRef();
  useEffect(()=>{setVal(value||'');},[value]);
  // Auto-grow the textarea to its content height so clicking never shrinks the box.
  const autosize=(el)=>{if(!el)return;el.style.height='auto';el.style.height=el.scrollHeight+'px';};
  useEffect(()=>{if(editing&&ref.current){ref.current.focus();if(multiline)autosize(ref.current);}},[editing]);
  const commit=()=>{setEditing(false);const v=val.trim();if(v!==(value||''))onSave(v||null);};
  const kd=(e)=>{if(!multiline&&e.key==='Enter'){e.preventDefault();commit();}if(e.key==='Escape'){setEditing(false);setVal(value||'');}};
  if(editing){
    if(multiline){
      // rows hint sizes the textarea before the autosize effect runs → no flash of small box.
      const rows=Math.max(2,(val||'').split('\n').length);
      return h`<textarea ref=${ref} class="fi et-edit-area" rows=${rows} placeholder=${placeholder} onInput=${e=>{setVal(e.target.value);autosize(e.target);}} onBlur=${commit} onKeyDown=${kd}>${val}</textarea>`;
    }
    return h`<input ref=${ref} class="fi" type="text" value=${val} placeholder=${placeholder} onInput=${e=>setVal(e.target.value)} onBlur=${commit} onKeyDown=${kd}/>`;
  }
  if(url&&val)return h`<div style=${{display:'flex',alignItems:'center',gap:8}}><a href=${val} target="_blank" class="et-link"><i class="ti ti-external-link" style=${{fontSize:13}}></i>Open</a><button class="icon-btn" style=${{width:24,height:24,fontSize:12}} onClick=${()=>setEditing(true)}><i class="ti ti-pencil"></i></button></div>`;
  return h`<div class=${'et'+(val?'':' empty')+(multiline?' et-multi':'')} onClick=${()=>setEditing(true)}>${val||placeholder}</div>`;
}

/* Reference list — newline-separated reference_links rendered as compact source-tagged cards.
   Replaces the previous multiline textarea (collapsed when clicked) + "Ref N" pill row. */
function RefList({value,onSave}){
  const refs=(value||'').split('\n').map(s=>s.trim()).filter(Boolean);
  const[adding,setAdding]=useState(false);
  const[draft,setDraft]=useState('');
  const inputRef=useRef();
  useEffect(()=>{if(adding&&inputRef.current)inputRef.current.focus();},[adding]);
  const commit=(next)=>{onSave(next.length?next.join('\n'):null);};
  const handleAdd=()=>{
    const v=draft.trim();
    setDraft('');setAdding(false);
    if(!v)return;
    // Allow paste of multiple URLs (one per line / comma / whitespace)
    const parts=v.split(/[\n,]+|\s{2,}/).map(s=>s.trim()).filter(Boolean);
    commit([...refs,...parts]);
  };
  const handleKey=(e)=>{
    if(e.key==='Enter'){e.preventDefault();handleAdd();}
    else if(e.key==='Escape'){e.preventDefault();setDraft('');setAdding(false);}
  };
  const remove=(idx)=>commit(refs.filter((_,i)=>i!==idx));
  return h`<div class="ref-list">
    ${refs.length===0&&!adding&&h`<div class="ref-empty">No references yet — add inspiration links.</div>`}
    ${refs.map((url,i)=>{const m=refMeta(url);return h`<a key=${i+'-'+url} class="ref-card" href=${safeUrl(url)} target="_blank" rel="noopener" title=${url} onClick=${e=>e.stopPropagation()}>
      <span class="ref-ico" style=${{color:m.color}}><i class=${'ti '+m.icon}></i></span>
      <span class="ref-text"><span class="ref-src">${m.label}</span><span class="ref-url">${m.display}</span></span>
      <i class="ti ti-external-link ref-open"></i>
      <button type="button" class="ref-del" title="Remove" aria-label="Remove reference" onClick=${e=>{e.preventDefault();e.stopPropagation();remove(i);}}><i class="ti ti-x"></i></button>
    </a>`;})}
    ${adding
      ?h`<div class="ref-add-row">
          <i class="ti ti-link ref-add-row-ico"></i>
          <input ref=${inputRef} type="url" inputmode="url" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="Paste a reference URL and press Enter…" value=${draft} onInput=${e=>setDraft(e.target.value)} onKeyDown=${handleKey} onBlur=${handleAdd}/>
        </div>`
      :h`<button type="button" class="ref-add" onClick=${()=>setAdding(true)}><i class="ti ti-plus"></i>${refs.length?'Add another':'Add reference'}</button>`}
  </div>`;
}

// Legacy SHA-256 (unsalted) — kept for verifying old hashes during the migration window.
const hashPwdLegacy=async(p)=>{const d=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p));return[...new Uint8Array(d)].map(b=>b.toString(16).padStart(2,'0')).join('');};
// Modern PBKDF2 (SHA-256, 150k iters) with a per-user random salt.
const _b2h=(b)=>[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
const _h2b=(h)=>{const a=new Uint8Array(h.length/2);for(let i=0;i<a.length;i++)a[i]=parseInt(h.slice(i*2,i*2+2),16);return a;};
async function newSalt(){const s=new Uint8Array(16);crypto.getRandomValues(s);return _b2h(s);}
async function hashPwdPbkdf2(p,saltHex){
  const enc=new TextEncoder();
  const key=await crypto.subtle.importKey('raw',enc.encode(p),{name:'PBKDF2'},false,['deriveBits']);
  const bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt:_h2b(saltHex),iterations:150000,hash:'SHA-256'},key,256);
  return _b2h(bits);
}
// Unified hash for storing a NEW password — returns {hash, salt, algo}.
async function hashPwd(p){
  const salt=await newSalt();
  const hash=await hashPwdPbkdf2(p,salt);
  return{hash,salt,algo:'pbkdf2'};
}
// Verify any password against a member row, regardless of algo. Returns boolean.
async function verifyPwd(member,attempt){
  if(!member?.password||!attempt)return false;
  if(member.password_algo==='pbkdf2'&&member.password_salt){
    return await hashPwdPbkdf2(attempt,member.password_salt)===member.password;
  }
  // Fallback: legacy unsalted SHA-256
  return await hashPwdLegacy(attempt)===member.password;
}
// ── Login throttle (client-side, per email per browser) ──
const LOGIN_LOCK_KEY='ams_login_lock';const LOGIN_MAX_FAILS=5;const LOGIN_LOCK_MIN=15;
function _loginLockMap(){try{return JSON.parse(localStorage.getItem(LOGIN_LOCK_KEY)||'{}');}catch(e){return{};}}
function _loginLockSave(m){try{localStorage.setItem(LOGIN_LOCK_KEY,JSON.stringify(m));}catch(e){}}
function loginLockCheck(email){
  const m=_loginLockMap();const r=m[email];if(!r)return{locked:false};
  if(r.until&&Date.now()<r.until){return{locked:true,minsLeft:Math.max(1,Math.ceil((r.until-Date.now())/60000))};}
  if(r.until&&Date.now()>=r.until){delete m[email];_loginLockSave(m);}
  return{locked:false};
}
function loginLockMiss(email){
  const m=_loginLockMap();const r=m[email]||{fails:0};
  r.fails=(r.fails||0)+1;
  if(r.fails>=LOGIN_MAX_FAILS){r.until=Date.now()+LOGIN_LOCK_MIN*60000;}
  m[email]=r;_loginLockSave(m);
  return Math.max(0,LOGIN_MAX_FAILS-r.fails);
}
function loginLockClear(email){const m=_loginLockMap();delete m[email];_loginLockSave(m);}

// After a successful login on a legacy hash, transparently upgrade to PBKDF2.
async function upgradeLegacyHash(member,plaintext){
  if(member.password_algo==='pbkdf2')return member;
  try{
    const{hash,salt,algo}=await hashPwd(plaintext);
    await rpcCall('tm_upgrade_hash',{p_hash:hash,p_salt:salt,p_algo:algo},{silentAuth:true});
    return{...member,password:hash,password_salt:salt,password_algo:algo};
  }catch(e){console.warn('[auth] hash upgrade failed',e);return member;}
}

/* ── "Sign in with Google" for login + signup ──────────────────────────────
   A second door onto the existing session-token model: GIS hands us an access
   token, the google-auth Edge Function verifies it (audience + email_verified)
   and links/provisions via the google_auth_login RPC, returning the same payload
   as verify_login_hash. Distinct from signInGoogleForSheets above — that uses the
   per-user Settings client id + Sheets scope; THIS uses a fixed app-level client
   id so login works before anyone is signed in. Paste your OAuth Web client id
   below (Google Cloud Console → Credentials → OAuth client ID → Web application).
   Empty ⇒ the Google buttons stay hidden and password login is unaffected. */
const GOOGLE_LOGIN_CLIENT_ID='303699897771-m8965iltf5lukofs9a0kkgmelhgap175.apps.googleusercontent.com';
const googleLoginEnabled=()=>!!GOOGLE_LOGIN_CLIENT_ID;
// intent: 'login' (existing accounts only) | 'signup' (may create a new org).
// Resolves to the verify_login_hash-shaped payload, or rejects with err.code set
// to the server code ('no_account', 'org_name_required', …).
function googleSignIn(intent,orgName){
  return new Promise((resolve,reject)=>{
    if(!GOOGLE_LOGIN_CLIENT_ID)return reject(new Error('Google sign-in isn’t configured yet.'));
    if(!window.google?.accounts?.oauth2)return reject(new Error('Google services are still loading — refresh and try again.'));
    let settled=false;
    const client=window.google.accounts.oauth2.initTokenClient({
      client_id:GOOGLE_LOGIN_CLIENT_ID,
      scope:'openid email profile',
      callback:async(resp)=>{
        if(settled)return; settled=true;
        if(resp.error||!resp.access_token)return reject(new Error('Google sign-in was cancelled.'));
        try{
          const r=await fetch(`${SB_URL}/functions/v1/google-auth`,{
            method:'POST',
            headers:{'Content-Type':'application/json',Authorization:`Bearer ${SB_KEY}`,apikey:SB_KEY},
            body:JSON.stringify({access_token:resp.access_token,intent:intent||'login',org_name:orgName||''}),
          });
          const data=await r.json().catch(()=>({}));
          if(!r.ok||data.error)return reject(Object.assign(new Error(data.message||data.error||'google_failed'),{code:data.error}));
          resolve(data);
        }catch(_){ reject(new Error('Network error during Google sign-in.')); }
      },
      error_callback:()=>{ if(!settled){settled=true;reject(new Error('Google sign-in was cancelled.'));} },
    });
    client.requestAccessToken();
  });
}

function PwdInput({val,setVal,placeholder,label,showPwd,setShowPwd,onEnter,autoComplete}){
  const inputId=React.useId();
  return h`<div class="auth-field">
    ${label&&h`<label class="auth-label" for=${inputId}>${label}</label>`}
    <div class="auth-pwd">
      <input id=${inputId} class="auth-input" type=${showPwd?'text':'password'} placeholder=${placeholder} value=${val} onInput=${e=>setVal(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&onEnter&&onEnter()} style=${{paddingRight:46}} autoComplete=${autoComplete}/>
      <button type="button" class="auth-pwd-toggle" onClick=${()=>setShowPwd(!showPwd)} aria-label=${showPwd?'Hide password':'Show password'}>
        <i class=${'ti '+(showPwd?'ti-eye-off':'ti-eye')}></i>
      </button>
    </div>
  </div>`;
}
function LoginPage({onLogin,initialEmail}){
  const[step,setStep]=useState('login'); // 'login' | 'setpwd'
  const[email,setEmail]=useState(initialEmail||'');
  const[password,setPassword]=useState('');
  const[newPwd,setNewPwd]=useState('');
  const[confirmPwd,setConfirmPwd]=useState('');
  const[showPwd,setShowPwd]=useState(false);
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState('');
  const[foundUser,setFoundUser]=useState(null);
  const[quote]=useState(pickAmsQuote);
  const[chipsIn,setChipsIn]=useState(false);
  // Forgot-password flow state: 'idle' | 'sending' | 'sent'. Same Always-OK
  // response from the RPC means we never reveal whether the email matched —
  // the UX just says "if we have your account, an email is on its way".
  const[forgotState,setForgotState]=useState('idle');
  const[gLoading,setGLoading]=useState(false);
  const googleLogin=async()=>{
    setGLoading(true);setErr('');
    try{
      const res=await googleSignIn('login');
      if(res.session_token)setSessionToken(res.session_token);
      onLogin(res);
    }catch(e){
      setErr(e.code==='no_account'
        ? 'No workspace is linked to that Google account. Tap “Start a free trial” below to create one.'
        : (e.message||'Google sign-in failed. Try again.'));
      setGLoading(false);
    }
  };
  const requestReset=async()=>{
    const e=(email||'').trim().toLowerCase();
    if(!e||!e.includes('@')){setErr('Type your email above first, then tap Forgot password.');return;}
    setForgotState('sending');setErr('');
    try{await supabase.rpc('request_password_reset',{p_email:e});}
    catch(_){/* RPC always returns ok regardless; swallow */}
    setForgotState('sent');
  };
  useEffect(()=>{const t=setTimeout(()=>setChipsIn(true),250);return()=>clearTimeout(t);},[]);

  const login=async()=>{
    if(!email.trim())return;
    const emailLc=email.trim().toLowerCase();
    // Brute-force throttle: 5 wrong tries → 15min cooldown per email per browser.
    const lock=loginLockCheck(emailLc);
    if(lock.locked){setErr(`Too many failed attempts. Try again in ${lock.minsLeft} min.`);return;}
    setLoading(true);setErr('');
    try{
      // Pre-login email lookup via anon-callable SECURITY DEFINER RPC (migration
      // 054). We can't read team_members directly anymore — once it has tenant RLS
      // (055) an anon request with no session resolves to no org and the row read
      // returns nothing. login_lookup bypasses RLS and returns ONLY the non-secret
      // salt/algo + status the form needs to compute the hash and branch.
      const look=await supabase.rpc('login_lookup',{p_email:emailLc});
      const info=(look&&!look.error)?look.data:null;
      if(!info||!info.found){setErr('This email is not in the workspace. Ask your workspace admin to add you.');setLoading(false);return;}
      if(info.is_removed){setErr('This account has been removed. Ask your workspace admin for access.');setLoading(false);return;}
      // Minimal stand-in for the old full row; verify_login_hash returns the rest.
      const member={id:info.id,password_algo:info.password_algo,password_salt:info.password_salt,status:info.status};
      // Compute the candidate hash client-side using whatever algo/salt the row already has.
      // First-login rows (no password) default to legacy SHA-256 — the RPC ignores the hash
      // in that branch anyway.
      const algo=member.password_algo||'sha256';
      const computedHash=(algo==='pbkdf2'&&member.password_salt)
        ? await hashPwdPbkdf2(password,member.password_salt)
        : await hashPwdLegacy(password);
      // Server-side verification via SECURITY DEFINER RPC. After the
      // 008_lock_password_column_and_realtime migration the anon role can no longer
      // read team_members.password, so this RPC is the only way to validate.
      let result=null;let rpcOk=false;
      try{
        const rpc=await supabase.rpc('verify_login_hash',{p_email:emailLc,p_hash:computedHash});
        if(!rpc.error){result=rpc.data;rpcOk=true;}
      }catch(e){console.log('[ams-debug] verify_login_hash threw:',e);}
      // verify_login_hash is required now (no readable password column to fall back on).
      if(!rpcOk){setErr('Login server error. Please refresh and try again.');setLoading(false);return;}
      if(result?.first_login){setFoundUser({...member,...result});setStep('setpwd');setLoading(false);return;}
      if(result?.success){
        loginLockClear(emailLc);
        // Persist the session token issued by verify_login_hash. Every gated
        // RPC (financial / audit / etc.) reads this token from localStorage.
        if(result.session_token){setSessionToken(result.session_token);}
        else if(rpcOk){
          // RPC path returned success but no token — means migration 016 was
          // applied without the verify_login_hash v2 update. Block login so
          // the user sees a clear error instead of an auth-loop on the next
          // gated RPC.
          setErr('Login server is on an old version. Re-run migrations/016_session_tokens.sql in Supabase Studio, then refresh.');
          setLoading(false);return;
        }
        if(!rpcOk){
          // Legacy path also has to do its own bookkeeping that the RPC handles itself.
          try{await dbPatch('team_members',member.id,{last_login_at:new Date().toISOString(),failed_logins:0},{skipAudit:true,skipStamp:true});}catch(e){}
        }
        // Transparently upgrade legacy SHA-256 hashes to PBKDF2 on successful login.
        if((result.password_algo||member.password_algo)!=='pbkdf2'){
          try{
            const{hash,salt,algo}=await hashPwd(password);
            await rpcCall('tm_upgrade_hash',{p_hash:hash,p_salt:salt,p_algo:algo},{silentAuth:true});
            result.password_algo=algo;result.password_salt=salt;
          }catch(_){}
        }
        logActivity({action:'login',table_name:'team_members',record_id:String(result.id),record_label:result.name,changes:null});
        // Backfill columns the RPC doesn't return (e.g. client_id, capacity). The pre-RPC
        // `member` row is select=*, so anything missing from `result` is filled in from it.
        onLogin({...member,...result});
      } else {
        const remaining=loginLockMiss(emailLc);
        setErr(remaining>0?`Incorrect password. ${remaining} attempt${remaining===1?'':'s'} left before lockout.`:`Too many failed attempts. Try again in ${LOGIN_LOCK_MIN} min.`);
        // Audit the failed attempt via the unauthenticated narrow RPC (since
        // we don't have a session token to use log_activity_rpc).
        try{await supabase.rpc('log_login_failed',{p_email:emailLc});}catch(_){}
        if(!rpcOk){
          try{await dbPatch('team_members',member.id,{failed_logins:(member.failed_logins||0)+1},{skipAudit:true,skipStamp:true});}catch(e){}
        }
        logActivity({action:'login_failed',table_name:'team_members',record_id:String(member.id),record_label:member.name,changes:null});
      }
    }catch(e){console.warn('[login] failed',e);setErr('Connection error. Try again.');}
    finally{setLoading(false);}
  };

  const setPwd=async()=>{
    if(newPwd.length<6){setErr('Password must be at least 6 characters.');return;}
    if(newPwd!==confirmPwd){setErr('Passwords do not match.');return;}
    setLoading(true);setErr('');
    try{
      const{hash,salt,algo}=await hashPwd(newPwd);
      // complete_first_login (migration 016) atomically writes the password
      // + issues a session token. Falls back to the legacy dbPatch path if
      // the RPC isn't deployed yet (pre-016 DB).
      let rpcResult=null;
      try{
        const rpc=await supabase.rpc('complete_first_login',{p_email:(foundUser.email||'').toLowerCase(),p_hash:hash,p_salt:salt,p_algo:algo});
        if(!rpc.error&&rpc.data?.success)rpcResult=rpc.data;
      }catch(_){}
      if(rpcResult){
        if(rpcResult.session_token)setSessionToken(rpcResult.session_token);
        onLogin({...foundUser,...rpcResult,password:hash,password_salt:salt,password_algo:algo,status:'active'});
      }else{
        await dbPatch('team_members',foundUser.id,{password:hash,password_salt:salt,password_algo:algo,status:'active'},{skipAudit:true,skipStamp:true});
        onLogin({...foundUser,password:hash,password_salt:salt,password_algo:algo,status:'active'});
      }
    }catch(e){setErr('Failed to set password. Try again.');}
    finally{setLoading(false);}
  };

  // Quote panel — shared between login + setpwd steps
  const today=new Date();
  const dateStr=today.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}).toUpperCase();
  const weekStart=new Date(today);weekStart.setDate(today.getDate()-today.getDay());
  const weekDays=['SUN','MON','TUE','WED','THU','FRI','SAT'].map((d,i)=>{const dt=new Date(weekStart);dt.setDate(weekStart.getDate()+i);return{label:d,date:dt.getDate(),on:dt.toDateString()===today.toDateString()};});
  const qWords=quote.replace(/^["“”]+|["“”]+$/g,'').split(' ');
  const quotePanel=h`<div class="auth-quote-side" aria-hidden="true">
    <div class="auth-aurora"></div>
    <div class="auth-grain"></div>
    <div class="auth-quote-wrap">
      <div class="auth-quote-head">
        <span class="live"><span class="pulse"></span>AMS · Workspace</span>
        <span>${dateStr}</span>
      </div>
      <div class="auth-quote-body">
        <p class="auth-quote"><span class="qm">“</span>${qWords.map((w,i)=>h`<span class="w" style=${{'--i':i}}>${w}</span>`)}<span class="qm" style=${{marginLeft:'-.05em'}}>”</span></p>
      </div>
    </div>
    <div class=${'auth-chip auth-chip-1'+(chipsIn?' in':'')}>
      <span class="auth-chip-dot"></span>
      <span><strong>Today’s briefs</strong><span class="meta">3 in production · 2 due</span></span>
    </div>
    <div class=${'auth-chip auth-chip-2'+(chipsIn?' in':'')}>
      <div class="auth-chip-bar" aria-hidden="true">
        <i style=${{height:'40%'}}></i><i style=${{height:'72%'}}></i><i style=${{height:'58%'}}></i><i style=${{height:'90%'}}></i><i style=${{height:'66%'}}></i>
      </div>
      <span><strong>+38% engagement</strong><span class="meta">Last 7 days</span></span>
    </div>
    <div class=${'auth-chip auth-chip-3'+(chipsIn?' in':'')}>
      <div class="auth-chip-cal">
        ${weekDays.map(d=>h`<span class=${'d'+(d.on?' on':'')}>${d.label}<b>${d.date}</b></span>`)}
      </div>
    </div>
  </div>`;

  const brandBadge=h`<div class="auth-brand"><span class="auth-brand-mark">M</span>My Digital Sevak</div>`;

  if(step==='setpwd')return h`<div class="auth-stage">
    <div class="auth-shell">
      <div class="auth-form-side">
        <div class="auth-foot-top">${brandBadge}</div>
        <div class="auth-form-inner">
          <h1 class="auth-h1">Set your password</h1>
          <p class="auth-sub">First time signing in, ${foundUser?.name?.split(' ')[0]||'there'}. Choose a password to secure your account.</p>
          <${PwdInput} val=${newPwd} setVal=${setNewPwd} placeholder="Choose a password" label="New password" showPwd=${showPwd} setShowPwd=${setShowPwd} onEnter=${setPwd} autoComplete="new-password"/>
          <${PwdInput} val=${confirmPwd} setVal=${setConfirmPwd} placeholder="Confirm password" label="Confirm password" showPwd=${showPwd} setShowPwd=${setShowPwd} onEnter=${setPwd} autoComplete="new-password"/>
          ${err&&h`<div class="auth-error"><i class="ti ti-alert-circle"></i>${err}</div>`}
          <button class="auth-submit" onClick=${setPwd} disabled=${loading||!newPwd||!confirmPwd}>
            ${loading?[h`<i class="ti ti-loader-2 spinner"></i>`,' Setting password…']:[h`<i class="ti ti-check"></i>`,' Set password & sign in']}
          </button>
          <div class="auth-foot"><span>Need help? Contact your workspace admin.</span></div>
        </div>
      </div>
      ${quotePanel}
    </div>
  </div>`;

  return h`<div class="auth-stage">
    <div class="auth-shell">
      <div class="auth-form-side">
        <div class="auth-foot-top">${brandBadge}</div>
        <div class="auth-form-inner">
          <h1 class="auth-h1">Welcome back</h1>
          <p class="auth-sub">Sign in with your workspace credentials to continue.</p>
          <div class="auth-field">
            <label class="auth-label" for="auth-email">Email</label>
            <input id="auth-email" class="auth-input" placeholder="you@agency.com" value=${email} onInput=${e=>setEmail(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&login()} autoComplete="email"/>
          </div>
          <${PwdInput} val=${password} setVal=${setPassword} placeholder="Your password (leave blank for first sign-in)" label="Password" showPwd=${showPwd} setShowPwd=${setShowPwd} onEnter=${login} autoComplete="current-password"/>
          ${err&&h`<div class="auth-error"><i class="ti ti-alert-circle"></i>${err}</div>`}
          <button class="auth-submit" onClick=${login} disabled=${loading||!email.trim()}>
            ${loading?[h`<i class="ti ti-loader-2 spinner"></i>`,' Signing in…']:['Sign in ',h`<i class="ti ti-arrow-right"></i>`]}
          </button>
          ${googleLoginEnabled()&&[
            h`<div class="auth-divider">or</div>`,
            h`<button type="button" class="auth-google" onClick=${googleLogin} disabled=${gLoading} style=${{cursor:gLoading?'wait':'pointer'}}>
              ${gLoading?h`<i class="ti ti-loader-2 spinner"></i>`:h`<${GoogleG}/>`} ${gLoading?'Signing in…':'Continue with Google'}
            </button>`,
          ]}
          <div class="auth-foot">
            ${forgotState==='sent'
              ? h`<span style=${{color:'#15803D'}}><i class="ti ti-mail" style=${{fontSize:13,marginRight:4,verticalAlign:'-2px'}}></i>If we have your account, a reset email is on its way.</span>`
              : h`<button type="button" onClick=${requestReset} disabled=${forgotState==='sending'} style=${{background:'transparent',border:'none',padding:0,fontFamily:'inherit',fontSize:'inherit',color:'#ff00ee',cursor:'pointer',textDecoration:'underline',textDecorationColor:'rgba(255,0,238,.3)',textUnderlineOffset:'2px'}}>
                  ${forgotState==='sending'?'Sending…':'Forgot password?'}
                </button>`}
            <span style=${{opacity:.7}}>v${APP_VERSION}</span>
          </div>
          <div class="saas-signlink">New agency?<button type="button" onClick=${()=>{try{location.hash='#signup';}catch(_){}}}>Start a free trial</button></div>
        </div>
      </div>
      ${quotePanel}
    </div>
  </div>`;
}

function PriChip({priority,editable,onChange}){
  const p=PRIORITY[priority||3];
  if(editable){
    return h`<select class="pri-sel" style=${{background:p.bg,color:p.color,borderColor:p.color}} value=${priority||3} onChange=${e=>{e.stopPropagation();onChange(parseInt(e.target.value));}} onClick=${e=>e.stopPropagation()} title="Set priority">
      <option value="1">P1 · High</option>
      <option value="2">P2 · Med</option>
      <option value="3">P3 · Low</option>
    </select>`;
  }
  return h`<span class="pri-chip" style=${{background:p.bg,color:p.color}}>${p.label}</span>`;
}

function LineupColumn({member,tasks,clients,onCard,editablePri,onPriChange,isMe}){
  const overdue=sortByPriority(tasks.filter(taskOverdue));
  const today=sortByPriority(tasks.filter(taskToday));
  const all=[...overdue,...today];
  const doneCount=all.filter(taskDone).length;const total=all.length;
  const pct=total>0?Math.round(doneCount/total*100):0;
  const barColor=total===0?'var(--bd)':pct===100?'#22C55E':overdue.length>0?'#DC2626':'#1D4ED8';
  return h`<div class="lineup-col">
    <div class="lineup-head">
      <${Av} i=${member.initials||member.name.slice(0,2)} c=${member.color||'#FF00EE'} s=${36}/>
      <div class="lineup-head-body">
        <div class="lineup-head-name">${member.name}${isMe?h`<span style=${{fontSize:10,color:'var(--t3)',fontWeight:500,marginLeft:6}}>(you)</span>`:''}</div>
        <div class="lineup-head-role">${ROLES[member.role_level]||member.role||'Team'}</div>
      </div>
      <div class="lineup-head-prog">${doneCount}/${total}</div>
    </div>
    <div class="lineup-prog"><div class="lineup-prog-fill" style=${{width:(total?pct:0)+'%',background:barColor}}></div></div>
    ${overdue.length>0&&h`<div>
      <div class="lineup-grp-title overdue"><i class="ti ti-alert-triangle" style=${{fontSize:11}}></i>Overdue · ${overdue.length}</div>
      ${overdue.map(t=>{const c=clients[t.client_id];const d=taskDone(t);return h`<div key=${t.id} class=${'lineup-task p'+(t.priority||3)+(d?' done-task':'')} onClick=${()=>onCard(t)}>
        <div class="lineup-tt" style=${{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}>${t.is_out_of_scope&&h`<${OOSBadge}/>`}<span>${t.title}</span></div>
        <div class="lineup-tm"><span>${c?.name||'—'}</span><span>·</span><span>${fmtS(t.post_date)}</span><${PriChip} priority=${t.priority||3} editable=${editablePri} onChange=${v=>onPriChange(t,v)}/></div>
      </div>`;})}
    </div>`}
    ${today.length>0&&h`<div>
      <div class="lineup-grp-title"><i class="ti ti-calendar" style=${{fontSize:11}}></i>Today · ${today.length}</div>
      ${today.map(t=>{const c=clients[t.client_id];const d=taskDone(t);return h`<div key=${t.id} class=${'lineup-task p'+(t.priority||3)+(d?' done-task':'')} onClick=${()=>onCard(t)}>

/* ── NOTES PANEL (home, macOS Notes style: multiple notes, grouped by last-edited) ── */
// Notes are stored as rich HTML (rich-text editor). Old notes were plain text — detect & convert.
const _noteLooksHtml=(s)=>/<\/?(p|div|br|ul|ol|li|b|i|u|strong|em|span|font|h[1-6])\b/i.test(s||'');
// HTML → plain text (for list titles/previews): turn block/line breaks into \n, then strip tags.
const noteToText=(s)=>{if(!s)return '';if(!_noteLooksHtml(s))return s;let t=String(s).replace(/<(br|\/li|\/p|\/div|\/h[1-6])[^>]*>/gi,'\n');const d=document.createElement('div');d.innerHTML=t;return (d.textContent||'').replace(/ /g,' ');};
// plain text → safe HTML (for rendering legacy notes inside the contentEditable surface).
const noteToHtml=(raw)=>{const s=raw||'';if(_noteLooksHtml(s))return s;return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');};
const noteTitleOf=(s)=>{const lines=noteToText(s).split('\n');for(const l of lines){const t=l.trim();if(t)return t.slice(0,80);}return '';};
const notePreviewOf=(s)=>{const lines=noteToText(s).split('\n');let foundTitle=false;const rest=[];for(const l of lines){const t=l.trim();if(!t)continue;if(!foundTitle){foundTitle=true;continue;}rest.push(t);}return rest.join(' ').slice(0,100);};
const noteGroupOf=(iso)=>{
  if(!iso)return 'Older';
  const d=new Date(iso);const dd=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const t=new Date();const td=new Date(t.getFullYear(),t.getMonth(),t.getDate());
  const days=Math.round((td-dd)/86400000);
  if(days<=0)return 'Today';
  if(days===1)return 'Yesterday';
  if(days<=7)return 'Previous 7 Days';
  if(days<=30)return 'Previous 30 Days';
  return d.toLocaleDateString('en-IN',{month:'long',year:'numeric'});
};
const noteRowTime=(iso)=>{
  if(!iso)return '';
  const d=new Date(iso);const t=new Date();
  const sameDay=d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate();
  if(sameDay)return d.toLocaleTimeString('en-IN',{hour:'numeric',minute:'2-digit'});
  const sameYear=d.getFullYear()===t.getFullYear();
  return d.toLocaleDateString('en-IN',sameYear?{day:'numeric',month:'short'}:{day:'numeric',month:'short',year:'numeric'});
};
const noteMainStamp=(iso)=>{if(!iso)return '';const d=new Date(iso);return d.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+' at '+d.toLocaleTimeString('en-IN',{hour:'numeric',minute:'2-digit'});};
const sortNotes=(a,b)=>{const ta=new Date(a.updated_at||0).getTime();const tb=new Date(b.updated_at||0).getTime();if(tb!==ta)return tb-ta;return (b.id||0)-(a.id||0);};

function NotesPanel({user,selectedDate,onDatesChange}){
  const[notes,setNotes]=useState([]);

  // Mobile (≤760px): show ONE pane at a time — list, or the editor with a Back button.
  const[mobEditor,setMobEditor]=useState(false);
  const[content,setContent]=useState('');
  const[dirty,setDirty]=useState(false);
  const[saving,setSaving]=useState(false);
  const[loading,setLoading]=useState(true);
  const[errMsg,setErrMsg]=useState('');
  const[now,setNow]=useState(Date.now());
  const[collapsed,setCollapsed]=useState(()=>localStorage.getItem('ams_notes_collapsed')!=='0');
  useEffect(()=>{localStorage.setItem('ams_notes_collapsed',collapsed?'1':'0');},[collapsed]);
  const saveTimer=useRef(null);
  const lastSavedRef=useRef('');
  const selIdRef=useRef(null);
  const dirtyRef=useRef(false);
  const notesRef=useRef([]);
  const editorRef=useRef(null);
  const fontSizeRef=useRef(3);
  const creatingRef=useRef(false);
  const histRef=useRef({entries:[],pos:-1});   // custom undo/redo (native undo is unreliable here)
  const histTimer=useRef(null);

  useEffect(()=>{
    db('daily_notes','&order=updated_at.desc').then(rows=>{
      const list=(rows||[]).slice().sort(sortNotes);

    }).catch(_loadFail('daily_notes')).finally(()=>setLoading(false));

  useEffect(()=>{
    const ch=supabase.channel('daily-notes-rt').on('postgres_changes',{event:'*',schema:'public',table:'daily_notes'},payload=>{
      const ev=payload.eventType;const n=payload.new;const o=payload.old;

          if(editorRef.current){editorRef.current.innerHTML=noteToHtml(n.content||'');_normalizeChecklists(editorRef.current);_seedHistory(editorRef.current.innerHTML);}

  useEffect(()=>{const t=setInterval(()=>setNow(Date.now()),60000);return()=>clearInterval(t);},[]);

  const flushSave=async()=>{

      await dbPatch('daily_notes',id,payload);

      lastSavedRef.current=text;setDirty(false);
    }catch(e){

    }

  };

  useEffect(()=>{
    if(!dirty)return;

  // eslint-disable-next-line react-hooks/exhaustive-deps

  // eslint-disable-next-line react-hooks/exhaustive-deps

  },[selId,collapsed]);

  const selectNote=(id)=>{

  // Char offsets are counted by pure text content in BOTH getter and setter so
  // they stay consistent across block boundaries.
  const _caretOffset=()=>{const el=editorRef.current;const sel=window.getSelection();if(!el||!sel||!sel.rangeCount)return null;const r=sel.getRangeAt(0);if(!el.contains(r.startContainer))return null;const pre=document.createRange();pre.selectNodeContents(el);try{pre.setEnd(r.startContainer,r.startOffset);}catch(_){return null;}return pre.cloneContents().textContent.length;};

  const undoEdit=()=>{if(histTimer.current){clearTimeout(histTimer.current);histTimer.current=null;}_recordHistory();const H=histRef.current;if(H.pos>0){H.pos--;_restore(H.entries[H.pos]);}};

  // Toolbar: turn each selected LINE into its own checklist item (or insert one

function DateStrip({selectedDate,onSelect,noteDates}){
  const today=todayISO();
  const todayD=new Date(today+'T00:00:00');
  const weekStartOf=(iso)=>{const d=new Date(iso+'T00:00:00');const dow=(d.getDay()+6)%7;d.setDate(d.getDate()-dow);return d;};
  const[anchor,setAnchor]=useState(()=>weekStartOf(selectedDate||today));
  useEffect(()=>{const ws=weekStartOf(selectedDate||today);if(ws.getTime()!==anchor.getTime())setAnchor(ws);
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[selectedDate]);
  const days=[];for(let i=0;i<7;i++){const d=new Date(anchor);d.setDate(d.getDate()+i);const iso=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;days.push({d,iso});}
  const shift=(n)=>{const a=new Date(anchor);a.setDate(a.getDate()+n);setAnchor(a);};
  const goToday=()=>{setAnchor(weekStartOf(today));onSelect(today);};
  const weekEnd=days[6].d;
  const sameMonth=anchor.getMonth()===weekEnd.getMonth();
  const monthLabel=sameMonth
    ?anchor.toLocaleDateString('en-IN',{month:'long'})
    :`${anchor.toLocaleDateString('en-IN',{month:'short'})} – ${weekEnd.toLocaleDateString('en-IN',{month:'short'})}`;
  const yearLabel=sameMonth?anchor.getFullYear():(anchor.getFullYear()===weekEnd.getFullYear()?anchor.getFullYear():`${anchor.getFullYear()}/${weekEnd.getFullYear()}`);
  const isCurrentWeek=days.some(x=>x.iso===today);
  const forwardDisabled=days[6].d>=todayD;
  const DOW=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const calRef=useRef(null);
  const openCal=()=>{const el=calRef.current;if(!el)return;try{if(typeof el.showPicker==='function')el.showPicker();else el.focus();}catch(e){el.focus();}};
  const onPickDate=(e)=>{const v=e.target.value;if(!v)return;if(v>today)return;onSelect(v);};
  return h`<div class="date-strip" role="toolbar" aria-label="Browse notes by date">
    <button class="ds-nav" onClick=${()=>shift(-7)} aria-label="Previous week"><i class="ti ti-chevron-left"></i></button>
    <div class="ds-pills">
      ${days.map((x,i)=>{
        const isToday=x.iso===today;
        const isFuture=x.d>todayD;
        const isSel=x.iso===selectedDate;
        const hasNotes=noteDates&&noteDates.has(x.iso);
        return h`<button key=${x.iso} type="button" class=${'ds-pill'+(isToday?' today':'')+(isSel?' sel':'')+(isFuture?' future':'')}
          aria-current=${isSel?'date':undefined}
          aria-label=${`${DOW[i]} ${x.d.getDate()}${isToday?' (today)':''}${hasNotes?' · has notes':''}`}
          onClick=${()=>{if(!isFuture)onSelect(x.iso);}}
          disabled=${isFuture}>
          ${hasNotes?h`<span class="ds-dot"></span>`:null}
          <span class="ds-dow">${DOW[i]}</span>
          <span class="ds-day">${x.d.getDate()}</span>
        </button>`;
      })}
    </div>
    <button class="ds-nav" onClick=${()=>shift(7)} aria-label="Next week" disabled=${forwardDisabled}><i class="ti ti-chevron-right"></i></button>
    <button class="ds-cal-btn" onClick=${openCal} title="Jump to date" aria-label="Pick a specific date">
      <i class="ti ti-calendar-search"></i>
      <input ref=${calRef} type="date" value=${selectedDate} max=${today} onChange=${onPickDate} tabIndex=${-1}/>
    </button>
    ${!isCurrentWeek&&h`<button class="ds-today-btn" onClick=${goToday}><i class="ti ti-target"></i><span>Today</span></button>`}
    <div class="ds-meta"><div class="ds-meta-mo">${monthLabel}</div><div class="ds-meta-yr">${yearLabel}</div></div>
  </div>`;
}

// Compact "SEO reports due" card for the admin Home tab. Surfaces clients
// with an active cadence (weekly|monthly) who don't yet have a report for the
// last completed period. Click a chip → deep-links into that client's SEO tab
// so admin can file the report.
// Compact horizontal tracker of all six onboarding stages. Each step shows
// a dot + label; the current step gets a colored fill, completed steps a
// check, future steps a muted dot. Renders inline anywhere — used on the
// ClientDetail header to make stage progress obvious at a glance.
const OB_STAGE_ORDER=['not_started','form_sent','form_filled','contract_sent','contract_signed','onboarded'];
const OB_STAGE_LBL={not_started:'Not started',form_sent:'Form sent',form_filled:'Form filled',contract_sent:'Contract sent',contract_signed:'Contract signed',onboarded:'Onboarded'};
function OBStageTracker({status,brand}){
  const idx=Math.max(0,OB_STAGE_ORDER.indexOf(status||'not_started'));
  const col=brand||'#ff00ee';
  return h`<div style=${{display:'flex',alignItems:'center',gap:0,padding:'10px 14px',background:'var(--bg)',border:'1px solid var(--bd)',borderRadius:'var(--r)',marginBottom:14,overflowX:'auto'}}>
    ${OB_STAGE_ORDER.map((s,i)=>{
      const done=i<idx;const current=i===idx;
      const dot=done?h`<span style=${{width:18,height:18,borderRadius:'50%',background:col,color:'#fff',fontSize:11,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><i class="ti ti-check" style=${{fontSize:11}}></i></span>`
        :current?h`<span style=${{width:18,height:18,borderRadius:'50%',background:col,border:'2px solid var(--bg)',boxShadow:`0 0 0 2px ${col}`,flexShrink:0}}></span>`
        :h`<span style=${{width:14,height:14,borderRadius:'50%',background:'transparent',border:'1.5px solid var(--bd2)',flexShrink:0}}></span>`;
      const lbl=h`<span style=${{fontSize:11,color:current?col:done?'var(--t1)':'var(--t3)',fontWeight:current?600:500,marginLeft:5,whiteSpace:'nowrap',letterSpacing:current?'.01em':0}}>${OB_STAGE_LBL[s]}</span>`;
      const connector=i<OB_STAGE_ORDER.length-1?h`<span style=${{flex:1,height:1.5,background:i<idx?col:'var(--bd2)',marginLeft:8,marginRight:8,minWidth:14,opacity:i<idx?.7:.5}}></span>`:null;
      return h`<div key=${s} style=${{display:'flex',alignItems:'center',flexShrink:0}}>${dot}${lbl}</div>${connector}`;
    })}
  </div>`;
}

        :myToday.map(t=>h`<${TaskRow} key=${t.id} task=${t} client=${clients[t.client_id]} onClick=${onCard} onPriChange=${onPriChange} editablePri=${isPriv}/>`)}
