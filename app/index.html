}

/* ── CSV IMPORT ──
   Full 33-column Bluwalker format, shared with the /upload-calendar CLI skill
   (.claude/skills/upload-calendar/importer.py). Keep this mapping in sync with
   importer.py if you change either side. Extras that don't have their own DB
   column are folded into `concept` / `production_notes` as labelled key:value
   lines under a ────────── separator. */
const CSV_COLS=['id','title','type','format_detail','mode','post_date','post_day','posting_time_ist','priority','assigned_to','workflow_status','client_approval','client_remarks','content_pillar','featured_product','featured_product_price','concept','hook','duration_or_slides','on_screen_text','caption','hashtags','trend_name','trending_audio','reference_links','visual_direction','designer_notes','editor_notes','production_notes','drive_link','post_link','target_metric','strategist_meta'];
const CSV_DIRECT_COLS=['title','type','post_date','priority','assigned_to','workflow_status','client_approval','client_remarks','content_pillar','concept','caption','hashtags','reference_links','designer_notes','editor_notes','production_notes','drive_link','post_link'];
const CSV_CONCEPT_EXTRAS=[['hook','Hook'],['duration_or_slides','Duration / slides'],['on_screen_text','On-screen text'],['trend_name','Trend'],['trending_audio','Audio'],['target_metric','Target metric'],['strategist_meta','Strategist']];
const CSV_PRODUCTION_EXTRAS=[['format_detail','Format'],['mode','Mode'],['post_day','Day'],['posting_time_ist','Time IST'],['visual_direction','Visual direction']];
const CSV_PRIORITY_MAP={high:1,p1:1,'1':1,urgent:1,med:2,medium:2,p2:2,'2':2,low:3,normal:3,p3:3,'3':3};
const CSV_REQUIRED=['title','post_date'];
function parseCSV(text){
  const rows=[];let cur=[],val='',i=0,inQ=false;text=text.replace(/^﻿/,'');
  while(i<text.length){const c=text[i];
    if(inQ){if(c==='"'&&text[i+1]==='"'){val+='"';i+=2;continue;}if(c==='"'){inQ=false;i++;continue;}val+=c;i++;}
    else{if(c==='"'){inQ=true;i++;continue;}if(c===','){cur.push(val);val='';i++;continue;}if(c==='\r'){i++;continue;}if(c==='\n'){cur.push(val);rows.push(cur);cur=[];val='';i++;continue;}val+=c;i++;}
  }
  if(val.length||cur.length)cur.push(val),rows.push(cur);
  return rows.filter(r=>!(r.length===1&&r[0].trim()===''));
}
function validateRow(r){
  const errs=[];
  if(!r.title||!String(r.title).trim())errs.push('title required');
  if(!r.post_date||!/^\d{4}-\d{2}-\d{2}$/.test(String(r.post_date).trim()))errs.push('post_date must be YYYY-MM-DD');
  if(r.type){const t=String(r.type).trim().toLowerCase();if(t!=='static'&&!TC[t])errs.push('type must be reel/creative/carousel/extra (or static → creative)');}
  if(r.workflow_status&&!SC_ORDER.includes(String(r.workflow_status).trim().toLowerCase()))errs.push('invalid status');
  if(r.client_approval&&!APR[String(r.client_approval).trim().toLowerCase()])errs.push('client_approval must be pending/approved/revision');
  if(r.priority){const p=String(r.priority).trim().toLowerCase();if(p&&!(p in CSV_PRIORITY_MAP))errs.push('priority must be high/med/low (or 1/2/3)');}
  return errs;
}
// Fold the non-DB extras into `existing` as a labelled block separated by ──────────.
// Returns the updated string (or the original if no extras were provided).
function csvFoldExtras(existing,extras,row){
  const bits=[];
  extras.forEach(([col,label])=>{
    const v=(row[col]==null?'':String(row[col])).trim();
    if(v)bits.push(`${label}: ${v}`);
  });
  // featured_product + price → one line (only applies to concept extras)
  const fp=(row.featured_product==null?'':String(row.featured_product)).trim();
  const fpp=(row.featured_product_price==null?'':String(row.featured_product_price)).trim();
  if(fp&&extras===CSV_CONCEPT_EXTRAS)bits.push(`Featured product: ${fp}${fpp?` (${fpp})`:''}`);
  if(!bits.length)return existing||null;
  const block='──────────\n'+bits.join('\n');
  const base=(existing||'').trim();
  return base?`${base}\n\n${block}`:block;
}
// Tolerant parse of a freeform "posting time" CSV cell → "HH:MM" (24h) or null.
// Accepts 18:00, 6:30 PM, 6pm, 9, 9.30am, "10 AM IST". Returns null for
// non-times (evening, morning, blank) so the raw text is kept in notes instead.
// MUST mirror parse_csv_time() in .claude/skills/upload-calendar/importer.py.
function parseCsvTime(s){
  if(s==null)return null;
  const t=String(s).trim().toLowerCase().replace(/\bist\b/g,'').replace(/[.\s]+$/,'').trim();
  if(!t)return null;
  const m=t.match(/^(\d{1,2})(?:[:.](\d{2}))?\s*(am|pm)?$/);
  if(!m)return null;
  let hh=parseInt(m[1],10);const mm=m[2]?parseInt(m[2],10):0;const ap=m[3];
  if(isNaN(hh)||isNaN(mm)||mm>59)return null;
  if(ap){if(hh<1||hh>12)return null;hh=ap==='am'?(hh===12?0:hh):(hh===12?12:hh+12);}
  if(hh>23)return null;
  return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
}
function normalizeRow(r,clientId,lineItems){
  const out={client_id:clientId,production_done:false,type:'reel',workflow_status:'briefed',client_approval:'pending'};
  CSV_DIRECT_COLS.forEach(k=>{
    let v=r[k];if(v==null)return;v=String(v).trim();if(v==='')return;
    if(k==='type'||k==='workflow_status'||k==='client_approval')v=v.toLowerCase();
    if(k==='type'&&v==='static')v='creative';
    if(k==='priority'){const mapped=CSV_PRIORITY_MAP[v.toLowerCase()];if(mapped!=null)out[k]=mapped;return;}
    out[k]=v;
  });
  // posting_time_ist → real posting_time column when parseable; otherwise it
  // still folds into production_notes (below) so nothing is silently dropped.
  const pt=parseCsvTime(r.posting_time_ist);
  if(pt)out.posting_time=pt;
  const prodExtras=pt?CSV_PRODUCTION_EXTRAS.filter(([c])=>c!=='posting_time_ist'):CSV_PRODUCTION_EXTRAS;
  const foldedConcept=csvFoldExtras(out.concept,CSV_CONCEPT_EXTRAS,r);
  if(foldedConcept)out.concept=foldedConcept;
  const foldedProd=csvFoldExtras(out.production_notes,prodExtras,r);
  if(foldedProd)out.production_notes=foldedProd;
  // Auto-link to a deliverable by type so imported posts count toward scope once done.
  if(!out.is_out_of_scope&&!out.scope_line_item_id){const link=autoScopeLineItem(lineItems,out.type);if(link)out.scope_line_item_id=link;}
  return out;
}
// PostgREST batch insert requires every object to share the same keys. Union
// keys across the batch and fill missing ones with null so heterogeneous rows
// (some have caption, some don't) still POST as one batch.
function csvPadBatch(rows){
  const keys=new Set();rows.forEach(r=>Object.keys(r).forEach(k=>keys.add(k)));
  return rows.map(r=>{const o={};keys.forEach(k=>{o[k]=r[k]==null?null:r[k];});return o;});
}
function CSVImport({client,onClose,onImported,showToast,currentUser}){
  const[step,setStep]=useState(1);const[rows,setRows]=useState([]);const[saving,setSaving]=useState(false);const[err,setErr]=useState('');const[fileName,setFileName]=useState('');
  const scopeLI=useRef([]);
  useEffect(()=>{if(!client?.id)return;ensureScopeInstance(client.id).then(inst=>{scopeLI.current=Array.isArray(inst?.line_items)?inst.line_items:[];}).catch(()=>{scopeLI.current=[];});},[client?.id]);
  const downloadTemplate=()=>{
    // One realistic example row covering every column. CSV cells are wrapped
    // in quotes wherever the content might contain commas, newlines, or quotes
    // — safest is to quote any free-text cell. The header row below mirrors
    // CSV_COLS verbatim (33 cols).
    const q=(s)=>`"${String(s).replace(/"/g,'""')}"`;
    const sample=[
      'R1',
      q('Sample reel · product showcase'),
      'reel',
      q('30s vertical reel'),
      'A',
      '2026-06-01',
      'Sunday',
      '18:00',
      'high',
      'Samar',
      'briefed',
      'pending',
      q(''),
      q('Brand awareness'),
      q('Sample SKU'),
      q('₹999'),
      q('Hero reel that demos the product in three quick beats — unbox, feature highlight, CTA.'),
      q('"You don\'t need more. You need this."'),
      '0:30',
      q('UNBOX. USE. ORDER NOW.'),
      q('Caption goes here…\nKeep it under 2 lines for the hook.'),
      q('#brand #product #launch'),
      q(''),
      q(''),
      q('https://drive.google.com/…\nhttps://instagram.com/p/…'),
      q('Soft natural light, neutral background, product centred.'),
      q('Colour grade: brand magenta accent in the CTA frame.'),
      q('Hold each clip ~1s, hard cut, no transitions.'),
      q('Shot on iPhone, edited in CapCut.'),
      q('https://drive.google.com/drive/folders/…'),
      q(''),
      q('5k views, 3% engagement'),
      q(''),
    ].join(',');
    const csv=CSV_COLS.join(',')+'\n'+sample+'\n';
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`content-calendar-template-${(client.name||'client').replace(/[^a-z0-9]+/gi,'-').toLowerCase()}.csv`;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
  };
  const onFile=(e)=>{const f=e.target.files?.[0];if(!f)return;setFileName(f.name);setErr('');
    const rd=new FileReader();rd.onload=()=>{try{
      const parsed=parseCSV(String(rd.result||''));if(parsed.length<2){setErr('CSV is empty or only contains a header.');return;}
      const headers=parsed[0].map(s=>String(s).trim().toLowerCase());const unknown=headers.filter(hd=>hd&&!CSV_COLS.includes(hd));
      const mapped=parsed.slice(1).map((arr,idx)=>{const obj={_row:idx+2};headers.forEach((hd,i)=>{if(hd)obj[hd]=arr[i]??'';});return{...obj,_errs:validateRow(obj)};});
      setRows(mapped);setStep(2);if(unknown.length)setErr('Ignoring unknown columns: '+unknown.join(', '));
    }catch(ex){setErr('Failed to parse CSV: '+ex.message);}};rd.readAsText(f);
  };
  const removeRow=(i)=>setRows(rs=>rs.filter((_,idx)=>idx!==i));
  const validRows=rows.filter(r=>r._errs.length===0);const invalidCount=rows.length-validRows.length;
  const importNow=async()=>{if(!validRows.length){showToast('No valid rows to import');return;}setSaving(true);setErr('');
    try{let payload=csvPadBatch(validRows.map(r=>normalizeRow(r,client.id,scopeLI.current)));
      // Duplicate guard: re-importing the same file used to silently double every
      // post. Skip rows whose (post_date, title) already exist for this client.
      let skippedDup=0;
      try{
        const existing=await db('content',`&client_id=eq.${client.id}&select=title,post_date`);
        const dupKey=(p)=>`${(p.post_date||'').slice(0,10)}|${(p.title||'').trim().toLowerCase()}`;
        const seen=new Set((existing||[]).map(dupKey));
        const before=payload.length;
        payload=payload.filter(p=>!seen.has(dupKey(p)));
        skippedDup=before-payload.length;
      }catch(_){}
      if(!payload.length){setErr(`All ${skippedDup} row${skippedDup===1?'':'s'} already exist for ${client.name} (same title + date) — nothing imported.`);return;}
      const inserted=await rpcCall('content_insert',{p_rows:payload});
      onImported(inserted);showToast(`${inserted.length} posts imported ✓${skippedDup?` · ${skippedDup} duplicate${skippedDup===1?'':'s'} skipped`:''}`);
      const actor=currentUser?.name||'Someone';
      notifyContent({actor,title:`CSV import · ${inserted.length} posts`,message:`${actor} imported ${inserted.length} posts from CSV for ${client.name}`,type:'status',clientName:client.name,clientId:client.id});
      onClose();
    }catch(ex){setErr('Import failed: '+(ex.message||'unknown error'));}finally{setSaving(false);}
  };
  return h`<div class="modal" onClick=${e=>{if(e.target===e.currentTarget)onClose()}}>
    <div class="modal-box" style=${{maxWidth:step===2?900:560}}>
      <div class="modal-head">
        <div>
          <div style=${{fontSize:16,fontWeight:600,display:'flex',alignItems:'center',gap:8}}><i class="ti ti-file-upload" style=${{fontSize:18,color:'#0E7490'}}></i>Import content from CSV</div>
          <div style=${{fontSize:12,color:'var(--t3)',marginTop:2}}>${client.name} · ${step===1?'Upload':'Preview & confirm'}</div>
        </div>
        <button class="icon-btn" onClick=${onClose}><i class="ti ti-x"></i></button>
      </div>
      <div class="modal-body">
        ${step===1&&h`<div>
          <div style=${{background:'var(--b2)',border:'1px solid var(--bd)',borderRadius:'var(--r)',padding:'12px 14px',marginBottom:14}}>
            <div style=${{fontSize:13,fontWeight:600,marginBottom:6}}>How it works</div>
            <ol style=${{fontSize:12,color:'var(--t2)',margin:0,paddingLeft:18,lineHeight:1.6}}>
              <li>Download the template (CSV with all supported columns).</li>
              <li>Fill it in — <b>title</b> and <b>post_date</b> (YYYY-MM-DD) are required.</li>
              <li>Upload it back here. You'll see a preview before anything is saved.</li>
            </ol>
          </div>
          <div style=${{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap'}}>
            <button class="btn-sec" onClick=${downloadTemplate}><i class="ti ti-download"></i>Download template</button>
            <label class="btn-pri" style=${{cursor:'pointer'}}><i class="ti ti-upload"></i>${fileName?'Choose another file':'Choose CSV file'}<input type="file" accept=".csv,text/csv" style=${{display:'none'}} onChange=${onFile}/></label>
          </div>
          ${fileName&&h`<div style=${{fontSize:12,color:'var(--t3)',marginBottom:10}}>Selected: ${fileName}</div>`}
          <div style=${{fontSize:11,color:'var(--t3)'}}>
            <div style=${{fontWeight:600,marginBottom:4,color:'var(--t2)'}}>Supported columns</div>
            <div style=${{lineHeight:1.6}}>${CSV_COLS.map(c=>h`<code key=${c} style=${{background:'var(--b2)',padding:'1px 5px',borderRadius:4,marginRight:4,fontSize:10}}>${c}${CSV_REQUIRED.includes(c)?' *':''}</code>`)}</div>
            <div style=${{marginTop:6}}>* required · type: reel/creative/carousel/extra · status: ${SC_ORDER.join(', ')} · client_approval: pending/approved/revision</div>
          </div>
          ${err&&h`<div class="err" style=${{marginTop:12}}><i class="ti ti-alert-circle"></i>${err}</div>`}
        </div>`}
        ${step===2&&h`<div>
          <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,flexWrap:'wrap',gap:8}}>
            <div style=${{fontSize:13}}><b style=${{color:'#15803D'}}>${validRows.length} valid</b>${invalidCount>0?h` · <b style=${{color:'#DC2626'}}>${invalidCount} invalid</b>`:''} · ${rows.length} total</div>
            <span style=${{fontSize:11,color:'var(--t3)'}}>× to remove a row · only valid rows will be imported</span>
          </div>
          <div style=${{maxHeight:420,overflow:'auto',border:'1px solid var(--bd)',borderRadius:'var(--r)'}}>
            <table class="ltbl" style=${{fontSize:12}}>
              <thead><tr><th style=${{width:28}}></th><th>Row</th><th>Title</th><th>Type</th><th>Date</th><th>Assigned</th><th>Status</th><th>Issues</th><th></th></tr></thead>
              <tbody>${rows.map((r,i)=>{const ok=r._errs.length===0;return h`<tr key=${i} style=${{background:ok?'':'rgba(254,226,226,.35)'}}>
                <td style=${{textAlign:'center'}}>${ok?h`<i class="ti ti-circle-check" style=${{color:'#15803D'}}></i>`:h`<i class="ti ti-alert-circle" style=${{color:'#DC2626'}}></i>`}</td>
                <td style=${{color:'var(--t3)'}}>${r._row}</td>
                <td style=${{fontWeight:500,maxWidth:220,wordBreak:'break-word'}}>${r.title||h`<span style=${{color:'var(--t3)'}}>—</span>`}</td>
                <td>${r.type||'reel'}</td>
                <td style=${{whiteSpace:'nowrap'}}>${r.post_date||h`<span style=${{color:'var(--t3)'}}>—</span>`}</td>
                <td>${r.assigned_to||h`<span style=${{color:'var(--t3)'}}>—</span>`}</td>
                <td>${r.workflow_status||'briefed'}</td>
                <td style=${{fontSize:11,color:'#DC2626'}}>${r._errs.join(', ')||h`<span style=${{color:'var(--t3)'}}>—</span>`}</td>
                <td><button class="icon-btn" onClick=${()=>removeRow(i)} title="Remove"><i class="ti ti-x" style=${{fontSize:13}}></i></button></td>
              </tr>`;})}</tbody>
            </table>
          </div>
          ${err&&h`<div class="err" style=${{marginTop:12}}><i class="ti ti-alert-circle"></i>${err}</div>`}
        </div>`}
      </div>
      <div class="modal-foot">
        ${step===1&&h`<button class="btn-sec" onClick=${onClose}>Cancel</button>`}
        ${step===2&&h`<button class="btn-sec" onClick=${()=>{setStep(1);setRows([]);setErr('');}}><i class="ti ti-arrow-left"></i> Back</button>
          <button class="btn-pri" onClick=${importNow} disabled=${saving||validRows.length===0}>${saving?h`<i class="ti ti-loader-2 spinner"></i> Importing...`:`Import ${validRows.length} posts`}</button>`}
      </div>
    </div>
  </div>`;

le=${{fontSize:9,color:'#B45309'}}></i>`:p.production_done?h`<i class="ti ti-circle-check" style=${{fontSize:9}}></i>`:''}<span>${p.title}</span></div>`;})}${dp.length>3&&h`<div style=${{fontSize:10,color:'var(--t3)',paddingLeft:4}}>+${dp.length-3}</div>`}</div>`;})}</div></div>`;}

/* ── CONTENT CALENDAR ── */
function ContentCalendar({client,currentUser}){
  const[view,setView]=useState('board');const[posts,setPosts]=useState([]);const[loading,setLoading]=useState(true);const[loadErr,setLoadErr]=useState(null);const[sel,setSel]=useState(null);const[panelMode,setPanelMode]=useState(null);const[panelOpen,setPanelOpen]=useState(false);const[showAI,setShowAI]=useState(false);const[showCSV,setShowCSV]=useState(false);const[toast,setToast]=useState(null);const tk=useRef(0);
  const[scopeInstance,setScopeInstance]=useState(null);
  const loadPosts=useCallback(()=>{if(!client?.id)return;setLoading(true);db('content',`&client_id=eq.${client.id}&order=post_date.asc`).then(r=>{setPosts(r);setLoadErr(null);}).catch(_loadFail('content:'+client.id,e=>setLoadErr(e?.message||'network'))).finally(()=>setLoading(false));},[client?.id]);
  useEffect(()=>{loadPosts();},[loadPosts]);
  useEffect(()=>{if(!client?.id){setScopeInstance(null);return;}ensureScopeInstance(client.id).then(setScopeInstance).catch(()=>setScopeInstance(null));},[client?.id]);
  // Posts dated in the current month — used for scope usage banner
  const{month:scMo,year:scYr}=currentScopePeriod();
  const monthStart=`${scYr}-${String(scMo).padStart(2,'0')}-01`;
  const monthEndDay=new Date(scYr,scMo,0).getDate();
  const monthEnd=`${scYr}-${String(scMo).padStart(2,'0')}-${String(monthEndDay).padStart(2,'0')}`;
  const monthPosts=posts.filter(p=>p.post_date&&p.post_date.slice(0,10)>=monthStart&&p.post_date.slice(0,10)<=monthEnd);
  const usage=computeScopeUsage(scopeInstance,monthPosts);
  const reached=usage.items.filter(it=>it.quantity>0&&it.completed>=it.quantity);
  const draftIdRef=useRef(null);
  const openCard=(p)=>{setSel(p);setPanelMode('edit');setPanelOpen(true);};
  // "Add post" skips the compact form and opens the full post editor directly.
  // PostPanel autosaves each field against a real post.id (comments, previews,
  // share links, version history all key off it), so we create a blank draft row
  // up front and open it. If the user closes without ever titling it, closePanel
  // deletes the draft — so "close = cancel" still works and the board stays clean.
  const openAdd=async()=>{
    let posting_time='10:00';
    try{const r=await rpcCall('agency_get_auto_publish',{});if(r&&r.hour!=null)posting_time=String(r.hour).padStart(2,'0')+':00';}catch(_){}
    try{
      const rows=await rpcCall('content_insert',{p_rows:[{type:'reel',workflow_status:'briefed',client_approval:'pending',post_date:todayISO(),posting_time,task_given_date:todayISO(),client_id:client.id,production_done:false}]});
      const created=rows&&rows[0];
      if(!created){showToast('Could not start a new post');return;}
      draftIdRef.current=created.id;
      addPost(created);setSel(created);setPanelMode('edit');setPanelOpen(true);
    }catch(e){showToast('Could not start a new post');}
  };
  const closePanel=()=>{
    const cur=sel;
    // Untitled fresh draft → treat close as cancel: drop it locally and server-side.
    if(cur&&draftIdRef.current&&cur.id===draftIdRef.current&&!(cur.title&&String(cur.title).trim())){
      deletePost(cur.id);rpcCall('content_delete',{p_id:cur.id}).catch(()=>{});
    }
    draftIdRef.current=null;
    setPanelOpen(false);setTimeout(()=>{setSel(null);setPanelMode(null);},260);
  };
  const updatePost=(u)=>{setPosts(ps=>ps.map(p=>p.id===u.id?u:p));setSel(u);};const addPost=(p)=>{setPosts(ps=>[...ps,p].sort((a,b)=>(a.post_date||'').localeCompare(b.post_date||'')));};const deletePost=(id)=>{setPosts(ps=>ps.filter(p=>p.id!==id));};
  const showToast=(msg)=>{tk.current++;setToast({msg,k:tk.current});};
  // ── Bulk selection (list view only) ──
  const[selected,setSelected]=useState(()=>new Set());
  const[bulkEditOpen,setBulkEditOpen]=useState(false);
  useEffect(()=>{if(view!=='list'&&selected.size>0)setSelected(new Set());},[view]);
  useEffect(()=>{setSelected(new Set());},[client?.id]);
  const toggleOne=(id)=>setSelected(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});
  const toggleAll=(checked)=>setSelected(checked?new Set(posts.map(p=>p.id)):new Set());
  const clearSel=()=>setSelected(new Set());
  const bulkPatch=async(patch,verb)=>{
    const ids=[...selected];if(ids.length===0)return[];
    const results=await Promise.all(ids.map(id=>rpcCall('content_update',{p_id:id,p_patch:patch}).then(()=>({id,ok:true})).catch(e=>({id,ok:false,err:e?.message||e}))));
    const okIds=results.filter(r=>r.ok).map(r=>r.id);const failed=results.length-okIds.length;
    if(okIds.length)setPosts(ps=>ps.map(p=>okIds.includes(p.id)?{...p,...patch}:p));
    showToast(failed===0?`${okIds.length} post${okIds.length===1?'':'s'} ${verb} ✓`:`${okIds.length}/${results.length} ${verb} — ${failed} failed`);
    setSelected(new Set(results.filter(r=>!r.ok).map(r=>r.id)));
    return okIds;
  };
  const bulkApprove=async(value)=>{
    const okIds=await bulkPatch({client_approval:value},'updated');
    if(okIds.length){
      const actor=currentUser?.name||'Someone';
      const verb=value==='approved'?'approved':value==='revision'?'requested revision on':'set pending on';
      const icon=value==='approved'?'✅':value==='revision'?'🔁':'⏳';
      const ntype=value==='approved'?'approval':value==='revision'?'revision':'info';
      insertNotif(`role:admin,manager!${actor}`,`${icon} Bulk approval: ${value}`,`${actor} ${verb} ${okIds.length} post${okIds.length===1?'':'s'}${client?.name?' in '+client.name:''}`,ntype,client?.name||null,null,'client',client?.id||null);
    }
  };
  const bulkEditApply=async(patch)=>{
    const okIds=await bulkPatch(patch,'updated');
    setBulkEditOpen(false);
    if(okIds.length){
      const actor=currentUser?.name||'Someone';
      const parts=[];if('workflow_status' in patch)parts.push(`status → ${SC[patch.workflow_status]?.label||patch.workflow_status}`);if('assigned_to' in patch)parts.push(`assignee → ${patch.assigned_to||'unassigned'}`);
      insertNotif(`role:admin,manager!${actor}`,'✏️ Bulk edit',`${actor} updated ${parts.join(', ')} on ${okIds.length} post${okIds.length===1?'':'s'}${client?.name?' in '+client.name:''}`,'status',client?.name||null,null,'client',client?.id||null);
    }
  };
  const bulkDelete=async()=>{
    const ids=[...selected];if(ids.length===0)return;
    if(!confirm(`Move ${ids.length} post${ids.length===1?'':'s'} to Trash? You can restore them from Settings → Trash.`))return;
    const results=await Promise.all(ids.map(id=>rpcCall('content_delete',{p_id:id}).then(()=>({id,ok:true})).catch(e=>({id,ok:false}))));
    const okIds=results.filter(r=>r.ok).map(r=>r.id);const failed=results.length-okIds.length;
    if(okIds.length){
      setPosts(ps=>ps.filter(p=>!okIds.includes(p.id)));
      const actor=currentUser?.name||'Someone';
      insertNotif(`role:admin,manager!${actor}`,'🗑️ Bulk delete',`${actor} deleted ${okIds.length} post${okIds.length===1?'':'s'}${client?.name?' from '+client.name:''}`,'alert',client?.name||null,null,'client',client?.id||null);
    }
    showToast(failed===0?`${okIds.length} post${okIds.length===1?'':'s'} moved to Trash ✓`:`${okIds.length}/${results.length} moved — ${failed} failed`);
    setSelected(new Set(results.filter(r=>!r.ok).map(r=>r.id)));
  };
  // ── "Calendar ready" — publish this month's plan to the client portal ──
  // One click advances every still-internal post in the current scope month
  // (briefed / in_production / in_review) to sent_to_client + pending, so the
  // whole month's plan — including early-stage cards — appears in the client's
  // portal calendar and approval queue. Posts already with the client are left
  // alone. Mirrors the single-post send-to-client side effects per post (version

  const[publishing,setPublishing]=useState(false);

  const[crShift,setCrShift]=useState(0); // 0 = current scope month · 1 = next month
  const crD=new Date(scYr,scMo-1+crShift,1);const crMo=crD.getMonth()+1;const crYr=crD.getFullYear();
  const crStart=`${crYr}-${String(crMo).padStart(2,'0')}-01`;
  const crEnd=`${crYr}-${String(crMo).padStart(2,'0')}-${String(new Date(crYr,crMo,0).getDate()).padStart(2,'0')}`;
  const crPosts=crShift===0?monthPosts:posts.filter(p=>p.post_date&&p.post_date.slice(0,10)>=crStart&&p.post_date.slice(0,10)<=crEnd);
  const eligibleMonth=crPosts.filter(p=>['briefed','in_production','in_review'].includes(p.workflow_status));
  const calendarReady=async()=>{

    if(!confirm(`Publish ${list.length} post${list.length===1?'':'s'} for ${scopePeriodLabel(crMo,crYr)} to ${client?.name||'the client'}'s portal?\n\nThey'll appear in the client's calendar and be sent for approval. Posts already with the client are unaffected.`))return;

    const results=await Promise.all(list.map(p=>
      rpcCall('content_update',{p_id:p.id,p_patch:{workflow_status:'sent_to_client',client_approval:'pending'}})
        .then(()=>({id:p.id,ok:true})).catch(()=>({id:p.id,ok:false}))));

    if(okIds.size){

        generatePostPreview(p.id).catch(()=>{});
      });

      if(client?.name)insertNotif(client.name,`📅 Your ${scopePeriodLabel(crMo,crYr)} calendar is ready`,`${okIds.size} post${okIds.size===1?'':'s'} are ready for your review on the portal.`,'approval',client.name,null,'client',client.id);
      insertNotif(`role:admin,manager!${actor}`,'📤 Calendar published',`${actor} sent ${okIds.size} post${okIds.size===1?'':'s'} for ${scopePeriodLabel(crMo,crYr)} to ${client?.name||'a client'} for review`,'status',client?.name||null,null,'client',client?.id||null);

    :h`<${CalView} posts=${posts} onCard=${openCard}/>`}
    ${view==='list'&&selected.size>0&&h`<${BulkBar} count=${selected.size} onApprove=${bulkApprove} onEdit=${()=>setBulkEditOpen(true)} onDelete=${bulkDelete} onClear=${clearSel}/>`}
    ${bulkEditOpen&&h`<${BulkEditModal} count=${selected.size} onApply=${bulkEditApply} onClose=${()=>setBulkEditOpen(false)}/>`}
    <div class=${'overlay'+(panelOpen?' show':'')} onClick=${closePanel}></div>

      ${panelMode==='edit'&&h`<${PostPanel} post=${sel} onClose=${closePanel} onUpdate=${updatePost} onDelete=${deletePost} showToast=${showToast} currentUser=${currentUser} clientName=${client?.name}/>`}
    </div>
    ${showAI&&h`<${AIPlanner} client=${client} onClose=${()=>setShowAI(false)} onGenerated=${(rows)=>setPosts(ps=>[...ps,...rows].sort((a,b)=>(a.post_date||'').localeCompare(b.post_date||'')))} showToast=${showToast} currentUser=${currentUser}/>`}
    ${showCSV&&h`<${CSVImport} client=${client} onClose=${()=>setShowCSV(false)} onImported=${(rows)=>setPosts(ps=>[...ps,...rows].sort((a,b)=>(a.post_date||'').localeCompare(b.post_date||'')))} showToast=${showToast} currentUser=${currentUser}/>`}
    ${toast&&h`<${Toast} key=${toast.k} msg=${toast.msg}/>`}
  </div>`;
}

const compressImg=async(dataUrl,maxW=500)=>new Promise(resolve=>{const img=new Image();img.onload=()=>{const ratio=Math.min(maxW/img.width,1);const c=document.createElement('canvas');c.width=img.width*ratio;c.height=img.height*ratio;c.getContext('2d').drawImage(img,0,0,c.width,c.height);resolve(c.toDataURL('image/jpeg',0.6));};img.onerror=()=>resolve(dataUrl);img.src=dataUrl;});

/* ── BRANDED REPORT PDFs (shared AMS chrome for social + SEO) ── */

function _escHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function _amsLogoHTML(agency,size=46){
  const url=agency?.logo_url;
  if(url)return`<img src="${_escHtml(url)}" style="height:${size}px;width:auto;max-width:${size*3}px;object-fit:contain;display:block"/>`;
  const mark=((agency?.trade_name||agency?.legal_name||'A').trim().slice(0,1)||'A').toUpperCase();
  return`<div style="width:${size}px;height:${size}px;background:#ff00ee;color:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:${Math.round(size*0.55)}px;font-weight:600">${mark}</div>`;
}
function _amsAddressLine(agency){
  if(!agency)return'';
  const parts=[agency.address_line_1,agency.address_line_2,[agency.city,agency.state,agency.pincode].filter(Boolean).join(', '),agency.country].filter(Boolean);
  return parts.join(' · ');
}

// Cached singleton — agency settings rarely change during a session.
let _agencyCache=null;
async function getAgencyForPdf(){
  if(_agencyCache)return _agencyCache;
  try{const row=await rpcCall('agency_settings_get');_agencyCache=row||{};}catch(e){console.warn('[agency] fetch failed',e);_agencyCache={};}
  return _agencyCache;
}

function _amsSocialBodyHTML({client,report,counts,brand}){
  const r=report;
  const tile=(label,val)=>`<div style="background:#f7f6f3;border-radius:8px;padding:14px 12px;text-align:center"><div style="font-size:10px;color:#787774;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em">${label}</div><div style="font-size:22px;font-weight:500;color:#1a1a1a">${val}</div></div>`;
  const tiles=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px">${tile('Total reach',(r.total_reach||0).toLocaleString())}${tile('Engagement',(r.engagement_rate||0)+'%')}${tile('New followers','+'+(r.new_followers||0).toLocaleString())}${tile('Posts published',String(counts?.total||0))}</div>`;
  const bar=(label,count,color)=>{const pct=counts?.total?Math.round(count/counts.total*100):0;return`<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px"><div style="width:80px;font-size:12.5px;color:#787774">${label}</div><div style="flex:1;height:8px;background:#f0f0ee;border-radius:4px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${color};border-radius:4px"></div></div><div style="width:60px;text-align:right;font-size:12px;color:#1a1a1a">${count} posts</div></div>`;};
  const breakdownBlock=(counts?.total||0)>0?`<div style="border-top:1px solid #e8e8e5;padding-top:18px;margin-bottom:20px"><div style="font-size:13px;font-weight:500;margin-bottom:10px">Content breakdown</div>${bar('Reels',counts.reel,'#6d28d9')}${bar('Creatives',counts.creative,'#1d4ed8')}${bar('Carousels',counts.carousel,'#0e7490')}${bar('Extra',counts.extra,'#b45309')}</div>`:'';
  const post=(img,title,reach,eng)=>`<div style="border:1px solid #e8e8e5;border-radius:8px;overflow:hidden"><div style="height:90px;background:#f7f6f3;${img?`background-image:url('${_escHtml(img)}');background-size:cover;background-position:center`:''}"></div><div style="padding:9px 11px"><div style="font-size:11.5px;font-weight:500;color:#1a1a1a;margin-bottom:3px;line-height:1.3;min-height:30px">${_escHtml(title||'—')}</div><div style="font-size:10.5px;color:#787774">${reach?(parseInt(reach)||0).toLocaleString()+' reach':'—'}${eng?' · '+eng+'% eng':''}</div></div></div>`;
  const hasTop=r.top_post_1_title||r.top_post_2_title||r.top_post_3_title;
  const topBlock=hasTop?`<div style="border-top:1px solid #e8e8e5;padding-top:18px;margin-bottom:20px"><div style="font-size:13px;font-weight:500;margin-bottom:10px">Top 3 posts</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">${post(r.top_post_1_image,r.top_post_1_title,r.top_post_1_reach,r.top_post_1_engagement)}${post(r.top_post_2_image,r.top_post_2_title,r.top_post_2_reach,r.top_post_2_engagement)}${post(r.top_post_3_image,r.top_post_3_title,r.top_post_3_reach,r.top_post_3_engagement)}</div></div>`:'';
  const kv=(l,v)=>`<div style="display:flex;justify-content:space-between;padding:7px 12px;background:#f7f6f3;border-radius:7px;font-size:12px;margin-bottom:5px"><span style="color:#787774">${l}</span><span style="font-weight:500;color:#1a1a1a">${v||'—'}</span></div>`;
  const moreBlock=`<div style="border-top:1px solid #e8e8e5;padding-top:18px;margin-bottom:20px"><div style="font-size:13px;font-weight:500;margin-bottom:10px">Additional metrics</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">${kv('Profile visits',(r.profile_visits||0).toLocaleString())}${kv('Website clicks',(r.website_clicks||0).toLocaleString())}${kv('Story reach',(r.story_reach||0).toLocaleString())}${kv('Total impressions',(r.total_impressions||0).toLocaleString())}</div></div>`;
  const notesBlock=r.agency_notes?`<div style="border-top:1px solid #e8e8e5;padding-top:18px"><div style="font-size:13px;font-weight:500;margin-bottom:8px">Notes from AMS</div><div style="background:#fffaf5;border-left:3px solid ${brand};border-radius:0 7px 7px 0;padding:13px 15px;font-size:12.5px;color:#4a4a4a;line-height:1.55;font-style:italic">"${_escHtml(r.agency_notes)}"</div></div>`:'';

function _amsSEOBodyHTML({client,report,brand}){
  const r=report;
  const total=r.backlinks_total||0;const delta=r.backlinks_delta||0;
  const tile=(label,val,sub)=>`<div style="background:#f7f6f3;border-radius:8px;padding:14px 12px;text-align:center"><div style="font-size:10px;color:#787774;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em">${label}</div><div style="font-size:22px;font-weight:500;color:#1a1a1a">${val}</div>${sub?`<div style="font-size:10px;color:#8a8a8a;margin-top:3px;font-family:'Courier New',monospace">${sub}</div>`:''}</div>`;
  const onpageCount=(()=>{const s=(r.onpage_changes||'').trim();if(!s)return 0;const bul=s.split(/\r?\n/).filter(l=>/^\s*[-•*]/.test(l));if(bul.length)return bul.length;return s.split(/\r?\n/).map(l=>l.trim()).filter(Boolean).length;})();
  const tiles=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px">${tile('Backlinks Δ',(delta>0?'+':'')+delta.toLocaleString(),total?total.toLocaleString()+' total':'')}${tile('Blogs published',String(r.blogs_published||0),'')}${tile('Press releases',String(r.press_releases||0),'')}${tile('On-page changes',String(onpageCount),'')}</div>`;
  const krs=Array.isArray(r.keyword_rankings)?r.keyword_rankings:[];
  const improved=krs.filter(k=>_seoRankDelta(k.previous_rank,k.current_rank).dir==='up').length;
  const sorted=krs.slice().sort((a,b)=>{const da=_seoRankDelta(a.previous_rank,a.current_rank);const db=_seoRankDelta(b.previous_rank,b.current_rank);const score=(d)=>d.dir==='up'?-1000-d.diff:d.dir==='new'?-500:d.dir==='flat'?0:d.dir==='lost'?800:500+d.diff;return score(da)-score(db);});
  const lab=(v)=>(v===null||v===undefined||v==='')?'—':(Number(v)>100?'100+':'#'+v);
  const arrow=(p,c)=>{const d=_seoRankDelta(p,c);if(d.dir==='up')return`<span style="color:#15803d;font-family:'Courier New',monospace;font-weight:600;font-size:11.5px">↑${d.diff}</span>`;if(d.dir==='down')return`<span style="color:#b91c1c;font-family:'Courier New',monospace;font-weight:600;font-size:11.5px">↓${d.diff}</span>`;if(d.dir==='new')return`<span style="background:#fde68a;color:#92400e;border-radius:3px;padding:1px 6px;font-size:9px;text-transform:uppercase;letter-spacing:.5px;font-weight:600">New</span>`;return`<span style="color:#787774;font-family:'Courier New',monospace;font-size:11.5px">—</span>`;};
  const kwBlock=krs.length?`<div style="border-top:1px solid #e8e8e5;padding-top:18px;margin-bottom:20px"><div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px"><div style="font-size:13px;font-weight:500">Keyword movement</div><div style="font-size:11px;color:#787774">${improved} of ${krs.length} improved</div></div><table style="width:100%;border-collapse:collapse;border:1px solid #e8e8e5;border-radius:6px;overflow:hidden"><thead><tr><th style="text-align:left;padding:7px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#787774;background:#f7f6f3;font-weight:600">Keyword</th><th style="text-align:right;padding:7px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#787774;background:#f7f6f3;font-weight:600">Prev</th><th style="text-align:right;padding:7px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#787774;background:#f7f6f3;font-weight:600">Curr</th><th style="text-align:right;padding:7px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#787774;background:#f7f6f3;font-weight:600">Δ</th></tr></thead><tbody>${sorted.map(k=>`<tr><td style="padding:6px 10px;border-bottom:1px solid #f0f0ee;font-size:11.5px;color:#1a1a1a">${_escHtml(k.keyword)}</td><td style="padding:6px 10px;border-bottom:1px solid #f0f0ee;font-size:11.5px;color:#787774;text-align:right;font-family:'Courier New',monospace">${lab(k.previous_rank)}</td><td style="padding:6px 10px;border-bottom:1px solid #f0f0ee;font-size:11.5px;color:#1a1a1a;text-align:right;font-family:'Courier New',monospace;font-weight:500">${lab(k.current_rank)}</td><td style="padding:6px 10px;border-bottom:1px solid #f0f0ee;text-align:right">${arrow(k.previous_rank,k.current_rank)}</td></tr>`).join('')}</tbody></table></div>`:'';
  const renderBullets=(text)=>{const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean).map(l=>l.replace(/^[-•*]\s*/,''));return`<ul style="margin:6px 0 0 18px;font-size:12px;line-height:1.6;color:#4a4a4a">${lines.map(l=>`<li style="margin-bottom:3px">${_escHtml(l)}</li>`).join('')}</ul>`;};
  const onpageBlock=(r.onpage_changes&&r.onpage_changes.trim())?`<div style="border-top:1px solid #e8e8e5;padding-top:18px;margin-bottom:20px"><div style="font-size:13px;font-weight:500;margin-bottom:6px">On-page work this ${r.period_type==='weekly'?'week':'month'}</div>${renderBullets(r.onpage_changes)}</div>`:'';
  const planBlock=(r.next_period_plan&&r.next_period_plan.trim())?`<div style="border-top:1px solid #e8e8e5;padding-top:18px;margin-bottom:20px"><div style="font-size:13px;font-weight:500;margin-bottom:6px">What's next</div>${renderBullets(r.next_period_plan)}</div>`:'';
  const sheetBlock=r.sheet_url?`<div style="border-top:1px solid #e8e8e5;padding-top:14px;margin-bottom:20px;font-size:11.5px;color:#4a4a4a"><strong style="color:#787774;font-weight:600">Backlinks sheet:</strong> <a href="${_escHtml(r.sheet_url)}" style="color:${brand};text-decoration:none;word-break:break-all">${_escHtml(r.sheet_url)}</a></div>`:'';
  const notesBlock=(r.agency_notes&&r.agency_notes.trim())?`<div style="border-top:1px solid #e8e8e5;padding-top:18px"><div style="font-size:13px;font-weight:500;margin-bottom:8px">Notes from AMS</div><div style="background:#fffaf5;border-left:3px solid ${brand};border-radius:0 7px 7px 0;padding:13px 15px;font-size:12.5px;color:#4a4a4a;line-height:1.55;font-style:italic">"${_escHtml(r.agency_notes)}"</div></div>`:'';
  return tiles+kwBlock+onpageBlock+planBlock+sheetBlock+notesBlock;
}

// Shared AMS PDF chrome — header (AMS logo + tagline + report-type/period),
// centered body, footer (address + contact + confidential line). Used by
// both social and SEO PDF generators. Output suitable for html2pdf or
// window.print(). Pass autoPrint=true to fire window.print() on load.
function generateAMSReportHTML({type,client,report,agency,counts,autoPrint=false}){
  const brand=client?.brand_color_primary||'#ff00ee';
  const periodLabel=type==='seo'?_seoPeriodLabel(report):fmtMo(report.month);
  const title=type==='seo'?'SEO report':'Social media report';
  const body=type==='seo'?_amsSEOBodyHTML({client,report,brand}):_amsSocialBodyHTML({client,report,counts,brand});
  const headerHTML=`<div class="ams-pdf-header" style="display:flex;align-items:center;gap:16px;padding:22px 32px 18px;border-bottom:3px solid ${brand}">${_amsLogoHTML(agency,46)}<div style="flex:1"><div style="font-family:Georgia,serif;font-size:18px;color:#171717;font-weight:500;letter-spacing:-.01em">${_escHtml(agency?.legal_name||'Advance Media Solution')}</div><div style="font-size:10.5px;color:#8a8a8a;letter-spacing:.06em;margin-top:2px;text-transform:uppercase">Digital marketing partner</div></div><div style="text-align:right"><div style="font-size:10px;color:#8a8a8a;letter-spacing:.06em;text-transform:uppercase">${_escHtml(title)}</div><div style="font-family:Georgia,serif;font-size:14px;color:#171717;margin-top:2px">${_escHtml(periodLabel)}</div></div></div>`;
  const titleBlock=`<div style="text-align:center;padding:18px 0 14px"><div style="font-size:10.5px;color:${brand};letter-spacing:.16em;text-transform:uppercase;font-weight:600;margin-bottom:6px">${_escHtml(periodLabel)} · ${_escHtml(client?.name||'')}</div><div style="font-family:Georgia,serif;font-size:26px;color:#171717;font-weight:400;letter-spacing:-.01em">${_escHtml(title)}</div></div>`;
  const footerHTML=`<div class="ams-pdf-footer" style="border-top:1px solid #e8e8e5;padding:14px 32px 18px;font-size:10px;color:#8a8a8a;line-height:1.6;display:flex;align-items:flex-end;justify-content:space-between;gap:20px"><div style="flex:1"><div style="color:#4a4a4a;font-weight:500;font-size:11px;margin-bottom:2px">${_escHtml(agency?.legal_name||'Advance Media Solution')}</div><div>${_escHtml(_amsAddressLine(agency))}</div><div>${[agency?.contact_email,agency?.contact_phone].filter(Boolean).map(_escHtml).join(' · ')||''}</div></div><div style="text-align:right;font-size:10px;color:#b0aea9">Confidential — prepared for ${_escHtml(client?.name||'')} only.</div></div>`;
  const printScript=autoPrint?`<script>window.onload=()=>window.print();<\/script>`:'';
  return`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{box-sizing:border-box;margin:0;padding:0}
@page{size:A4;margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;color:#171717;background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.ams-pdf-page{width:210mm;min-height:297mm;background:#fff;display:flex;flex-direction:column;margin:0 auto}
.ams-pdf-body{flex:1;padding:8px 32px 28px}
.ams-pdf-body>.body-inner{margin:0 auto;width:100%;max-width:680px}
@media print{.ams-pdf-page{box-shadow:none}}
</style></head><body>
<div class="ams-pdf-page">
${headerHTML}
<div class="ams-pdf-body"><div class="body-inner">${titleBlock}${body}</div></div>
${footerHTML}
</div>
${printScript}
</body></html>`;
}

// Generate a branded AMS PDF for a saved report row, upload it to the
// `report-pdfs` Supabase Storage bucket, and patch the row's pdf_url
// column with the resulting public URL. Returns {url, error}.
// reportType: 'social' | 'seo'  ·  table: 'monthly_reports' | 'seo_reports'
async function generateAndUploadReportPdf(reportType,reportRow,client,counts){
  if(!reportRow?.id)return{url:null,error:'missing_row'};
  const table=reportType==='seo'?'seo_reports':'monthly_reports';
  let mount=null;
  try{
    // Lazy-load html2pdf (~200KB) — same script tag the invoice PDF uses.
    if(!window.html2pdf){
      await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
    }
    const agency=await getAgencyForPdf();
    const html=generateAMSReportHTML({type:reportType,client,report:reportRow,agency,counts,autoPrint:false});
    // Mount off-screen so html2canvas sees layout dimensions.
    mount=document.createElement('div');
    mount.style.cssText='position:fixed;left:-99999px;top:0;width:210mm;background:#fff;z-index:-1;pointer-events:none';
    mount.innerHTML=html;
    document.body.appendChild(mount);
    const target=mount.querySelector('.ams-pdf-page')||mount;
    const blob=await window.html2pdf().from(target).set({
      margin:0,
      filename:`${reportType==='seo'?'SEO':'Social'}-${client?.name||'report'}-${reportRow.period_key||reportRow.month||reportRow.id}.pdf`,
      image:{type:'jpeg',quality:0.92},
      html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff'},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
      pagebreak:{mode:['css','legacy']},
    }).outputPdf('blob');
    // Upload to Storage. File path: <type>/<id>.pdf — overwrites on regen.
    const path=`${reportType}/${reportRow.id}.pdf`;
    const{error:upErr}=await supabase.storage.from('report-pdfs').upload(path,blob,{cacheControl:'60',upsert:true,contentType:'application/pdf'});
    if(upErr)throw upErr;
    const{data:pub}=supabase.storage.from('report-pdfs').getPublicUrl(path);
    const publicUrl=pub?.publicUrl||null;
    if(!publicUrl)throw new Error('no_public_url');
    // Bust the CDN cache by appending a version param.
    const versioned=`${publicUrl}?v=${Date.now()}`;
    try{await dbPatch(table,reportRow.id,{pdf_url:versioned,pdf_generated_at:new Date().toISOString()},{skipAudit:true});}catch(_){/* non-fatal */}

// ── Contract PDF (one-shot, for Documenso upload) ─────────────────────
// The contract template body in our DB is markdown. For PDF generation we
// render that markdown → HTML, wrap it in the AMS PDF chrome, then
// html2pdf-it to a Blob. Same upload pattern as the Welcome Kit.
// The signature placement happens server-side by the Documenso Edge Fn,
// which reads the page count from the uploaded PDF.

// Tiny markdown→HTML renderer focused on what our seeded contracts use:
// #/##/### headings, **bold**, *italic*, `code`, paragraphs, bulleted +
// numbered lists, --- horizontal rules. Plain output — Tailwind/inline
// styles applied in the wrapper, not here. Anything fancier (tables,
// images) is YAGNI for v1.
function _mdToHtmlBasic(md){
  if(!md)return'';
  const esc=(s)=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const inline=(s)=>esc(s)
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/(?<!\*)\*([^*]+)\*(?!\*)/g,'<em>$1</em>');
  const lines=md.split(/\r?\n/);
  const out=[];let inList=null;
  const closeList=()=>{if(inList){out.push('</'+inList+'>');inList=null;}};
  for(const raw of lines){
    const line=raw.replace(/\s+$/,'');
    if(!line){closeList();continue;}
    if(/^---+$/.test(line.trim())){closeList();out.push('<hr class="amsc-hr"/>');continue;}
    const h3=line.match(/^###\s+(.+)$/);
    const h2=line.match(/^##\s+(.+)$/);
    const h1=line.match(/^#\s+(.+)$/);
    if(h1){closeList();out.push('<h1 class="amsc-h1">'+inline(h1[1])+'</h1>');continue;}
    if(h2){closeList();out.push('<h2 class="amsc-h2">'+inline(h2[1])+'</h2>');continue;}
    if(h3){closeList();out.push('<h3 class="amsc-h3">'+inline(h3[1])+'</h3>');continue;}
    const ol=line.match(/^(\d+)\.\s+(.+)$/);
    const ul=line.match(/^[-*]\s+(.+)$/);
    if(ol){if(inList!=='ol'){closeList();out.push('<ol class="amsc-ol">');inList='ol';}out.push('<li>'+inline(ol[2])+'</li>');continue;}
    if(ul){if(inList!=='ul'){closeList();out.push('<ul class="amsc-ul">');inList='ul';}out.push('<li>'+inline(ul[1])+'</li>');continue;}
    closeList();
    out.push('<p class="amsc-p">'+inline(line)+'</p>');
  }
  closeList();
  return out.join('\n');
}

// Renders the resolved-markdown contract to PDF, uploads to
// `report-pdfs/contracts/<submission_id>-draft.pdf` (overwrites on resend).
// Returns {url, error}. The "draft" suffix distinguishes the
// pre-signature PDF from the signed PDF that the webhook later writes
// to `report-pdfs/contracts/<contract_id>.pdf`.
async function generateAndUploadContractPdf({submissionId,client,contractMarkdown}){
  if(!submissionId)return{url:null,error:'missing_submission_id'};
  if(!contractMarkdown)return{url:null,error:'missing_contract_body'};
  let mount=null;
  try{
    if(!window.html2pdf){
      await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
    }
    const agency=await getAgencyForPdf();
    const html=generateContractHTML({client,contractMarkdown,agency});
    mount=document.createElement('div');
    mount.style.cssText='position:fixed;left:-99999px;top:0;width:210mm;background:#fff;z-index:-1;pointer-events:none';
    mount.innerHTML=html;
    document.body.appendChild(mount);
    const target=mount.querySelector('.ams-pdf-page')||mount;
    const blob=await window.html2pdf().from(target).set({
      margin:0,
      filename:`Retainer-${client?.name||'client'}.pdf`,
      image:{type:'jpeg',quality:0.92},
      html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff'},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
      pagebreak:{mode:['css','legacy']},
    }).outputPdf('blob');
    const path=`contracts/${submissionId}-draft.pdf`;
    const{error:upErr}=await supabase.storage.from('report-pdfs').upload(path,blob,{cacheControl:'60',upsert:true,contentType:'application/pdf'});
    if(upErr)throw upErr;
    const{data:pub}=supabase.storage.from('report-pdfs').getPublicUrl(path);
    const publicUrl=pub?.publicUrl||null;
    if(!publicUrl)throw new Error('no_public_url');
    return{url:`${publicUrl}?v=${Date.now()}`};
  }catch(e){
    console.error('[contract-pdf] failed',e);
    return{url:null,error:e?.message||String(e)};
  }finally{
    if(mount)try{document.body.removeChild(mount);}catch(_){}
  }
}

// ISO week helpers — Mon-start weeks, year follows the Thursday convention so
// e.g. Jan 1 2027 sits in 2026-W53 if needed. Mirrors the python isocalendar.
function _isoWeekParts(d){
  const t=new Date(d);t.setHours(0,0,0,0);
  t.setDate(t.getDate()+3-((t.getDay()+6)%7));
  const firstThu=new Date(t.getFullYear(),0,4);
  const diffDays=Math.round((t-firstThu)/86400000);
  return{year:t.getFullYear(),week:Math.floor(diffDays/7)+1};
}
function _isoWeekKey(d){const{year,week}=_isoWeekParts(d);return`${year}-W${String(week).padStart(2,'0')}`;}
function _isoWeekRange(year,week){
  const jan4=new Date(year,0,4);
  const firstMon=new Date(jan4);firstMon.setDate(jan4.getDate()-((jan4.getDay()+6)%7));
  const start=new Date(firstMon);start.setDate(firstMon.getDate()+(week-1)*7);
  const end=new Date(start);end.setDate(start.getDate()+6);
  const iso=(x)=>`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
  return{start:iso(start),end:iso(end)};
}
function _monthKey(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function _monthRange(year,month){
  const start=`${year}-${String(month).padStart(2,'0')}-01`;
  const last=new Date(year,month,0).getDate();
  const end=`${year}-${String(month).padStart(2,'0')}-${String(last).padStart(2,'0')}`;
  return{start,end};
}
function _seoPeriodLabel(r){
  if(!r||!r.period_start)return r?.period_key||'—';
  if(r.period_type==='monthly'){
    const d=new Date(r.period_start+'T00:00:00');
    return d.toLocaleDateString('en-IN',{month:'long',year:'numeric'});
  }
  const s=new Date(r.period_start+'T00:00:00');
  const e=new Date(r.period_end+'T00:00:00');
  if(s.getMonth()===e.getMonth()){
    return`Week of ${s.toLocaleDateString('en-IN',{month:'short',day:'numeric'})}–${e.getDate()}, ${e.getFullYear()}`;
  }
  return`Week of ${s.toLocaleDateString('en-IN',{month:'short',day:'numeric'})} – ${e.toLocaleDateString('en-IN',{month:'short',day:'numeric'})}, ${e.getFullYear()}`;
}
function _seoRankDelta(prev,curr){
  const hp=prev!==null&&prev!==undefined&&prev!=='';
  const hc=curr!==null&&curr!==undefined&&curr!=='';
  if(!hp&&hc)return{dir:'new',diff:0};
  if(hp&&!hc)return{dir:'lost',diff:0};
  if(!hp&&!hc)return{dir:'flat',diff:0};
  const p=Number(prev),c=Number(curr);
  if(c===p)return{dir:'flat',diff:0};
  if(c<p)return{dir:'up',diff:p-c};
  return{dir:'down',diff:c-p};
}
function _seoRankBadge(prev,curr){
  const d=_seoRankDelta(prev,curr);
  if(d.dir==='up')return h`<span style=${{color:'#15803D',fontFamily:'monospace',fontSize:12,fontWeight:600}}>↑${d.diff}</span>`;
  if(d.dir==='down')return h`<span style=${{color:'#B91C1C',fontFamily:'monospace',fontSize:12,fontWeight:600}}>↓${d.diff}</span>`;
  if(d.dir==='new')return h`<span style=${{background:'#fde68a',color:'#92400e',borderRadius:3,padding:'1px 6px',fontSize:10,textTransform:'uppercase',letterSpacing:'.5px',fontWeight:600}}>New</span>`;
  return h`<span style=${{color:'var(--t3)',fontFamily:'monospace',fontSize:12}}>—</span>`;
}

  const[members,setMembers]=useState([]);

    if(!c?.id)return;

    try{
      const rows=await db('team_members',`&client_id=eq.${c.id}&role_level=eq.client&deleted_at=is.null&order=is_primary_for_brand.desc.nullslast,created_at.asc`);
      setMembers(rows||[]);
    }catch(e){console.warn('[brand-members] load failed',e);}
    finally{setLoading(false);}
  },[c?.id]);
  useEffect(()=>{load();},[load]);

    try{
      const res=await fetch(`${SB_URL}/functions/v1/send-client-welcome`,{

      const res=await addBrandMember(c,email,name,designation);

      else showToast('Member added & welcome email sent ✓');

        'info',c.name,null,'client',c.id);}catch(_){}

      </div>`}
    </div>`:h`<div style=${{display:'flex',flexDirection:'column',gap:6,marginBottom:10}}>
      ${members.map(m=>{
        const name=m.client_member_name||m.contact_name||'(no name)';
        const ini=(name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()||'?';
        const initialsColor=m.color||'#ff00ee';

              <span style=${{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${name}</span>

          ${canManage&&members.length>1&&h`<button class="btn-sec" style=${{padding:'5px 9px',fontSize:11,color:'#DC2626',borderColor:'rgba(220,38,38,.3)'}} onClick=${()=>remove(m)} title="Remove this member's portal access"><i class="ti ti-trash" style=${{fontSize:11}}></i></button>`}

    ${canManage&&!adding&&h`<button class="btn-sec" style=${{padding:'7px 12px',fontSize:12}} onClick=${()=>{setAdding(true);setErr('');}}><i class="ti ti-user-plus" style=${{fontSize:13}}></i> Add a teammate</button>`}
    ${adding&&h`<div style=${{padding:14,border:'1px solid var(--bd2)',borderRadius:10,background:'var(--bg2)',marginTop:8,display:'flex',flexDirection:'column',gap:10}}>
      <div style=${{fontSize:12,fontWeight:600,color:'var(--t1)'}}>Invite a teammate to ${c.name}</div>
      <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
        <input class="fi" placeholder="Name (e.g. Priya Sharma)" value=${form.name} onInput=${e=>setForm({...form,name:e.target.value})} style=${{fontSize:13}} autoFocus/>
        <input class="fi" placeholder="Email" value=${form.email} onInput=${e=>setForm({...form,email:e.target.value})} type="email" style=${{fontSize:13}}/>

const BRAND_BUCKET='brand-assets';
async function uploadBrandAsset(clientId,type,file){
  const safe=(file.name||'file').replace(/[^a-zA-Z0-9._-]/g,'_');
  const path=`client_${clientId}/${type}/${scopeUuid()}-${safe}`;
  const{error}=await supabase.storage.from(BRAND_BUCKET).upload(path,file,{cacheControl:'31536000',upsert:false,contentType:file.type||undefined});
  if(error)throw error;
  const{data:pub}=supabase.storage.from(BRAND_BUCKET).getPublicUrl(path);
  return{url:pub.publicUrl,file_path:path};
}
async function deleteBrandAssetFile(file_path){
  if(!file_path)return;
  try{await supabase.storage.from(BRAND_BUCKET).remove([file_path]);}catch(e){console.warn('[brand-asset] storage delete failed',e);}
}

function ordinalDayLocal(n){const d=Number(n)||1;const j=d%10,k=d%100;if(j===1&&k!==11)return d+'st';if(j===2&&k!==12)return d+'nd';if(j===3&&k!==13)return d+'rd';return d+'th';}

/* ── STATEMENT OF ACCOUNT ──

   total. Printable + WhatsApp-shareable.                                       */
function fmtMonthYear(s){if(!s)return'—';try{const d=new Date(s);return d.toLocaleDateString('en-IN',{month:'long',year:'numeric'});}catch(_){return s;}}
function fmtDateLong(s){if(!s)return'—';try{return new Date(s).toLocaleDateString('en-IN',{day:'2-digit',month:'long',year:'numeric'});}catch(_){return s;}}
// Indian-format currency — 4,50,000 (lakhs grouping). Number → string with no symbol.
function fmtINR(n,withDec=true){const v=Number(n)||0;return v.toLocaleString('en-IN',{maximumFractionDigits:withDec?2:0,minimumFractionDigits:withDec?2:0});}
// Indian English number-to-words. Used on the invoice template's "Amount in words" line.
function numToIndianWords(n){
  if(n===null||n===undefined||isNaN(n))return'';
  const num=Math.round(Number(n)*100)/100;if(num===0)return'Zero Rupees Only';
  const ones=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const tens=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  const sub99=(x)=>{if(x<20)return ones[x];const t=Math.floor(x/10),o=x%10;return tens[t]+(o?' '+ones[o]:'');};
  const sub999=(x)=>{const h=Math.floor(x/100),r=x%100;let s='';if(h)s=ones[h]+' Hundred';if(r){if(s)s+=' ';s+=sub99(r);}return s;};
  const rupees=Math.floor(num);const paise=Math.round((num-rupees)*100);
  let r=rupees;const crore=Math.floor(r/10000000);r%=10000000;const lakh=Math.floor(r/100000);r%=100000;const thou=Math.floor(r/1000);r%=1000;
  let out='';if(crore)out+=sub99(crore)+' Crore';if(lakh){if(out)out+=' ';out+=sub99(lakh)+' Lakh';}if(thou){if(out)out+=' ';out+=sub99(thou)+' Thousand';}if(r){if(out)out+=' ';out+=sub999(r);}
  if(!out)out='Zero';let final='Indian Rupees '+out;if(paise>0)final+=' and '+sub99(paise)+' Paise';return final+' Only';
}
// Build {subtotal, taxable, cgst, sgst, igst, total} from line items + agency/client state.
function calcInvoiceTotals({lineItems=[],gstRate=18,discount=0,agencyState='',clientState='',placeOfSupply=''}){
  const subtotal=lineItems.reduce((s,it)=>s+(Number(it.qty)||0)*(Number(it.rate)||0),0);
  const taxable=Math.max(0,subtotal-(Number(discount)||0));
  const pos=(placeOfSupply||clientState||'').toLowerCase();
  const isExport=pos.includes('other countries')||pos.includes('export')||pos.includes('overseas');
  if(isExport){return{subtotal,discount:Number(discount)||0,taxable,supplyType:'EXPWOP',gstRate:0,cgst:0,sgst:0,igst:0,total:taxable};}
  const rate=Number(gstRate)||0;const tax=taxable*(rate/100);
  const intra=agencyState&&clientState&&agencyState.trim().toLowerCase()===clientState.trim().toLowerCase();
  const supplyType=(/\d/.test(/* placeholder */ '')||true)?'B2B':'B2C'; // refined below by caller via gstin presence
  if(intra){const half=Math.round(tax*50)/100;return{subtotal,discount:Number(discount)||0,taxable,supplyType,gstRate:rate,cgst:half,sgst:tax-half,igst:0,total:taxable+tax};}
  return{subtotal,discount:Number(discount)||0,taxable,supplyType,gstRate:rate,cgst:0,sgst:0,igst:tax,total:taxable+tax};
}
// Snapshot the agency + client at the moment of issue so the invoice never changes
// retroactively if AMS moves office or the client's address is edited later.
function buildAgencySnapshot(s){if(!s)return null;return{legal_name:s.legal_name,trade_name:s.trade_name,address:[s.address_line_1,s.address_line_2,[s.city,s.state,s.pincode].filter(Boolean).join(', '),s.country].filter(Boolean).join('\n'),city:s.city,state:s.state,pincode:s.pincode,country:s.country,gstin:s.gstin,pan:s.pan,contact_email:s.contact_email,contact_phone:s.contact_phone,bank_account_name:s.bank_account_name,bank_name:s.bank_name,bank_account_number:s.bank_account_number,bank_ifsc:s.bank_ifsc,upi_id:s.upi_id,signatory_name:s.signatory_name,signatory_designation:s.signatory_designation,signature_url:s.signature_url,logo_url:s.logo_url};}
function buildClientSnapshot(c){if(!c)return null;return{name:c.name,contact_name:c.contact_name,contact_email:c.contact_email,contact_phone:c.contact_phone,bill_address:c.bill_address||c.address||'',state:c.state,place_of_supply:c.place_of_supply||c.state||'',gstin:c.gstin,pan:c.pan};}

/* ── INVOICE TEMPLATE (pure render — same template powers viewer, PDF, portal) ── */
function InvoiceTemplate({invoice}){
  const inv=invoice;if(!inv)return null;
  const a=inv.agency_snapshot||{};
  const c=inv.client_snapshot||{};
  const lines=Array.isArray(inv.line_items)?inv.line_items:(typeof inv.line_items==='string'?(()=>{try{return JSON.parse(inv.line_items);}catch(_){return[];}})():[]);
  const items=lines.length?lines:[{description:inv.period_label||fmtMonthYear(inv.period_start)||'Services',hsn_sac:inv.hsn_sac||'998314',qty:1,rate:Number(inv.taxable_value||inv.subtotal||inv.amount)||0,amount:Number(inv.taxable_value||inv.subtotal||inv.amount)||0}];
  const subtotal=Number(inv.subtotal)||items.reduce((s,it)=>s+(Number(it.qty)||0)*(Number(it.rate)||0),0);
  const discount=Number(inv.discount_amount)||0;
  const taxable=Number(inv.taxable_value)||(subtotal-discount);
  const cgst=Number(inv.cgst_amount)||0,sgst=Number(inv.sgst_amount)||0,igst=Number(inv.igst_amount)||0;
  const total=Number(inv.amount)||(taxable+cgst+sgst+igst);
  const paid=Number(inv.amount_paid)||0;
  const balance=Math.max(0,total-paid);
  const stamp=inv.status==='paid'?'PAID':inv.status==='cancelled'?'CANCELLED':null;

function TeamView({team,clients,loading,embedded}){
  const ordered=sortTeam(team.filter(m=>m.role_level!=='client'));
  // Week = Monday → Sunday
  const today=new Date();
  const weekStart=new Date(today);
  const dow=(today.getDay()+6)%7;
  weekStart.setDate(today.getDate()-dow);weekStart.setHours(0,0,0,0);
  const weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+6);
  const isoOf=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const wsISO=isoOf(weekStart),weISO=isoOf(weekEnd);
  const weekLabel=`${weekStart.toLocaleDateString('en-IN',{day:'numeric',month:'short'})} – ${weekEnd.toLocaleDateString('en-IN',{day:'numeric',month:'short'})}`;

  const[posts,setPosts]=useState([]);
  const[postsLoading,setPostsLoading]=useState(true);
  const[expanded,setExpanded]=useState(null);
  useEffect(()=>{
    setPostsLoading(true);
    db('content',`&post_date=gte.${wsISO}&post_date=lte.${weISO}`)
      .then(r=>setPosts(r||[]))
      .catch(()=>setPosts([]))
      .finally(()=>setPostsLoading(false));
  },[wsISO,weISO]);

  const clientMap={};(clients||[]).forEach(c=>{clientMap[c.id]=c;});
  // Group posts by assignee name
  const byMember={};
  posts.forEach(p=>{
    if(!p.assigned_to)return;
    if(!byMember[p.assigned_to])byMember[p.assigned_to]={total:0,done:0,posts:[]};
    byMember[p.assigned_to].total++;
    if(taskDone(p))byMember[p.assigned_to].done++;
    byMember[p.assigned_to].posts.push(p);
  });

  // Build rows: every member + unassigned + ghost members (assigned but not in team)
  const rows=ordered.map(m=>{
    const w=byMember[m.name]||{total:0,done:0,posts:[]};
    const cap=m.capacity;
    const pct=cap?Math.round(w.total/cap*100):null;
    let tone='none';
    if(cap){
      if(w.total>=cap)tone='over';
      else if(w.total>=Math.ceil(cap*.8))tone='warn';
      else tone='ok';
    }
    return{member:m,total:w.total,done:w.done,posts:w.posts,cap,pct,tone};
  });
  const ghostNames=Object.keys(byMember).filter(n=>!ordered.some(m=>m.name===n));
  const teamTotal=posts.filter(p=>p.assigned_to).length;
  const teamCap=ordered.reduce((a,m)=>a+(m.capacity||0),0);
  const overCount=rows.filter(r=>r.tone==='over').length;
  const warnCount=rows.filter(r=>r.tone==='warn').length;
  const noCapCount=ordered.filter(m=>!m.capacity).length;
  const unassigned=posts.filter(p=>!p.assigned_to).length;

  const toneStyle={
    ok:{bar:'var(--green)',bg:'rgba(34,197,94,.10)',label:'On track'},
    warn:{bar:'var(--amber)',bg:'rgba(245,158,11,.12)',label:'Near capacity'},
    over:{bar:'var(--red)',bg:'rgba(239,68,68,.12)',label:'Over capacity'},
    none:{bar:'var(--t3)',bg:'var(--bg2)',label:'No cap set'},
  };

  return h`<div>
    ${!embedded&&h`<div class="greeting" style=${{fontSize:26,marginBottom:6}}>Team</div>
    <div class="gsub">My Digital Sevak · Metropolis, Rudrapur</div>`}

    <div class="ce-section" style=${{marginTop:embedded?0:24,paddingTop:0,borderTop:'none'}}>
      <div style=${{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:14,gap:12,flexWrap:'wrap'}}>
        <div>
          <div style=${{fontSize:18,fontWeight:600,color:'var(--t1)'}}><i class="ti ti-gauge" style=${{marginRight:8,color:'var(--brand)'}}></i>Workload this week</div>
          <div style=${{fontSize:12,color:'var(--t3)',marginTop:3}}>${weekLabel} · posts assigned vs weekly capacity</div>
        </div>
        <div style=${{display:'flex',gap:14,fontSize:12,color:'var(--t2)',flexWrap:'wrap'}}>
          <div><strong style=${{color:'var(--t1)',fontSize:14}}>${teamTotal}</strong> posts</div>
          ${teamCap>0&&h`<div><strong style=${{color:'var(--t1)',fontSize:14}}>${teamCap}</strong> team capacity</div>`}
          ${overCount>0&&h`<div style=${{color:'var(--red)'}}><i class="ti ti-flame"></i> ${overCount} over</div>`}
          ${warnCount>0&&h`<div style=${{color:'var(--amber)'}}><i class="ti ti-alert-triangle"></i> ${warnCount} near cap</div>`}
          ${unassigned>0&&h`<div style=${{color:'var(--t3)'}}><i class="ti ti-help"></i> ${unassigned} unassigned</div>`}
        </div>
      </div>

      ${noCapCount>0&&h`<div style=${{fontSize:12,color:'var(--t3)',background:'var(--bg2)',padding:'8px 12px',borderRadius:8,marginBottom:12,display:'flex',alignItems:'center',gap:8}}>
        <i class="ti ti-info-circle"></i>
        ${noCapCount} member${noCapCount===1?' has':'s have'} no capacity set yet. Add posts/week in <strong>Settings → Team members</strong> to see them on the heatmap.
      </div>`}

      ${postsLoading?h`<div style=${{display:'flex',flexDirection:'column',gap:8}}>${[...Array(4)].map((_,i)=>h`<${Skel} key=${i} h=${56}/>`)}</div>`
      :h`<div style=${{display:'flex',flexDirection:'column',gap:8}}>
        ${rows.length===0&&h`<div style=${{padding:20,textAlign:'center',color:'var(--t3)',fontSize:13}}>No team members yet.</div>`}
        ${rows.map(r=>{
          const ts=toneStyle[r.tone];
          const isOpen=expanded===r.member.id;
          const fillPct=r.cap?Math.min(100,(r.total/r.cap)*100):(r.total>0?40:0);
          return h`<div key=${r.member.id} style=${{border:'1px solid var(--bd)',borderRadius:'var(--rl)',background:'var(--surface)',overflow:'hidden',transition:'border-color .15s',borderColor:r.tone==='over'?'rgba(239,68,68,.4)':r.tone==='warn'?'rgba(245,158,11,.4)':'var(--bd)'}}>
            <div onClick=${()=>setExpanded(isOpen?null:r.member.id)} style=${{display:'grid',gridTemplateColumns:'auto 1fr auto',gap:14,alignItems:'center',padding:'12px 16px',cursor:r.total>0?'pointer':'default'}}>
              <${Av} i=${r.member.initials||r.member.name.slice(0,2)} c=${r.member.color||'#FF00EE'} s=${40}/>
              <div style=${{minWidth:0}}>
                <div style=${{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                  <div style=${{fontSize:14,fontWeight:600,color:'var(--t1)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${r.member.name}</div>
                  <span class=${'role-badge '+(ROLE_BADGE[r.member.role_level]||'rb-editor')} style=${{fontSize:9,padding:'1px 6px'}}>${ROLES[r.member.role_level]||r.member.role||'—'}</span>
                </div>
                <div style=${{position:'relative',height:8,background:'var(--bg2)',borderRadius:4,overflow:'hidden'}}>
                  <div style=${{position:'absolute',inset:0,width:fillPct+'%',background:ts.bar,borderRadius:4,transition:'width .35s'}}></div>
                  ${r.cap&&r.total>r.cap&&h`<div style=${{position:'absolute',top:0,left:'100%',transform:'translateX(-2px)',width:2,height:'100%',background:'#fff',opacity:.7}}></div>`}
                </div>
              </div>
              <div style=${{textAlign:'right',minWidth:90}}>
                <div style=${{fontSize:14,fontWeight:600,color:ts.bar,whiteSpace:'nowrap'}}>${r.total}${r.cap?'/'+r.cap:''}</div>
                <div style=${{fontSize:10,color:'var(--t3)',marginTop:2}}>${r.cap?ts.label+(r.pct!=null?' · '+r.pct+'%':''):'no cap set'}</div>
              </div>
            </div>
            ${isOpen&&r.posts.length>0&&h`<div style=${{borderTop:'1px solid var(--bd)',padding:'8px 16px 12px',background:'var(--bg)'}}>
              ${r.posts.slice().sort((a,b)=>(a.post_date||'').localeCompare(b.post_date||'')).map(p=>{
                const cl=clientMap[p.client_id];
                const done=taskDone(p);
                return h`<div key=${p.id} style=${{display:'flex',alignItems:'center',gap:10,padding:'6px 4px',borderBottom:'1px dashed var(--bd)',fontSize:13}}>
                  <div style=${{width:6,height:6,borderRadius:'50%',background:done?'var(--green)':'var(--t3)',flexShrink:0}}></div>
                  <div style=${{flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:done?'var(--t3)':'var(--t1)',textDecoration:done?'line-through':'none'}}>${p.title||'Untitled'}</div>
                  <div style=${{fontSize:11,color:'var(--t3)',whiteSpace:'nowrap'}}>${cl?cl.name:'—'}</div>
                  <div style=${{fontSize:11,color:'var(--t2)',whiteSpace:'nowrap',width:56,textAlign:'right'}}>${fmtS(p.post_date)}</div>
                </div>`;
              })}
            </div>`}
          </div>`;
        })}
        ${ghostNames.length>0&&h`<div style=${{fontSize:11,color:'var(--t3)',marginTop:6,padding:'8px 4px'}}><i class="ti ti-ghost"></i> Posts also assigned to: ${ghostNames.map(n=>n+' ('+byMember[n].total+')').join(', ')} — not in current team list.</div>`}
      </div>`}
    </div>

    <div class="ce-section" style=${{marginTop:28}}>
      <div class="ce-section-lbl" style=${{marginBottom:14}}><i class="ti ti-users" style=${{fontSize:13,color:'var(--brand)'}}></i>Workspace members</div>
      ${loading?h`<div class="tg">${[...Array(5)].map((_,i)=>h`<${Skel} key=${i} h=${96}/>`)}</div>`
      :h`<div class="tg">${ordered.map(m=>h`<div key=${m.id} class="tc"><${Av} i=${m.initials} c=${m.color} s=${54}/><div><div style=${{fontSize:16,fontWeight:500}}>${m.name}</div><div style=${{fontSize:14,color:'var(--t2)',marginTop:3}}>${m.role}</div><div style=${{display:'flex',alignItems:'center',gap:6,marginTop:6,flexWrap:'wrap'}}>${m.role_level&&h`<span class=${'role-badge '+(ROLE_BADGE[m.role_level]||'rb-editor')}>${ROLES[m.role_level]}</span>`}${m.capacity?h`<span style=${{fontSize:10,color:'var(--t2)',background:'var(--bg2)',padding:'2px 7px',borderRadius:10,fontWeight:500}}><i class="ti ti-gauge" style=${{fontSize:10,marginRight:3}}></i>${m.capacity}/wk</span>`:null}</div></div></div>`)}</div>`}
    </div>
  </div>`;
}

const GST_RATE=0.18;
const AD_PLATFORMS={
  instagram:{lbl:'Instagram',ic:'ti-brand-instagram',col:'#C13584',bg:'#FCE7F3'},
  facebook:{lbl:'Facebook',ic:'ti-brand-facebook',col:'#1877F2',bg:'#DBEAFE'},
  google:{lbl:'Google',ic:'ti-brand-google',col:'#0F9D58',bg:'#DCFCE7'},

  other:{lbl:'Other',ic:'ti-circle-dot',col:'#6B7280',bg:'#F3F4F6'},
};
const rupee=(n)=>'₹'+(Math.round((n||0)*100)/100).toLocaleString('en-IN');
const isoDate=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const adStats=(ad,log={})=>{
  if(!ad.start_date||!ad.daily_budget)return null;
  const start=new Date(ad.start_date);start.setHours(0,0,0,0);
  const t=new Date();t.setHours(0,0,0,0);
  const daysSince=Math.max(0,Math.floor((t-start)/86400000)+1);
  const maxDays=ad.total_budget?Math.ceil(ad.total_budget/ad.daily_budget):Infinity;
  const cap=Math.min(daysSince,365);
  // Paused approximation: we don't store WHEN an ad was paused, so while it is
  // paused we stop projecting daily_budget beyond the last actually-logged day —
  // only logged actual entries count from there. Resuming restores projection.
  const paused=ad.status==='paused';
  const lastLogged=paused?(Object.keys(log).sort().pop()||null):null;
  const blendedRows=[];let spent=0;let actualDays=0;let actualSum=0;
  for(let i=1;i<=cap;i++){
    const d=new Date(start.getTime()+(i-1)*86400000);
    const dk=isoDate(d);
    const entry=log[dk];
    let amt=entry?Number(entry.amount_spent)||0:(paused&&(!lastLogged||dk>lastLogged)?0:ad.daily_budget);
    if(ad.total_budget>0&&spent+amt>ad.total_budget)amt=Math.max(0,ad.total_budget-spent);
    spent+=amt;
    if(entry){actualDays++;actualSum+=Number(entry.amount_spent)||0;}
    blendedRows.push({day:i,date:d,dateKey:dk,amount:amt,isActual:!!entry,entry});
    if(ad.total_budget>0&&spent>=ad.total_budget)break;
  }
  const avgDaily=actualDays>=2?actualSum/actualDays:ad.daily_budget;
  const isComplete=ad.status==='completed'||(ad.total_budget>0&&spent>=ad.total_budget);
  const remaining=ad.total_budget?Math.max(0,ad.total_budget-spent):null;
  const daysToExhaust=(!paused&&remaining!==null&&avgDaily>0)?Math.ceil(remaining/avgDaily):null;
  const endDate=isComplete?t:(daysToExhaust!==null?new Date(t.getTime()+daysToExhaust*86400000):null);
  return{daysSince,maxDays,spent,gst:spent*GST_RATE,totalWithGst:spent*(1+GST_RATE),daysRemaining:daysToExhaust,endDate,isComplete,start,blendedRows,actualDays};
};
