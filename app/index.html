function DirectTaskQuickCapture({currentUser,clients,onClose,showToast,initialAssignee}){
  const teamNames=useTeamNames();
  const[text,setText]=useState('');
  const[assignee,setAssignee]=useState(initialAssignee||teamNames[0]||'');
  const[priority,setPriority]=useState('today');
  const[clientId,setClientId]=useState('');
  const[expected,setExpected]=useState(()=>{const d=new Date();d.setHours(23,59,0,0);return d.toISOString().slice(0,16);});
  const[recurring,setRecurring]=useState('none');
  const[parsed,setParsed]=useState(null); // array of {title,description} or null
  const[aiBusy,setAiBusy]=useState(false);
  const[aiErr,setAiErr]=useState('');
  const[saving,setSaving]=useState(false);
  useEffect(()=>{const d=dtExpectedDefault(priority);if(d){setExpected(d.slice(0,16));}else{setExpected('');}},[priority]);
  const aiSplit=async()=>{
    const apiKey=getAiKey();
    if(!apiKey){setAiErr('Set Anthropic API key first (AI Planner setup). Nothing parsed.');return;}
    if(!text.trim())return;
    setAiBusy(true);setAiErr('');
    try{
      const prompt=`You are parsing a freeform task dump from an admin at a digital-marketing agency. Split it into discrete tasks.\nINPUT:\n"""\n${text}\n"""\nReturn ONLY valid JSON array, no markdown. Each item: {"title":"short imperative","description":"any extra detail or null"}. If only one task, return array of one. Strip headers/dates/greetings. Combine fragmented context into description.`;
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','x-api-key':apiKey,'anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,messages:[{role:'user',content:prompt}]})});
      if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||'API error');}
      const data=await res.json();const out=data.content[0].text;const m=out.match(/\[[\s\S]*\]/);if(!m)throw new Error('Parse error');
      const arr=JSON.parse(m[0]).filter(x=>x&&x.title).map(x=>({title:String(x.title).trim(),description:x.description?String(x.description).trim():''}));
      if(!arr.length)throw new Error('No tasks found in text');
      setParsed(arr);
    }catch(e){setAiErr(e.message||'Parse failed');}finally{setAiBusy(false);}
  };
  const save=async()=>{
    if(!assignee){showToast('Pick an assignee');return;}
    const items=parsed?parsed:[{title:text.trim(),description:''}];
    const valid=items.filter(x=>x.title&&x.title.trim());
    if(!valid.length){showToast('Task title required');return;}
    setSaving(true);
    try{
      const expIso=expected?new Date(expected).toISOString():null;
      const payload=valid.map(x=>({
        title:x.title.slice(0,200),description:x.description||null,
        assignee,assigned_by:currentUser.name,priority,status:'new',
        expected_completion:expIso,linked_client_id:clientId||null,
        recurring,
      }));
      const rows=await dbInsert('direct_tasks',payload,{skipAudit:true,skipStamp:true});
      showToast(`${rows.length} task${rows.length>1?'s':''} sent to ${assignee} ✓`);
      const cn=clientId?(clients||[]).find(c=>c.id===clientId)?.name:null;
      const titleN=rows.length>1?`📥 ${rows.length} new direct tasks from ${currentUser.name}`:`📥 New direct task from ${currentUser.name}`;
      const msg=valid.slice(0,3).map(x=>'• '+x.title).join('\n')+(valid.length>3?`\n+${valid.length-3} more`:'');
      // If a single task was created, deep-link to it; otherwise open the DT inbox.
      const dtLink=rows.length===1?rows[0].id:null;
      insertNotif(assignee,titleN,msg+(cn?`\n— ${cn}`:''),priority==='urgent'?'alert':'info',cn,null,'direct_task',dtLink);
      onClose();
    }catch(e){showToast('Save failed: '+(e.message||e));}finally{setSaving(false);}
  };
  return h`<div class="modal" onClick=${e=>{if(e.target===e.currentTarget)onClose()}}>
    <div class="modal-box" style=${{maxWidth:'620px'}}>
      <div class="modal-head">
        <div>
          <div style=${{fontSize:16,fontWeight:600,display:'flex',alignItems:'center',gap:8}}><i class="ti ti-bolt" style=${{fontSize:18,color:'var(--brand)',filter:'drop-shadow(0 0 6px rgba(255,0,238,.4))'}}></i>Send direct task</div>
          <div style=${{fontSize:12,color:'var(--t3)',marginTop:2}}>Paste a dump or type a single task. AI can split multiple. <span class="dt-kbd">⌘K</span> from anywhere.</div>
        </div>
        <button class="icon-btn" onClick=${onClose}><i class="ti ti-x"></i></button>
      </div>
      <div class="modal-body dt-qc-body">
        ${!parsed&&h`<textarea class="dt-qc-ta" placeholder=${"Aruj — Bluwalker sales ad\nGlowra glam shoot by Samar and Shivam if possible Tuesday\nAdd text editor in dashboard notepad\n..."} value=${text} onInput=${e=>setText(e.target.value)} autoFocus></textarea>`}
        ${!parsed&&h`<div class="dt-qc-ai"><i class="ti ti-sparkles" style=${{color:'var(--brand)'}}></i><span>Multiple tasks in one block? AI can split them.</span><button class="dt-qc-ai-btn" onClick=${aiSplit} disabled=${aiBusy||!text.trim()}>${aiBusy?h`<i class="ti ti-loader-2 spinner"></i> Parsing`:h`<i class="ti ti-sparkles"></i> Parse`}</button></div>`}
        ${aiErr&&h`<div class="err"><i class="ti ti-alert-circle"></i>${aiErr}</div>`}
        ${parsed&&h`<div>
          <div style=${{fontSize:12,color:'var(--t2)',marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span>${parsed.length} task${parsed.length>1?'s':''} parsed</span>
            <button class="btn-sec" style=${{padding:'4px 10px',fontSize:11}} onClick=${()=>setParsed(null)}><i class="ti ti-arrow-back-up"></i> Back to text</button>
          </div>
          <div class="dt-qc-parsed">
          ${parsed.map((p,i)=>h`<div key=${i} class="dt-qc-parsed-item">
            <div style=${{flex:1,display:'flex',flexDirection:'column',gap:6}}>
              <input class="fi" value=${p.title} onInput=${e=>setParsed(ps=>ps.map((x,j)=>j===i?{...x,title:e.target.value}:x))}/>
              ${p.description&&h`<textarea class="fi" rows="2" style=${{fontSize:11,resize:'vertical'}} value=${p.description} onInput=${e=>setParsed(ps=>ps.map((x,j)=>j===i?{...x,description:e.target.value}:x))}></textarea>`}
            </div>
            <button class="dt-qc-parsed-del" onClick=${()=>setParsed(ps=>ps.filter((_,j)=>j!==i))}><i class="ti ti-x"></i></button>
          </div>`)}
          </div>
        </div>`}
        <div class="dt-qc-row">
          <div><div class="fi-lbl">Assignee</div>
            <select class="fi fi-select" value=${assignee} onChange=${e=>setAssignee(e.target.value)}>
              ${teamNames.filter(n=>n!==currentUser.name).map(n=>h`<option key=${n} value=${n}>${n}</option>`)}
            </select>
          </div>
          <div><div class="fi-lbl">Priority</div>
            <select class="fi fi-select" value=${priority} onChange=${e=>setPriority(e.target.value)}>
              ${DT_PRIORITY_ORDER.map(k=>h`<option key=${k} value=${k}>${DT_PRIORITY[k].label}</option>`)}
            </select>
          </div>
        </div>
        <div class="dt-qc-row">
          <div><div class="fi-lbl">Expected completion</div>
            <input class="fi" type="datetime-local" value=${expected} onInput=${e=>setExpected(e.target.value)}/>
          </div>
          <div><div class="fi-lbl">Linked client (optional)</div>
            <select class="fi fi-select" value=${clientId} onChange=${e=>setClientId(e.target.value)}>
              <option value="">— None —</option>
              ${(clients||[]).map(c=>h`<option key=${c.id} value=${c.id}>${c.name}</option>`)}
            </select>
          </div>
        </div>
        <div><div class="fi-lbl">Repeat</div>
          <select class="fi fi-select" value=${recurring} onChange=${e=>setRecurring(e.target.value)}>
            ${Object.entries(DT_RECURRING).map(([k,v])=>h`<option key=${k} value=${k}>${v.label}</option>`)}
          </select>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn-sec" onClick=${onClose}>Cancel</button>
        <button class="btn-pri" onClick=${save} disabled=${saving||(!parsed&&!text.trim())}>${saving?h`<i class="ti ti-loader-2 spinner"></i> Sending`:h`<i class="ti ti-send"></i> ${parsed?`Send ${parsed.length} task${parsed.length>1?'s':''}`:'Send task'}`}</button>
      </div>
    </div>
  </div>`;
}

function DirectTaskSnoozeModal({task,onClose,onSave}){
  const[reason,setReason]=useState('');
  const[until,setUntil]=useState(()=>{const d=new Date();d.setDate(d.getDate()+1);d.setHours(9,0,0,0);return d.toISOString().slice(0,16);});
  return h`<div class="modal" onClick=${e=>{if(e.target===e.currentTarget)onClose()}}>
    <div class="modal-box dt-snooze-modal">
      <div class="modal-head"><div style=${{fontSize:15,fontWeight:600,display:'flex',alignItems:'center',gap:8}}><i class="ti ti-zzz" style=${{color:'#6D28D9'}}></i>Snooze task</div><button class="icon-btn" onClick=${onClose}><i class="ti ti-x"></i></button></div>
      <div class="modal-body">
        <div class="fi-group"><div class="fi-lbl">Resume on</div><input class="fi" type="datetime-local" value=${until} onInput=${e=>setUntil(e.target.value)}/></div>
        <div class="fi-group"><div class="fi-lbl">Why (admin will see this)</div><textarea class="fi" rows="3" style=${{resize:'vertical'}} placeholder="e.g. Waiting on creative from Shubham..." value=${reason} onInput=${e=>setReason(e.target.value)}></textarea></div>
      </div>
      <div class="modal-foot">
        <button class="btn-sec" onClick=${onClose}>Cancel</button>
        <button class="btn-pri" onClick=${()=>onSave({reason:reason.trim()||'No reason given',until:until?new Date(until).toISOString():null})}>Snooze</button>
      </div>
    </div>
  </div>`;
}

function DirectTaskPanel({task,onClose,onUpdate,onDelete,clients,currentUser,showToast}){
  const[comments,setComments]=useState([]);
  const[newComment,setNewComment]=useState('');
  const[posting,setPosting]=useState(false);
  const[showSnooze,setShowSnooze]=useState(false);
  const[edDesc,setEdDesc]=useState(false);
  const[descDraft,setDescDraft]=useState('');
  const isAdmin=currentUser?.role_level==='admin';
  const isMine=task&&task.assignee===currentUser?.name;
  const linkedClient=task&&task.linked_client_id?(clients||[]).find(c=>c.id===task.linked_client_id):null;
  useEffect(()=>{if(!task){setComments([]);return;}db('direct_task_comments',`&task_id=eq.${task.id}&order=created_at.asc`).then(setComments).catch(()=>{});const ch=supabase.channel('dtc-'+task.id).on('postgres_changes',{event:'INSERT',schema:'public',table:'direct_task_comments',filter:`task_id=eq.${task.id}`},payload=>{setComments(cs=>cs.find(x=>x.id===payload.new.id)?cs:[...cs,payload.new]);}).subscribe();return()=>{supabase.removeChannel(ch);};},[task?.id]);
  useEffect(()=>{setEdDesc(false);setDescDraft(task?.description||'');},[task?.id]);
  if(!task)return h`<div></div>`;
  const patch=async(data)=>{try{const stamped={...data,updated_at:new Date().toISOString(),updated_by:currentUser.name};const res=await fetch(`${SB_URL}/rest/v1/direct_tasks?id=eq.${task.id}`,{method:'PATCH',headers:_sbHeaders({'Content-Type':'application/json','Prefer':'return=representation'}),body:JSON.stringify(stamped)});const rows=await res.json();const u={...task,...stamped};if(rows&&rows[0])Object.assign(u,rows[0]);onUpdate(u);return u;}catch(e){showToast('Save failed');throw e;}};
  const ack=async()=>{await patch({status:'acked',acked_at:new Date().toISOString()});insertNotif(task.assigned_by,`👀 ${currentUser.name} acked "${task.title}"`,`Saw your direct task.`,'info',null,null,'direct_task',task.id);showToast('Acknowledged');};
  const start=async()=>{await patch({status:'in_progress'});};
  const markDone=async()=>{await patch({status:'done',completed_at:new Date().toISOString(),is_active:false});insertNotif(task.assigned_by,`✅ ${currentUser.name} finished "${task.title}"`,`Direct task marked done.`,'status',null,null,'direct_task',task.id);showToast('Marked done');};
  const block=async()=>{await patch({status:'blocked'});insertNotif(task.assigned_by,`🚧 ${currentUser.name} is blocked on "${task.title}"`,`Check the task thread.`,'alert',null,null,'direct_task',task.id);};
  const snooze=async({reason,until})=>{setShowSnooze(false);await patch({status:'snoozed',snooze_reason:reason,snooze_until:until});insertNotif(task.assigned_by,`💤 ${currentUser.name} snoozed "${task.title}"`,`Reason: ${reason}${until?`\nResumes ${new Date(until).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}`:''}`,'info',null,null,'direct_task',task.id);showToast('Snoozed');};
  const toggleActive=async()=>{
    if(!task.is_active){
      // clear any other active for this assignee
      try{await fetch(`${SB_URL}/rest/v1/direct_tasks?assignee=eq.${encodeURIComponent(task.assignee)}&is_active=eq.true`,{method:'PATCH',headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,'Content-Type':'application/json'},body:JSON.stringify({is_active:false})});}catch(e){}
      await patch({is_active:true,status:task.status==='new'||task.status==='acked'?'in_progress':task.status,acked_at:task.acked_at||new Date().toISOString()});
    }else{await patch({is_active:false});}
  };
  const saveDesc=async()=>{await patch({description:descDraft});setEdDesc(false);};
  const postComment=async()=>{
    if(!newComment.trim())return;
    setPosting(true);
    try{const rows=await dbInsert('direct_task_comments',[{task_id:task.id,author:currentUser.name,body:newComment.trim()}],{skipAudit:true,skipStamp:true});setComments(cs=>[...cs,rows[0]]);setNewComment('');
      const other=currentUser.name===task.assignee?task.assigned_by:task.assignee;
      if(other&&other!==currentUser.name)insertNotif(other,`💬 ${currentUser.name} commented on "${task.title}"`,newComment.trim().slice(0,140),'info',null,null,'direct_task',task.id);
    }catch(e){showToast('Comment failed');}finally{setPosting(false);}
  };
  const removeTask=async()=>{if(!confirm('Move this task to Trash? You can restore it from Settings → Trash.'))return;try{await dbDelete('direct_tasks',task.id);onDelete&&onDelete(task.id);onClose();showToast('Moved to Trash');}catch(e){showToast('Delete failed');}};
  return h`<div style=${{display:'flex',flexDirection:'column',height:'100%'}}>
    <div class="dt-panel-head">
      <${DTPriPill} priority=${task.priority} onChange=${isAdmin?(v=>patch({priority:v,expected_completion:task.expected_completion||dtExpectedDefault(v)})):null}/>
      <${DTStPill} status=${task.status} onChange=${(isMine||isAdmin)?(v=>{const extra={};if(v==='done'){extra.completed_at=new Date().toISOString();extra.is_active=false;}if(v==='acked'&&!task.acked_at)extra.acked_at=new Date().toISOString();patch({status:v,...extra});}):null}/>
      ${task.is_active&&h`<span style=${{fontSize:10,fontWeight:600,background:'var(--brand)',color:'#fff',padding:'2px 7px',borderRadius:999}}>ACTIVE</span>`}
      <button class="icon-btn" style=${{marginLeft:'auto'}} onClick=${onClose}><i class="ti ti-x"></i></button>
    </div>
    <div class="dt-panel-body" style=${{flex:1,overflowY:'auto'}}>
      <div>
        <div style=${{fontSize:17,fontWeight:500,color:'var(--t1)',lineHeight:1.35}}>${task.title}</div>
        ${edDesc?h`<div style=${{marginTop:8}}>
          <textarea class="fi" rows="4" style=${{resize:'vertical'}} value=${descDraft} onInput=${e=>setDescDraft(e.target.value)}></textarea>
          <div style=${{display:'flex',gap:6,marginTop:6}}><button class="btn-pri" style=${{padding:'5px 10px',fontSize:12}} onClick=${saveDesc}>Save</button><button class="btn-sec" style=${{padding:'5px 10px',fontSize:12}} onClick=${()=>{setEdDesc(false);setDescDraft(task.description||'');}}>Cancel</button></div>
        </div>`:h`<div onClick=${(isMine||isAdmin)?(()=>setEdDesc(true)):null} style=${{marginTop:6,fontSize:13,color:'var(--t2)',whiteSpace:'pre-wrap',lineHeight:1.55,cursor:(isMine||isAdmin)?'text':'default',minHeight:18}}>${task.description||h`<span style=${{color:'var(--t3)',fontStyle:'italic'}}>${(isMine||isAdmin)?'+ Add description':'No description'}</span>`}</div>`}
      </div>
      <div class="dt-meta-grid">
        <div class="dt-meta-row"><div class="dt-meta-lb">Assigned by</div><div class="dt-meta-val">${task.assigned_by}</div></div>
        <div class="dt-meta-row"><div class="dt-meta-lb">Assignee</div><div class="dt-meta-val">${task.assignee}</div></div>
        <div class="dt-meta-row"><div class="dt-meta-lb">Sent</div><div class="dt-meta-val">${new Date(task.created_at).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div></div>
        <div class="dt-meta-row"><div class="dt-meta-lb">Due</div><div class="dt-meta-val" style=${{color:dtIsOverdue(task)?'#DC2626':'var(--t1)',fontWeight:dtIsOverdue(task)?500:400}}>${task.expected_completion?new Date(task.expected_completion).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})+' · '+dtFmtDue(task.expected_completion):'—'}</div></div>
        ${linkedClient&&h`<div class="dt-meta-row"><div class="dt-meta-lb">Client</div><div class="dt-meta-val">${linkedClient.name}</div></div>`}
        ${task.recurring!=='none'&&h`<div class="dt-meta-row"><div class="dt-meta-lb">Repeats</div><div class="dt-meta-val">${DT_RECURRING[task.recurring].label}</div></div>`}
        ${task.acked_at&&h`<div class="dt-meta-row"><div class="dt-meta-lb">Acked</div><div class="dt-meta-val">${new Date(task.acked_at).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div></div>`}
        ${task.completed_at&&h`<div class="dt-meta-row"><div class="dt-meta-lb">Done</div><div class="dt-meta-val">${new Date(task.completed_at).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div></div>`}
      </div>
      ${task.status==='snoozed'&&task.snooze_reason&&h`<div style=${{padding:10,background:'rgba(109,40,217,.08)',border:'1px solid rgba(109,40,217,.2)',borderRadius:8,fontSize:12,color:'var(--t2)'}}><div style=${{fontWeight:500,color:'#6D28D9',marginBottom:3}}><i class="ti ti-zzz"></i> Snoozed — ${task.snooze_until?new Date(task.snooze_until).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'no resume time'}</div>${task.snooze_reason}</div>`}
      ${isMine&&h`<div class="dt-actions">
        ${task.status==='new'&&h`<button class="dt-ack-btn" onClick=${ack}><i class="ti ti-eye"></i> Acknowledge</button>`}
        ${(task.status==='acked'||task.status==='blocked'||task.status==='snoozed')&&h`<button onClick=${start}><i class="ti ti-player-play"></i> Start working</button>`}
        ${task.status!=='done'&&h`<button class="dt-done-btn" onClick=${markDone}><i class="ti ti-check"></i> Mark done</button>`}
        ${task.status!=='done'&&task.status!=='blocked'&&h`<button onClick=${block}><i class="ti ti-hand-stop"></i> I'm blocked</button>`}
        ${task.status!=='done'&&h`<button onClick=${()=>setShowSnooze(true)}><i class="ti ti-zzz"></i> Snooze</button>`}
        ${task.status!=='done'&&h`<button class=${'dt-active-btn'+(task.is_active?' on':'')} onClick=${toggleActive}><i class="ti ti-pin"></i> ${task.is_active?'Working on this':'Set as active'}</button>`}
      </div>`}
      ${isAdmin&&!isMine&&task.status==='done'&&h`<div class="dt-actions"><button onClick=${()=>patch({status:'in_progress',completed_at:null})}><i class="ti ti-arrow-back-up"></i> Reopen</button></div>`}
      ${isAdmin&&h`<div class="dt-actions"><button style=${{color:'#DC2626',borderColor:'#FEE2E2'}} onClick=${removeTask}><i class="ti ti-trash"></i> Delete task</button></div>`}
      <div class="dt-comments">
        <div class="dt-comments-h">Thread · ${comments.length}</div>
        ${comments.length===0&&h`<div style=${{fontSize:12,color:'var(--t3)',fontStyle:'italic'}}>No comments yet.</div>`}
        ${comments.map(c=>h`<div key=${c.id} class="dt-comment"><div class="dt-comment-meta"><span class="dt-comment-author">${c.author}</span><span>${new Date(c.created_at).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</span></div>${c.body}</div>`)}
        <form class="dt-comment-form" onSubmit=${e=>{e.preventDefault();postComment();}}>
          <input type="text" placeholder=${isMine?'Reply or note your blocker...':'Comment...'} value=${newComment} onInput=${e=>setNewComment(e.target.value)}/>
          <button type="submit" disabled=${posting||!newComment.trim()}>${posting?h`<i class="ti ti-loader-2 spinner"></i>`:h`<i class="ti ti-send"></i>`}</button>
        </form>
      </div>
    </div>
    ${showSnooze&&h`<${DirectTaskSnoozeModal} task=${task} onClose=${()=>setShowSnooze(false)} onSave=${snooze}/>`}
  </div>`;
}

function DirectTasksInbox({tasks,clients,currentUser,onOpen}){
  const open=tasks.filter(t=>t.status!=='done');
  const done=tasks.filter(t=>t.status==='done').sort((a,b)=>new Date(b.completed_at||b.updated_at)-new Date(a.completed_at||a.updated_at)).slice(0,20);
  const active=open.find(t=>t.is_active);
  const urgent=open.filter(t=>t.priority==='urgent'&&!t.is_active).sort(dtSortFn);
  const today=open.filter(t=>t.priority==='today'&&!t.is_active).sort(dtSortFn);
  const week=open.filter(t=>t.priority==='this_week'&&!t.is_active).sort(dtSortFn);
  const later=open.filter(t=>t.priority==='whenever'&&!t.is_active).sort(dtSortFn);
  const clientName=(id)=>(clients||[]).find(c=>c.id===id)?.name;
  const Card=({t})=>h`<div class=${'dt-card'+(t.is_active?' dt-active':'')+(dtIsOverdue(t)?' dt-overdue':'')} onClick=${()=>onOpen(t)}>
    ${t.is_active&&h`<span class="dt-card-active-flag">ACTIVE</span>`}
    <div class="dt-card-top"><${DTPriPill} priority=${t.priority}/><${DTStPill} status=${t.status}/></div>
    <div class="dt-card-title">${t.title}</div>
    ${t.description&&h`<div class="dt-card-desc">${t.description}</div>`}
    <div class="dt-card-meta">
      <span class="dt-mt"><i class="ti ti-user-circle"></i>${t.assigned_by}</span>
      ${t.expected_completion&&h`<span class="dt-mt" style=${{color:dtIsOverdue(t)?'#DC2626':'var(--t3)',fontWeight:dtIsOverdue(t)?500:400}}><i class="ti ti-clock"></i>${dtFmtDue(t.expected_completion)}</span>`}
      ${t.linked_client_id&&h`<span class="dt-mt"><i class="ti ti-building"></i>${clientName(t.linked_client_id)||'Client'}</span>`}
      ${t.recurring!=='none'&&h`<span class="dt-mt"><i class="ti ti-repeat"></i>${DT_RECURRING[t.recurring].label}</span>`}
    </div>
  </div>`;
  const Group=({label,items,icon})=>items.length===0?null:h`<div>
    <div class="dt-group-h"><i class=${'ti '+icon} style=${{color:'var(--t2)'}}></i><span class="dt-group-lb">${label}</span><span class="dt-group-ct">${items.length}</span></div>
    <div style=${{display:'flex',flexDirection:'column',gap:8}}>${items.map(t=>h`<${Card} key=${t.id} t=${t}/>`)}</div>
  </div>`;
  if(open.length===0&&done.length===0){
    return h`<div class="dt-empty"><i class="ti ti-inbox"></i><div class="dt-empty-lb">Inbox zero</div><div class="dt-empty-sub">No direct tasks from admin right now.</div></div>`;
  }
  return h`<div style=${{display:'flex',flexDirection:'column',gap:8}}>
    ${active&&h`<${Group} label="Working on now" items=${[active]} icon="ti-pin"/>`}
    <${Group} label="Urgent" items=${urgent} icon="ti-alert-octagon"/>
    <${Group} label="Today" items=${today} icon="ti-flame"/>
    <${Group} label="This week" items=${week} icon="ti-calendar-event"/>
    <${Group} label="Whenever" items=${later} icon="ti-clock-pause"/>
    ${done.length>0&&h`<details style=${{marginTop:18}}><summary style=${{cursor:'pointer',fontSize:11,fontWeight:600,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.05em',padding:'6px 0'}}>Recently done · ${done.length}</summary><div style=${{display:'flex',flexDirection:'column',gap:8,marginTop:8,opacity:.65}}>${done.map(t=>h`<${Card} key=${t.id} t=${t}/>`)}</div></details>`}
  </div>`;
}

function DirectTasksAdmin({tasks,clients,currentUser,onOpen,onNew}){
  const[filter,setFilter]=useState('all'); // all | open | overdue | done
  const[byAssignee,setByAssignee]=useState('all');
  const mine=tasks.filter(t=>t.assigned_by===currentUser.name);
  const assignees=[...new Set(mine.map(t=>t.assignee))].sort();
  let view=mine;
  if(byAssignee!=='all')view=view.filter(t=>t.assignee===byAssignee);
  if(filter==='open')view=view.filter(t=>t.status!=='done');
  else if(filter==='overdue')view=view.filter(dtIsOverdue);
  else if(filter==='done')view=view.filter(t=>t.status==='done');
  const sorted=[...view].sort((a,b)=>{const ov=dtIsOverdue(a)?-2:0;const ov2=dtIsOverdue(b)?-2:0;if(ov!==ov2)return ov-ov2;return dtSortFn(a,b);});
  const counts={all:mine.length,open:mine.filter(t=>t.status!=='done').length,overdue:mine.filter(dtIsOverdue).length,done:mine.filter(t=>t.status==='done').length};
  const clientName=(id)=>(clients||[]).find(c=>c.id===id)?.name;
  return h`<div>
    <div style=${{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',marginBottom:14}}>
      <button class="btn-pri" onClick=${onNew}><i class="ti ti-bolt"></i> Send task <span class="dt-kbd" style=${{background:'rgba(255,255,255,.18)',border:'1px solid rgba(255,255,255,.32)',color:'#fff'}}>⌘K</span></button>
      <div style=${{display:'flex',gap:4,marginLeft:'auto'}}>
        ${['all','open','overdue','done'].map(k=>h`<button key=${k} class=${filter===k?'btn-pri':'btn-sec'} style=${{padding:'6px 10px',fontSize:12}} onClick=${()=>setFilter(k)}>${k[0].toUpperCase()+k.slice(1)} · ${counts[k]}</button>`)}
      </div>
      ${assignees.length>1&&h`<select class="fi fi-select" style=${{maxWidth:160,fontSize:12}} value=${byAssignee} onChange=${e=>setByAssignee(e.target.value)}><option value="all">All people</option>${assignees.map(a=>h`<option key=${a} value=${a}>${a}</option>`)}</select>`}
    </div>
    ${sorted.length===0?h`<div class="dt-empty"><i class="ti ti-clipboard-list"></i><div class="dt-empty-lb">${filter==='all'?'No direct tasks assigned yet':'Nothing in this view'}</div><div class="dt-empty-sub">${filter==='all'?'Press ⌘K to send your first task.':'Try a different filter.'}</div></div>`:h`<div style=${{display:'flex',flexDirection:'column',gap:8}}>
      ${sorted.map(t=>h`<div key=${t.id} class=${'dt-card'+(t.is_active?' dt-active':'')+(dtIsOverdue(t)?' dt-overdue':'')} onClick=${()=>onOpen(t)}>
        <div class="dt-card-top"><${DTPriPill} priority=${t.priority}/><${DTStPill} status=${t.status}/>${t.is_active&&h`<span style=${{fontSize:10,fontWeight:600,background:'var(--brand)',color:'#fff',padding:'2px 7px',borderRadius:999}}>ACTIVE</span>`}</div>
        <div class="dt-card-title">${t.title}</div>
        ${t.description&&h`<div class="dt-card-desc">${t.description}</div>`}
        <div class="dt-card-meta">
          <span class="dt-mt"><i class="ti ti-arrow-narrow-right"></i>${t.assignee}</span>
          ${t.expected_completion&&h`<span class="dt-mt" style=${{color:dtIsOverdue(t)?'#DC2626':'var(--t3)',fontWeight:dtIsOverdue(t)?500:400}}><i class="ti ti-clock"></i>${dtFmtDue(t.expected_completion)}</span>`}

// Hook: load direct_tasks for a user, subscribe to realtime, return live list.
function useDirectTasks(currentUser){
  const[tasks,setTasks]=useState([]);
  const[loaded,setLoaded]=useState(false);
  useEffect(()=>{
    if(!currentUser)return;
    const isAdmin=currentUser.role_level==='admin';
    const filter=isAdmin?'':`&or=(assignee.eq.${encodeURIComponent(currentUser.name)},assigned_by.eq.${encodeURIComponent(currentUser.name)})`;
    const load=()=>db('direct_tasks',filter+'&order=created_at.desc&limit=500').then(rs=>{setTasks(rs);setLoaded(true);}).catch(e=>{console.warn('[direct_tasks] load failed',e);setLoaded(true);});
    load();
    const ch=supabase.channel('direct-tasks-'+currentUser.name).on('postgres_changes',{event:'*',schema:'public',table:'direct_tasks'},payload=>{
      const ev=payload.eventType;const n=payload.new;const o=payload.old;
      const mine=(r)=>r&&(isAdmin||r.assignee===currentUser.name||r.assigned_by===currentUser.name);
      const live=(r)=>r&&!r.deleted_at;
      if(ev==='INSERT'){if(mine(n)&&live(n))setTasks(ts=>ts.find(x=>x.id===n.id)?ts:[n,...ts]);}
      else if(ev==='UPDATE'){setTasks(ts=>{const present=ts.find(x=>x.id===n.id);if(mine(n)&&live(n))return present?ts.map(x=>x.id===n.id?n:x):[n,...ts];return ts.filter(x=>x.id!==n.id);});}
      else if(ev==='DELETE'){const id=(o&&o.id)||(n&&n.id);if(id)setTasks(ts=>ts.filter(x=>x.id!==id));}
    }).subscribe();
    const poll=setInterval(load,45000);
    return()=>{supabase.removeChannel(ch);clearInterval(poll);};
  },[currentUser?.name,currentUser?.role_level]);
  return[tasks,setTasks,loaded];
}

// ── HASH ROUTING ──
// Format: #/<tab> or #/clients/<id>[/<subtab>]
// Tabs: home, clients, seo, ads, team, employee, settings (DashboardApp) — home, employee (TasksApp)
// Client sub-tabs: overview, brand, billing, scope, sop, reports, calendar
function parseHash(){
  try{
    const raw=(window.location.hash||'').replace(/^#\/?/, '');
    if(!raw)return{tab:'',clientId:null,clientTab:null};
    const parts=raw.split('/').filter(Boolean);
    if(parts[0]==='clients'&&parts[1])return{tab:'clients',clientId:parts[1],clientTab:parts[2]||null};
    return{tab:parts[0]||'',clientId:null,clientTab:null};
  }catch(_){return{tab:'',clientId:null,clientTab:null};}
}
function buildHash({tab,clientId,clientTab}){
  if(tab==='clients'&&clientId){const sub=clientTab?`/${clientTab}`:'';return`#/clients/${clientId}${sub}`;}
  return tab?`#/${tab}`:'';
}
function writeHash(state){
  const next=buildHash(state);
  const cur=window.location.hash;
  if(next===cur)return;
  const prev=parseHash();
  // Push a real history entry for genuine navigation so the browser Back button moves
  // WITHIN the dashboard (tab switch, open client, change client sub-tab) instead of
  // jumping out to the landing page. Replace — no new entry — only for:
  //   1. the initial normalization on load (cur has no app hash yet), and
  //   2. filling in a client's default sub-tab on open (#/clients/42 → #/clients/42/overview),
  //      which would otherwise leave a dead entry that instantly re-resolves.
  // Both replaceState and pushState avoid firing hashchange, so our own writes don't
  // re-trigger the hash→state listeners.
  const isInitial=!cur||!cur.startsWith('#/');
  const fillingDefaultSubtab=state.tab==='clients'&&prev.tab==='clients'
    &&String(prev.clientId)===String(state.clientId)&&!prev.clientTab&&!!state.clientTab;
  const shouldReplace=isInitial||fillingDefaultSubtab||!next;
  try{
    if(shouldReplace)history.replaceState(null,'',next||(window.location.pathname+window.location.search));
    else history.pushState(null,'',next);
  }catch(_){window.location.hash=next;}
}
function useHashRoute(){
  const[route,setRoute]=useState(()=>parseHash());
  useEffect(()=>{
    const on=()=>setRoute(parseHash());
    window.addEventListener('hashchange',on);
    window.addEventListener('popstate',on);
    return()=>{window.removeEventListener('hashchange',on);window.removeEventListener('popstate',on);};
  },[]);
  return route;
}

// activity_log dropped from the local-backup dump after migration 018 — anon
// can no longer SELECT it. To capture the audit trail offline, export it via
// Supabase Studio's Table Editor instead. Financial tables (invoices,
// invoice_payments, agency_settings, recurring_invoice_templates) were never
// in this list and now require Studio access too.
const BACKUP_TABLES=['clients','content','team_members','monthly_reports','daily_notes','notifications','ads','ad_spend_entries','attendance'];
function BackupHealthView({showToast}){
  const[busy,setBusy]=useState(false);
  const[issues,setIssues]=useState(null);
  const[checking,setChecking]=useState(false);
  const runBackup=async()=>{
    setBusy(true);
    try{
      const dump={exported_at:new Date().toISOString(),app_version:APP_VERSION,tables:{}};
      for(const t of BACKUP_TABLES){
        try{
          const r=await fetch(`${SB_URL}/rest/v1/${t}?select=*`,{headers:_sbHeaders()});
          if(r.ok)dump.tables[t]=await r.json();
          else dump.tables[t]={_error:'HTTP '+r.status};
        }catch(e){dump.tables[t]={_error:e.message};}
      }
      const blob=new Blob([JSON.stringify(dump,null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;
      const stamp=new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
      a.download=`ams-backup-${stamp}.json`;
      document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
      logActivity({action:'update',table_name:'backup',record_id:stamp,record_label:'Manual backup export',changes:null});
      showToast('Backup downloaded ✓');
    }catch(e){showToast('Backup failed: '+e.message);}
    finally{setBusy(false);}
  };
  const runCheck=async()=>{setChecking(true);try{const is=await runHealthCheck();setIssues(is);}finally{setChecking(false);}};
  return h`<div>
    <div style=${{fontSize:20,fontWeight:500,color:'var(--t1)',marginBottom:20}}>Backup & health</div>
    <div class="settings-section">
      <div class="settings-section-title"><i class="ti ti-database-export" style=${{fontSize:16}}></i>Manual backup</div>
      <div style=${{fontSize:13,color:'var(--t2)',marginBottom:14,lineHeight:1.5}}>Downloads a single JSON file containing every row of every table. Keep one copy weekly somewhere outside Supabase (Google Drive, your laptop) as a parachute.</div>
      <button class="btn-pri" onClick=${runBackup} disabled=${busy}>${busy?h`<i class="ti ti-loader-2 spinner"></i> Exporting…`:h`<i class="ti ti-download"></i> Download backup JSON`}</button>
    </div>
    <div class="settings-section">

      <div style=${{fontSize:13,color:'var(--t2)',marginBottom:14,lineHeight:1.5}}>Pings every table this build expects. Use this after running a new SQL migration to confirm everything landed.</div>
      <button class="btn-sec" onClick=${runCheck} disabled=${checking}>${checking?'Checking…':h`<span><i class="ti ti-refresh"></i> Run health check</span>`}</button>
      ${issues!==null&&h`<div style=${{marginTop:12,padding:12,borderRadius:8,background:issues.length?'#FEE2E2':'#DCFCE7',color:issues.length?'#7F1D1D':'#14532D',fontSize:13}}>
        ${issues.length===0?'✓ All expected tables and columns are present.':h`<div><strong>${issues.length} issue${issues.length===1?'':'s'} found:</strong>${issues.map((i,k)=>h`<div key=${k} style=${{marginTop:4,fontFamily:'monospace',fontSize:12}}>· ${i}</div>`)}</div>`}
      </div>`}
    </div>
    <div class="settings-section">

// ── Scope packages panel ─────────────────────────────────────────────
function ScopePackagesPanel({showToast}){
  const[rows,setRows]=useState([]);const[loading,setLoading]=useState(true);
  const[editing,setEditing]=useState(null); // row being edited (or {new:true})
  useEffect(()=>{db('scope_packages','&order=is_default.desc,sort_order').then(r=>{setRows(r||[]);setLoading(false);});},[]);
  const close=()=>setEditing(null);
  const save=async(patch)=>{
    try{
      if(editing.new){
        const ins=await dbInsert('scope_packages',[{...patch,is_active:true}]);
        setRows(rs=>[...rs,ins[0]]);showToast('Created ✓');
      }else{
        await dbPatch('scope_packages',editing.id,patch);
        setRows(rs=>rs.map(r=>r.id===editing.id?{...r,...patch}:r));showToast('Saved ✓');
      }
      close();
    }catch(e){showToast('Save failed: '+(e?.message||e));}
  };
  const toggleActive=async(r)=>{
    try{await dbPatch('scope_packages',r.id,{is_active:!r.is_active});setRows(rs=>rs.map(x=>x.id===r.id?{...x,is_active:!x.is_active}:x));}
    catch(e){showToast('Failed');}
  };
  const makeDefault=async(r)=>{
    try{
      // Clear all is_default flags, then set this one.
      await Promise.all(rows.filter(x=>x.is_default&&x.id!==r.id).map(x=>dbPatch('scope_packages',x.id,{is_default:false})));
      await dbPatch('scope_packages',r.id,{is_default:true});
      setRows(rs=>rs.map(x=>({...x,is_default:x.id===r.id})));
      showToast('Default updated');
    }catch(e){showToast('Failed');}
  };
  if(loading)return h`<div style=${{color:'var(--t3)',padding:'20px 0',fontSize:13}}><i class="ti ti-loader-2 spinner"></i> Loading scope packages…</div>`;
  return h`<div>
    <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
      <div style=${{fontSize:12,color:'var(--t3)'}}>${rows.length} package${rows.length===1?'':'s'} · the default is pre-selected in the Send Onboarding modal</div>
      <button class="btn-pri" onClick=${()=>setEditing({new:true,name:'',monthly_fee:0,deliverables:[],default_payment_terms:'monthly',default_tenure_months:6,gst_treatment:'exclusive',sort_order:(rows.length+1)*10})}><i class="ti ti-plus"></i> New package</button>
    </div>
    <div style=${{display:'flex',flexDirection:'column',gap:8}}>
      ${rows.map(r=>h`<div key=${r.id} style=${{background:'var(--surface)',border:'1px solid var(--bd)',borderRadius:'var(--r)',padding:'12px 14px',opacity:r.is_active?1:.55}}>
        <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,marginBottom:6}}>
          <div style=${{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
            <div style=${{fontSize:14,fontWeight:600,color:'var(--t1)'}}>${r.name}</div>
            ${r.is_default&&h`<span class="pill pg" style=${{fontSize:10}}>Default</span>`}
            ${!r.is_active&&h`<span class="pill py" style=${{fontSize:10}}>Inactive</span>`}
            <span style=${{fontSize:13,color:'var(--t2)',fontFamily:'monospace'}}>₹${Number(r.monthly_fee||0).toLocaleString('en-IN')}/mo · ${r.default_tenure_months||6}mo</span>
          </div>
          <div style=${{display:'flex',gap:5}}>
            ${!r.is_default&&r.is_active&&h`<button onClick=${()=>makeDefault(r)} title="Make default" style=${{background:'transparent',border:'1px solid var(--bd)',borderRadius:6,padding:'5px 8px',fontSize:11,cursor:'pointer',color:'var(--t2)'}}><i class="ti ti-pin"></i></button>`}
            <button onClick=${()=>toggleActive(r)} title=${r.is_active?'Deactivate':'Activate'} style=${{background:'transparent',border:'1px solid var(--bd)',borderRadius:6,padding:'5px 8px',fontSize:11,cursor:'pointer',color:'var(--t2)'}}><i class=${'ti '+(r.is_active?'ti-eye-off':'ti-eye')}></i></button>
            <button onClick=${()=>setEditing(r)} title="Edit" style=${{background:'transparent',border:'1px solid var(--bd)',borderRadius:6,padding:'5px 8px',fontSize:11,cursor:'pointer',color:'var(--t2)'}}><i class="ti ti-pencil"></i></button>
          </div>
        </div>
        ${r.description&&h`<div style=${{fontSize:12,color:'var(--t2)',marginBottom:6}}>${r.description}</div>`}
        ${Array.isArray(r.deliverables)&&r.deliverables.length>0&&h`<div style=${{fontSize:12,color:'var(--t3)'}}>${r.deliverables.map((d,i)=>h`<span key=${i}>${i>0?' · ':''}${d}</span>`)}</div>`}
      </div>`)}
    </div>
    ${editing&&h`<${ScopePackageEditorModal} initial=${editing} onClose=${close} onSave=${save}/>`}

    try{
      if(editing.new){
        const ins=await dbInsert('contract_templates',[{...patch,is_active:true}]);
        setRows(rs=>[...rs,ins[0]]);showToast('Created ✓');
      }else{
        await dbPatch('contract_templates',editing.id,patch);

      }
      close();
    }catch(e){showToast('Save failed: '+(e?.message||e));}
  };

    try{await dbPatch('contract_templates',r.id,{is_active:!r.is_active});setRows(rs=>rs.map(x=>x.id===r.id?{...x,is_active:!x.is_active}:x));}
    catch(e){showToast('Failed');}
  };

    try{
      await Promise.all(rows.filter(x=>x.is_default&&x.id!==r.id).map(x=>dbPatch('contract_templates',x.id,{is_default:false})));

function FormTemplatesPanel({showToast}){
  const[rows,setRows]=useState([]);const[loading,setLoading]=useState(true);
  const[editing,setEditing]=useState(null);
  useEffect(()=>{db('onboarding_templates','&order=is_default.desc,name').then(r=>{setRows(r||[]);setLoading(false);});},[]);
  const close=()=>setEditing(null);
  const saveTemplate=async(patch)=>{
    try{
      if(editing.new){
        const ins=await dbInsert('onboarding_templates',[{...patch,is_active:true}]);
        setRows(rs=>[...rs,ins[0]]);showToast('Created ✓');
        setEditing(ins[0]);  // jump straight to editing the new template's fields
      }else{
        await dbPatch('onboarding_templates',editing.id,patch);
        setRows(rs=>rs.map(r=>r.id===editing.id?{...r,...patch}:r));showToast('Saved ✓');
        close();
      }
    }catch(e){showToast('Save failed: '+(e?.message||e));}
  };
  const toggleActive=async(r)=>{
    try{await dbPatch('onboarding_templates',r.id,{is_active:!r.is_active});setRows(rs=>rs.map(x=>x.id===r.id?{...x,is_active:!x.is_active}:x));}
    catch(e){showToast('Failed');}
  };
  const makeDefault=async(r)=>{
    try{
      await Promise.all(rows.filter(x=>x.is_default&&x.id!==r.id).map(x=>dbPatch('onboarding_templates',x.id,{is_default:false})));
      await dbPatch('onboarding_templates',r.id,{is_default:true});
      setRows(rs=>rs.map(x=>({...x,is_default:x.id===r.id})));
      showToast('Default updated');
    }catch(e){showToast('Failed');}
  };
  if(loading)return h`<div style=${{color:'var(--t3)',padding:'20px 0',fontSize:13}}><i class="ti ti-loader-2 spinner"></i> Loading form templates…</div>`;
  return h`<div>
    <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
      <div style=${{fontSize:12,color:'var(--t3)'}}>5-step onboarding wizards. Edit a template to manage its field bank (text, password, drive-link, etc.).</div>
      <button class="btn-pri" onClick=${()=>setEditing({new:true,name:'',description:'',welcome_body:''})}><i class="ti ti-plus"></i> New template</button>
    </div>
    <div style=${{display:'flex',flexDirection:'column',gap:8}}>
      ${rows.map(r=>h`<div key=${r.id} style=${{background:'var(--surface)',border:'1px solid var(--bd)',borderRadius:'var(--r)',padding:'12px 14px',opacity:r.is_active?1:.55}}>
        <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10}}>
          <div style=${{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
            <div style=${{fontSize:14,fontWeight:600,color:'var(--t1)'}}>${r.name}</div>
            ${r.is_default&&h`<span class="pill pg" style=${{fontSize:10}}>Default</span>`}
            ${!r.is_active&&h`<span class="pill py" style=${{fontSize:10}}>Inactive</span>`}
          </div>
          <div style=${{display:'flex',gap:5}}>
            ${!r.is_default&&r.is_active&&h`<button onClick=${()=>makeDefault(r)} title="Make default" style=${{background:'transparent',border:'1px solid var(--bd)',borderRadius:6,padding:'5px 8px',fontSize:11,cursor:'pointer',color:'var(--t2)'}}><i class="ti ti-pin"></i></button>`}
            <button onClick=${()=>toggleActive(r)} title=${r.is_active?'Deactivate':'Activate'} style=${{background:'transparent',border:'1px solid var(--bd)',borderRadius:6,padding:'5px 8px',fontSize:11,cursor:'pointer',color:'var(--t2)'}}><i class=${'ti '+(r.is_active?'ti-eye-off':'ti-eye')}></i></button>
            <button onClick=${()=>setEditing(r)} title="Edit fields" style=${{background:'transparent',border:'1px solid var(--bd)',borderRadius:6,padding:'5px 8px',fontSize:11,cursor:'pointer',color:'var(--t2)'}}><i class="ti ti-pencil"></i></button>
          </div>
        </div>
        ${r.description&&h`<div style=${{fontSize:12,color:'var(--t2)',marginTop:5}}>${r.description}</div>`}
      </div>`)}
    </div>
    ${editing&&h`<${FormTemplateEditorModal} initial=${editing} onClose=${close} onSaveTemplate=${saveTemplate} showToast=${showToast}/>`}
  </div>`;
}

// Human labels for every content field that can be edited.
const POST_FIELD_LABELS={title:'Post title',type:'Type',post_date:'Post date',posting_time:'Posting time',assigned_to:'Assignee',workflow_status:'Status',client_approval:'Client approval',content_pillar:'Content pillar',concept:'Concept',reference_links:'Reference links',designer_notes:'Designer notes',editor_notes:'Editor notes',drive_link:'Drive link',production_notes:'Production notes',caption:'Caption',hashtags:'Hashtags',post_link:'Instagram link',client_remarks:'Client remarks',task_given_date:'Assign date',completion_date:'Completion date',priority:'Priority'};
/* ── BRAND GUIDELINES (read-only) ──
   Creative brand context surfaced from inside a task (PostPanel) so editors/
   designers — who are locked into TasksApp and can't reach the Clients tab —
   don't have to work blind or ask for guidelines. Read-only by design and
   creative-only: logos, colours, fonts, imagery + brief/pillars/voice/dos-donts.
   Deliberately fetches a WHITELISTED column set from `clients` (no billing,
   contact PII, scope/pricing or onboarding) plus `brand_assets`. The editable
   master lives in BrandTab. */
function BrandGuidelines({clientId,clientName,onClose}){
  const[c,setC]=useState(null);
  const[assets,setAssets]=useState([]);
  const[loading,setLoading]=useState(true);
  const[err,setErr]=useState(false);
  useEffect(()=>{
    if(!clientId){setLoading(false);setErr(true);return;}
    let alive=true;setLoading(true);setErr(false);
    const cols='id,name,brand_color_primary,brand_color_secondary,brand_voice,brand_brief,content_pillars_list,posting_days';
    // Raw fetch (not db()) so the column whitelist is honoured — db() hardcodes
    // select=*, which would over-fetch billing/contact columns. brand_assets has
    // no sensitive columns, so db() is fine there.
    Promise.all([
      fetch(`${SB_URL}/rest/v1/clients?select=${cols}&id=eq.${clientId}`,{headers:_sbHeaders()}).then(r=>{if(!r.ok)throw new Error('clients '+r.status);return r.json();}),
      db('brand_assets',`&client_id=eq.${clientId}&order=sort_order.asc,created_at.asc`),
    ]).then(([rows,a])=>{
      if(!alive)return;
      setC((rows&&rows[0])||null);
      setAssets(a||[]);
    }).catch(e=>{if(alive){console.warn('[brand-guidelines] load failed',e);setErr(true);}})
      .finally(()=>{if(alive)setLoading(false);});
    return()=>{alive=false;};
  },[clientId]);

  const byType=(t)=>assets.filter(a=>a.type===t);
  const copyHex=(hex)=>{try{navigator.clipboard?.writeText(hex);}catch(_){}};

  const body=(()=>{
    if(loading)return h`<div style=${{padding:'40px 0',textAlign:'center',color:'var(--t3)',fontSize:13}}><i class="ti ti-loader-2 spinner" style=${{fontSize:20,display:'block',marginBottom:8}}></i>Loading brand profile…</div>`;
    if(err||!c)return h`<div class="empty"><i class="ti ti-photo-off"></i><div class="empty-t">Brand profile unavailable</div><div class="empty-s">Couldn't load this brand's guidelines.</div></div>`;

    const pri=c.brand_color_primary||'#1A1A1A';
    const sec=c.brand_color_secondary||'#787774';
    const heroBg=pri;
    const heroLogo=byType('logo').find(a=>(a.tags||[]).includes('light'))||byType('logo').find(a=>!(a.tags||[]).includes('dark'))||byType('logo')[0];
    const logoSrc=heroLogo?.url;
    const heroText=(()=>{const r=parseInt(heroBg.slice(1,3),16),g=parseInt(heroBg.slice(3,5),16),b=parseInt(heroBg.slice(5,7),16);return(r*299+g*587+b*114)/1000>140?'#0a0a0a':'#fff';})();

    const swatches=[{hex:pri,label:'Primary'},{hex:sec,label:'Secondary'}];
    byType('color').forEach(a=>{if(a.value)swatches.push({hex:a.value,label:a.name||'Colour'});});

    const fonts=[];
    byType('font').forEach(a=>{if(a.value)fonts.push({fam:a.value,tag:(a.tags&&a.tags[0])||'Font'});});

    const briefFields=[
      {icon:'ti-file-text',label:'Brief',val:c.brand_brief},
      {icon:'ti-pin',label:'Content pillars',val:c.content_pillars_list},
      {icon:'ti-calendar-week',label:'Posting days',val:c.posting_days},
    ].filter(f=>f.val);
    const voiceFields=[
      {icon:'ti-microphone',label:'Brand voice',val:c.brand_voice},
    ].filter(f=>f.val);
    const row=(f)=>h`<div class="attr-row attr-row-wide" key=${f.label}>
      <div class="attr-lbl" style=${f.color?{color:f.color}:null}><i class=${'ti '+f.icon}></i>${f.label}</div>
      <div class="attr-val" style=${{whiteSpace:'pre-wrap',fontSize:13,lineHeight:1.55,color:'var(--t1)',padding:'2px 0'}}>${f.val}</div>
    </div>`;
    const nothingFilled=!briefFields.length&&!voiceFields.length&&!byType('logo').length&&!fonts.length&&!byType('image').length&&!byType('color').length;

    return h`<div class="client-edit">
      <div style=${{background:heroBg,borderRadius:'var(--rl)',padding:'24px 22px',display:'flex',alignItems:'center',gap:18,marginBottom:20,flexWrap:'wrap'}}>
        <div style=${{flex:1,minWidth:160}}>
          <div style=${{fontSize:10.5,fontWeight:600,letterSpacing:'.08em',textTransform:'uppercase',color:heroText,opacity:.65,marginBottom:5}}>Brand Profile</div>
          <div style=${{fontSize:24,fontWeight:600,color:heroText,fontFamily:"'Fraunces','Inter',serif",letterSpacing:'-.01em'}}>${c.name||clientName||'Brand'}</div>
        </div>
        ${logoSrc&&h`<div style=${{background:heroText==='#fff'?'rgba(255,255,255,.96)':'rgba(255,255,255,.85)',borderRadius:12,padding:'14px 18px',display:'flex',alignItems:'center',justifyContent:'center',maxWidth:200,maxHeight:96}}>
          <img src=${logoSrc} alt="Logo" style=${{maxWidth:'100%',maxHeight:64,objectFit:'contain'}} onError=${e=>{e.target.parentElement.style.display='none'}}/>
        </div>`}
      </div>

      ${nothingFilled&&h`<div style=${{padding:'14px 16px',background:'var(--bg)',border:'1px dashed var(--bd)',borderRadius:'var(--r)',fontSize:13,color:'var(--t3)',marginBottom:18}}><i class="ti ti-info-circle" style=${{marginRight:6}}></i>This brand's profile hasn't been filled in yet — ask your manager to add guidelines.</div>`}

      ${byType('logo').length>0&&h`<div class="ce-section" style=${{marginTop:0,paddingTop:0,borderTop:'none'}}>
        <div class="ce-section-lbl"><i class="ti ti-photo" style=${{fontSize:13,color:'#1D4ED8'}}></i>Logos</div>
        <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:12}}>
          ${byType('logo').map(a=>{const isDark=(a.tags||[]).includes('dark');return h`<div key=${a.id} style=${{border:'1px solid var(--bd)',borderRadius:'var(--rl)',overflow:'hidden',background:'var(--surface)'}}>
            <div style=${{height:108,background:isDark?'#1A1A1A':'#fff',display:'flex',alignItems:'center',justifyContent:'center',padding:14,borderBottom:'1px solid var(--bd)'}}>
              <img src=${a.url} alt=${a.name||''} style=${{maxWidth:'100%',maxHeight:'100%',objectFit:'contain'}} onError=${e=>{e.target.style.display='none'}}/>
            </div>
            <div style=${{padding:'8px 10px',display:'flex',alignItems:'center',gap:6}}>
              <span style=${{flex:1,fontSize:12,color:'var(--t1)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${a.name||'Logo'}</span>
              <a href=${a.url} target="_blank" rel="noopener" class="icon-btn" title="Open" style=${{width:24,height:24,display:'inline-flex',alignItems:'center',justifyContent:'center'}}><i class="ti ti-external-link" style=${{fontSize:12,color:'var(--t3)'}}></i></a>
            </div>
          </div>`;})}
        </div>
      </div>`}

      ${swatches.length>0&&h`<div class="ce-section">
        <div class="ce-section-lbl"><i class="ti ti-palette" style=${{fontSize:13,color:'var(--brand)'}}></i>Colours <span style=${{fontWeight:400,color:'var(--t3)',fontSize:11}}>· tap to copy hex</span></div>
        <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(110px,1fr))',gap:10}}>
          ${swatches.map((s,i)=>h`<div key=${i} style=${{border:'1px solid var(--bd)',borderRadius:'var(--rl)',overflow:'hidden',background:'var(--surface)'}}>
            <div style=${{height:76,background:s.hex,cursor:'pointer'}} onClick=${()=>copyHex(s.hex)} title="Click to copy"></div>
            <div style=${{padding:'7px 10px'}}>
              <div style=${{fontSize:12,fontWeight:600,color:'var(--t1)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${s.label}</div>
              <div style=${{fontSize:11,color:'var(--t3)',fontFamily:'ui-monospace,monospace',marginTop:2}}>${(s.hex||'').toUpperCase()}</div>
            </div>
          </div>`)}
        </div>
      </div>`}

      ${fonts.length>0&&h`<div class="ce-section">
        <div class="ce-section-lbl"><i class="ti ti-typography" style=${{fontSize:13,color:'#0E7490'}}></i>Fonts</div>
        <div style=${{display:'flex',flexDirection:'column',gap:8}}>
          ${fonts.map((f,i)=>h`<div key=${i} style=${{border:'1px solid var(--bd)',borderRadius:'var(--rl)',padding:'12px 16px',background:'var(--surface)'}}>
            <div style=${{fontSize:11,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:4}}>${f.tag}</div>
            <div style=${{fontFamily:f.fam,fontSize:20,color:'var(--t1)',fontWeight:500,lineHeight:1.2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${f.fam}</div>
            <div style=${{fontSize:12,color:'var(--t3)',marginTop:4,fontFamily:f.fam}}>The quick brown fox jumps over the lazy dog 0123456789</div>
          </div>`)}
        </div>
      </div>`}

      ${byType('image').length>0&&h`<div class="ce-section">
        <div class="ce-section-lbl"><i class="ti ti-photo-scan" style=${{fontSize:13,color:'#7C3AED'}}></i>Brand imagery</div>
        <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:10}}>
          ${byType('image').map(a=>h`<a key=${a.id} href=${a.url} target="_blank" rel="noopener" style=${{position:'relative',border:'1px solid var(--bd)',borderRadius:'var(--rl)',overflow:'hidden',background:'var(--bg)',aspectRatio:'1/1',display:'block'}}>
            <img src=${a.url} alt=${a.name||''} style=${{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
            ${a.name&&h`<div style=${{position:'absolute',inset:'auto 0 0 0',padding:'6px 8px',background:'linear-gradient(transparent,rgba(0,0,0,.65))',color:'#fff',fontSize:11,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textShadow:'0 1px 2px rgba(0,0,0,.5)'}}>${a.name}</div>`}
          </a>`)}
        </div>
      </div>`}

      ${briefFields.length>0&&h`<div class="ce-section">
        <div class="ce-section-lbl"><i class="ti ti-bulb" style=${{fontSize:13,color:'#B45309'}}></i>Brand brief</div>
        <div class="attr-list">${briefFields.map(row)}</div>
      </div>`}

      ${voiceFields.length>0&&h`<div class="ce-section">
        <div class="ce-section-lbl"><i class="ti ti-book-2" style=${{fontSize:13,color:'#0E7490'}}></i>Voice & guidelines</div>
        <div class="attr-list">${voiceFields.map(row)}</div>
      </div>`}
    </div>`;
  })();

  return h`<div class="modal" onClick=${e=>{if(e.target===e.currentTarget)onClose()}} style=${{zIndex:1000}}>
    <div class="modal-box" style=${{maxWidth:640}}>
      <div class="modal-head">
        <div style=${{fontSize:15,fontWeight:600,display:'flex',alignItems:'center',gap:8,minWidth:0}}><i class="ti ti-book-2" style=${{color:'#FF66F5'}}></i><span style=${{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>Brand guidelines${(c?.name||clientName)?' · '+(c?.name||clientName):''}</span></div>
        <button class="icon-btn" onClick=${onClose}><i class="ti ti-x"></i></button>
      </div>
      <div class="modal-body">${body}</div>
    </div>
  </div>`;
}
/* ── BRANDS DIRECTORY (read-only, TasksApp) ──
   A browsable list of all active brands for editors/designers, each opening the
   read-only BrandGuidelines panel. Fetches a creative/display-only column
   whitelist (no contact PII, no billing) via raw fetch so db()'s select=* can't
   over-fetch. Lives in TasksApp, which only renders for editor/designer roles. */
function BrandsView({showToast}){
  const[list,setList]=useState([]);
  const[loading,setLoading]=useState(true);
  const[err,setErr]=useState(false);
  const[q,setQ]=useState('');
  const[openId,setOpenId]=useState(null);
  const[openName,setOpenName]=useState('');
  useEffect(()=>{
    let alive=true;setLoading(true);setErr(false);
    fetch(`${SB_URL}/rest/v1/clients?select=id,name,industry,brand_color_primary,status&order=name.asc`,{headers:_sbHeaders()})
      .then(r=>{if(!r.ok)throw new Error('clients '+r.status);return r.json();})
      .then(rows=>{if(alive)setList(rows||[]);})
      .catch(e=>{if(alive){console.warn('[brands-view] load failed',e);setErr(true);}})
      .finally(()=>{if(alive)setLoading(false);});
    return()=>{alive=false;};
  },[]);
  const ql=q.trim().toLowerCase();
  const shown=list.filter(c=>(c.status||'active')!=='inactive').filter(c=>!ql||(c.name||'').toLowerCase().includes(ql)||(c.industry||'').toLowerCase().includes(ql));
  return h`<div style=${{maxWidth:1100,margin:'0 auto',padding:'8px 0 40px'}}>
    <div style=${{display:'flex',alignItems:'center',gap:10,marginBottom:16,flexWrap:'wrap'}}>
      <div style=${{position:'relative',flex:'1 1 240px',maxWidth:360}}>
        <i class="ti ti-search" style=${{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'var(--t3)',fontSize:15}}></i>
        <input class="fi" type="text" placeholder="Search brands…" value=${q} onInput=${e=>setQ(e.target.value)} style=${{paddingLeft:34}}/>
      </div>
      <span style=${{fontSize:12.5,color:'var(--t3)'}}>${shown.length} brand${shown.length===1?'':'s'}</span>
    </div>
    ${loading?h`<div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:12}}>${[...Array(6)].map((_,i)=>h`<${Skel} key=${i} h=${72}/>`)}</div>`
    :err?h`<div class="empty"><i class="ti ti-cloud-off"></i><div class="empty-t">Couldn't load brands</div><div class="empty-s">Check your connection and try again.</div></div>`
    :shown.length===0?h`<div class="empty"><i class="ti ti-search-off"></i><div class="empty-t">No brands found</div><div class="empty-s">${ql?'Try a different search.':'No brands yet.'}</div></div>`
    :h`<div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:12}}>
      ${shown.map(c=>{
        const col=c.brand_color_primary||'#FF00EE';
        const ini=(c.name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
        return h`<button key=${c.id} onClick=${()=>{setOpenId(c.id);setOpenName(c.name||'');}} style=${{textAlign:'left',cursor:'pointer',border:'1px solid var(--bd)',borderRadius:'var(--rl)',background:'var(--surface)',padding:14,display:'flex',alignItems:'center',gap:12,width:'100%'}}>
          <div style=${{width:44,height:44,borderRadius:10,background:col,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontWeight:600,fontSize:15}}>${ini}</div>
          <div style=${{flex:1,minWidth:0}}>
            <div style=${{fontSize:14,fontWeight:600,color:'var(--t1)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${c.name||'Untitled'}</div>
            <div style=${{fontSize:12,color:'var(--t3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${c.industry||'—'}</div>
          </div>
          <i class="ti ti-chevron-right" style=${{color:'var(--t3)',fontSize:16,flexShrink:0}}></i>
        </button>`;
      })}
    </div>`}
    ${openId&&h`<${BrandGuidelines} clientId=${openId} clientName=${openName} onClose=${()=>setOpenId(null)}/>`}
  </div>`;
}
/* ── EDITOR CONTENT CALENDAR (TasksApp) ──
   Whole-brand calendar for editors/designers: every post (any assignee, all
   dates — past "back days" and upcoming "front days") for the brands they work
   on, so they can prep ahead and catch up. Month grid + list. Posts are fully
   editable through the shared PostPanel — they can work on any post they see.
   "Brands they work on" = distinct client_ids from posts assigned to them. */
function CalendarTab({user,showToast}){
  const[brandIds,setBrandIds]=useState([]);
  const[brands,setBrands]=useState({});         // id -> client row
  const[posts,setPosts]=useState([]);
  const[loading,setLoading]=useState(true);
  const[err,setErr]=useState(false);
  const[mode,setMode]=useState('month');         // 'month' | 'list'
  const[brandFilter,setBrandFilter]=useState('all');
  const[reloadKey,setReloadKey]=useState(0);
  const today=todayISO();
  const[cur,setCur]=useState(()=>{const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};});
  const[sel,setSel]=useState(null);
  const[panelOpen,setPanelOpen]=useState(false);

  useEffect(()=>{
    let alive=true;setLoading(true);setErr(false);
    // 1. which brands does this editor work on? (any date). No &select= here —
    // db() hardcodes select=*, and a second select param breaks the query.
    db('content',`&assigned_to=eq.${encodeURIComponent(user.name)}`)
      .then(rows=>{
        const ids=[...new Set((rows||[]).map(r=>r.client_id).filter(Boolean))];
        if(!alive)return null;
        setBrandIds(ids);
        if(!ids.length){setPosts([]);setBrands({});return null;}
        // 2. every post for those brands (any assignee, all dates) + brand rows
        return Promise.all([
          db('content',`&client_id=in.(${ids.join(',')})&order=post_date.asc`),
          db('clients',`&id=in.(${ids.join(',')})`),
        ]);
      })
      .then(res=>{
        if(!alive||!res)return;
        const[ps,cs]=res;setPosts(ps||[]);
        const m={};(cs||[]).forEach(c=>{m[c.id]=c;});setBrands(m);
      })
      .catch(e=>{if(alive){console.warn('[editor-calendar] load failed',e);setErr(true);}})
      .finally(()=>{if(alive)setLoading(false);});
    return()=>{alive=false;};
  },[user.name,reloadKey]);

  const openCard=(p)=>{setSel(p);setPanelOpen(true);};
  const closePanel=()=>{setPanelOpen(false);setTimeout(()=>setSel(null),260);};
  const updatePost=(u)=>{setPosts(ps=>ps.map(p=>p.id===u.id?u:p));setSel(u);};

  const fp=posts.filter(p=>brandFilter==='all'||p.client_id===brandFilter);
  const byDate={};fp.forEach(p=>{const d=(p.post_date||'').slice(0,10);if(!d)return;(byDate[d]=byDate[d]||[]).push(p);});

  const pad=n=>String(n).padStart(2,'0');
  const monthStartWeekday=new Date(cur.y,cur.m,1).getDay();
  const daysInMonth=new Date(cur.y,cur.m+1,0).getDate();
  const monthLabel=new Date(cur.y,cur.m,1).toLocaleDateString('en-IN',{month:'long',year:'numeric'});
  const cells=[];for(let i=0;i<monthStartWeekday;i++)cells.push(null);for(let d=1;d<=daysInMonth;d++)cells.push(d);
  const prevMonth=()=>setCur(c=>{const m=c.m-1;return m<0?{y:c.y-1,m:11}:{y:c.y,m};});
  const nextMonth=()=>setCur(c=>{const m=c.m+1;return m>11?{y:c.y+1,m:0}:{y:c.y,m};});
  const thisMonth=()=>{const d=new Date();setCur({y:d.getFullYear(),m:d.getMonth()});};
  const showBrandPrefix=brandFilter==='all'&&brandIds.length>1;

  const chip=(p)=>{const c=CC[p.workflow_status]||CC.briefed;return h`<button key=${p.id} onClick=${()=>openCard(p)} title=${(p.title||'Untitled')+' · '+(SC[p.workflow_status]?.label||'')+(p.assigned_to?' · '+p.assigned_to:'')} style=${{display:'block',width:'100%',textAlign:'left',border:'none',borderLeft:'3px solid '+c.col,background:c.bg,color:c.col,borderRadius:4,padding:'2px 5px',fontSize:10.5,fontWeight:500,lineHeight:1.3,marginBottom:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',cursor:'pointer'}}>${showBrandPrefix?(brands[p.client_id]?.initials||'')+' · ':''}${p.title||'Untitled'}</button>`;};

  const WD=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const monthView=h`<div style=${{border:'1px solid var(--bd)',borderRadius:'var(--rl)',overflow:'hidden',background:'var(--surface)'}}>
    <div style=${{display:'grid',gridTemplateColumns:'repeat(7,1fr)',background:'var(--bg)',borderBottom:'1px solid var(--bd)'}}>
      ${WD.map(w=>h`<div key=${w} style=${{padding:'8px 4px',fontSize:10.5,fontWeight:600,color:'var(--t3)',textAlign:'center',textTransform:'uppercase',letterSpacing:'.04em'}}>${w}</div>`)}
    </div>
    <div style=${{display:'grid',gridTemplateColumns:'repeat(7,1fr)'}}>
      ${cells.map((d,i)=>{
        if(d===null)return h`<div key=${'b'+i} style=${{minHeight:104,borderRight:'1px solid var(--bd)',borderBottom:'1px solid var(--bd)',background:'var(--bg)'}}></div>`;
        const ds=`${cur.y}-${pad(cur.m+1)}-${pad(d)}`;
        const dayPosts=byDate[ds]||[];
        const isToday=ds===today;
        return h`<div key=${ds} style=${{minHeight:104,maxHeight:160,borderRight:'1px solid var(--bd)',borderBottom:'1px solid var(--bd)',padding:5,background:isToday?'rgba(255,0,238,.05)':'var(--surface)',display:'flex',flexDirection:'column'}}>
          <div style=${{fontSize:11,fontWeight:isToday?700:500,color:isToday?'#A8009C':'var(--t3)',marginBottom:4,textAlign:'right'}}>${d}</div>
          <div style=${{flex:1,minHeight:0,overflowY:'auto'}}>${dayPosts.map(chip)}</div>
        </div>`;
      })}
    </div>
  </div>`;

  const dates=Object.keys(byDate).sort();
  const listView=dates.length===0
    ?h`<div class="empty"><i class="ti ti-calendar-off"></i><div class="empty-t">No posts</div><div class="empty-s">Nothing scheduled for ${brandFilter==='all'?'your brands':(brands[brandFilter]?.name||'this brand')} yet.</div></div>`
    :h`<div style=${{display:'flex',flexDirection:'column',gap:16}}>
      ${dates.map(ds=>h`<div key=${ds}>
        <div style=${{fontSize:12,fontWeight:600,color:ds===today?'#A8009C':'var(--t2)',marginBottom:7}}>${fmt(ds)}${ds===today?' · Today':''}</div>
        <div style=${{display:'flex',flexDirection:'column',gap:6}}>
          ${byDate[ds].map(p=>{
            const c=CC[p.workflow_status]||CC.briefed;
            return h`<button key=${p.id} onClick=${()=>openCard(p)} style=${{textAlign:'left',cursor:'pointer',border:'1px solid var(--bd)',borderLeft:'3px solid '+c.col,borderRadius:'var(--r)',background:'var(--surface)',padding:'10px 12px',display:'flex',alignItems:'center',gap:10,width:'100%'}}>
              <div style=${{flex:1,minWidth:0}}>
                <div style=${{fontSize:13.5,fontWeight:600,color:'var(--t1)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${p.title||'Untitled'}</div>
                <div style=${{fontSize:11.5,color:'var(--t3)',marginTop:2}}>${brands[p.client_id]?.name||'—'}${p.assigned_to?' · '+p.assigned_to:''}</div>
              </div>
              <${TPill} type=${p.type}/>
              <${SPill} status=${p.workflow_status}/>
            </button>`;
          })}
        </div>
      </div>`)}
    </div>`;

  return h`<div style=${{maxWidth:1100,margin:'0 auto',padding:'4px 0 40px'}}>
    <div style=${{display:'flex',alignItems:'center',gap:10,marginBottom:14,flexWrap:'wrap'}}>
      ${mode==='month'&&h`<div style=${{display:'flex',alignItems:'center',gap:4}}>
        <button class="icon-btn" onClick=${prevMonth} title="Previous month"><i class="ti ti-chevron-left"></i></button>
        <div style=${{fontSize:15,fontWeight:600,color:'var(--t1)',minWidth:148,textAlign:'center'}}>${monthLabel}</div>
        <button class="icon-btn" onClick=${nextMonth} title="Next month"><i class="ti ti-chevron-right"></i></button>
        <button class="btn-sec" style=${{padding:'5px 10px',fontSize:12}} onClick=${thisMonth}>Today</button>
      </div>`}
      <div style=${{flex:1}}></div>
      ${brandIds.length>1&&h`<select class="fi fi-select" style=${{width:'auto',fontSize:12.5,padding:'6px 28px 6px 10px'}} value=${brandFilter} onChange=${e=>setBrandFilter(e.target.value)}>
        <option value="all">All my brands (${brandIds.length})</option>
        ${brandIds.map(id=>h`<option key=${id} value=${id}>${brands[id]?.name||'Brand'}</option>`)}
      </select>`}
      <button class="icon-btn" onClick=${()=>setReloadKey(k=>k+1)} title="Refresh"><i class="ti ti-refresh"></i></button>
      <div style=${{display:'inline-flex',border:'1px solid var(--bd)',borderRadius:8,overflow:'hidden'}}>
        <button onClick=${()=>setMode('month')} title="Month" style=${{padding:'6px 11px',fontSize:13,border:'none',cursor:'pointer',background:mode==='month'?'var(--t1)':'transparent',color:mode==='month'?'var(--surface)':'var(--t2)'}}><i class="ti ti-calendar-month"></i></button>
        <button onClick=${()=>setMode('list')} title="List" style=${{padding:'6px 11px',fontSize:13,border:'none',cursor:'pointer',background:mode==='list'?'var(--t1)':'transparent',color:mode==='list'?'var(--surface)':'var(--t2)'}}><i class="ti ti-list"></i></button>
      </div>
    </div>

    ${loading?h`<${Skel} h=${420}/>`
    :err?h`<div class="empty"><i class="ti ti-cloud-off"></i><div class="empty-t">Couldn't load the calendar</div><div class="empty-s">Check your connection and try again.</div></div>`
    :brandIds.length===0?h`<div class="empty"><i class="ti ti-calendar-off"></i><div class="empty-t">No brands yet</div><div class="empty-s">Once posts are assigned to you, their brands' calendars show up here.</div></div>`
    :mode==='month'?monthView:listView}

    <div class=${'overlay'+(panelOpen?' show':'')} onClick=${closePanel}></div>
    <div class=${'panel'+(panelOpen?' open':'')}>
      <${PostPanel} post=${sel} onClose=${closePanel} onUpdate=${updatePost} showToast=${showToast} currentUser=${user} clientName=${sel?brands[sel.client_id]?.name:null}/>
    </div>
  </div>`;
}

// Friendly copy for ai-generate-calendar Edge Function error codes.
const AI_GEN_ERR={unauthorized:'Your session expired — sign in again and retry.',no_deliverables:'This client has no monthly deliverables set. Add reels/creatives/carousels first.',no_posts_generated:'The model returned nothing usable. Try again or tweak the brief.',parse_no_array:'Could not read the AI response. Try again.',parse_invalid_json:'The AI response was malformed. Try again.','ANTHROPIC_API_KEY not configured':'AI key not set on the server. Add ANTHROPIC_API_KEY in Edge Function secrets.'};
function AIPlanner({client,onClose,onGenerated,showToast,currentUser}){
  const[step,setStep]=useState(1);const[month,setMonth]=useState(()=>{const d=new Date();return{m:d.getMonth(),y:d.getFullYear()}});const[theme_,setTheme_]=useState('');const[brief,setBrief]=useState(client.brand_brief||'');const[pillars,setPillars]=useState(client.content_pillars_list||'');const[generated,setGenerated]=useState([]);const[loading,setLoading]=useState(false);const[apiErr,setApiErr]=useState('');
  const deliverables={reel:client.monthly_reels||0,creative:client.monthly_creatives||0,carousel:client.monthly_carousels||0,extra:client.monthly_extra||0};const total=Object.values(deliverables).reduce((a,b)=>a+b,0);
  const generate=async()=>{setLoading(true);setApiErr('');
    const res=await aiGenerateCalendar({clientId:client.id,month:month.m,year:month.y,theme:theme_,brief,pillars});
    if(!res.ok||!Array.isArray(res.posts)){setApiErr(AI_GEN_ERR[res.error]||res.error||'Generation failed');setLoading(false);return;}
    setGenerated(res.posts.map((p,i)=>({...p,_id:i})));setStep(3);setLoading(false);};
  const saveAll=async()=>{setLoading(true);try{
    const _inst=await ensureScopeInstance(client.id).catch(()=>null);const _li=Array.isArray(_inst?.line_items)?_inst.line_items:[];
    const rows=await rpcCall('content_insert',{p_rows:generated.map(p=>({client_id:client.id,title:p.title,type:p.type,post_date:p.post_date,content_pillar:p.content_pillar||null,assigned_to:p.assigned_to||null,concept:csvFoldExtras(p.concept||'',[['hook','Hook'],['on_screen_text','On-screen text']],p),caption:p.caption||null,hashtags:p.hashtags||null,designer_notes:p.designer_notes||null,editor_notes:p.editor_notes||null,workflow_status:'briefed',client_approval:'pending',production_done:false,scope_line_item_id:autoScopeLineItem(_li,p.type),ai_generated:true,ai_generated_at:new Date().toISOString()}))});onGenerated(rows);showToast(`${rows.length} posts added ✓`);
    const actor=currentUser?.name||'Someone';
    notifyContent({actor,title:`AI plan generated · ${rows.length} posts`,message:`${actor} generated ${rows.length} posts for ${MONTHS[month.m]} ${month.y} — ${client.name}`,type:'status',clientName:client.name,clientId:client.id});
    onClose();}catch(e){setApiErr('Save failed');}finally{setLoading(false);}};
  const steps=['Deliverables','Brief','Review'];
  return h`<div class="modal" onClick=${e=>{if(e.target===e.currentTarget)onClose()}}>
    <div class="modal-box">
      <div class="modal-head"><div><div style=${{fontSize:16,fontWeight:600,display:'flex',alignItems:'center',gap:8}}><i class="ti ti-sparkles" style=${{fontSize:18,color:'var(--brand)',filter:'drop-shadow(0 0 6px rgba(255,0,238,.45))'}}></i>AI Content Planner</div><div style=${{fontSize:12,color:'var(--t3)',marginTop:2}}>${client.name} · ${MONTHS[month.m]} ${month.y}</div></div><button class="icon-btn" onClick=${onClose}><i class="ti ti-x"></i></button></div>

        </div>`}

        ${step===2&&h`<button class="btn-sec" onClick=${()=>setStep(1)}><i class="ti ti-arrow-left"></i> Back</button><button class="btn-pri" onClick=${generate} disabled=${loading}>${loading?h`<i class="ti ti-loader-2 spinner"></i> Generating...`:h`<i class="ti ti-sparkles"></i> Generate`}</button>`}
        ${step===3&&h`<button class="btn-sec" onClick=${()=>setStep(2)}><i class="ti ti-arrow-left"></i> Back</button><button class="btn-pri" onClick=${saveAll} disabled=${loading}>${loading?h`<i class="ti ti-loader-2 spinner"></i> Saving...`:`Save ${generated.length} posts`}</button>`}
      </div>
